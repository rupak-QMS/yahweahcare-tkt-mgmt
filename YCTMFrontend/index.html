    <script>
        (function () {
            var BACKEND = window.location.hostname === 'localhost'

            var urlParams  = new URLSearchParams(window.location.search);
            var loginError = urlParams.get('error') || (urlParams.get('session_expired') ? 'session_expired' : null);
            var msUserB64  = urlParams.get('ms_user');
            var msTokenB64 = urlParams.get('_t');

            // base64url → standard base64 with padding (atob requires padding)
            function b64urlDecode(s) {
                var b = s.replace(/-/g, '+').replace(/_/g, '/');
                while (b.length % 4) b += '=';   // add missing padding
                return atob(b);
            }

            // Capture user info passed from backend redirect, store in sessionStorage
            if (msUserB64) {
                try {
                    var decoded = JSON.parse(b64urlDecode(msUserB64));
                    sessionStorage.setItem('ms_current_user', JSON.stringify(decoded));
                } catch(e) { console.warn('[auth] ms_user decode failed', e); }
            }

            // Capture access token (passed alongside ms_user after login)
            // Used as Authorization: Bearer header so cross-origin cookie issues don't break auth
            if (msTokenB64) {
                try {
                    var token = b64urlDecode(msTokenB64);
                    sessionStorage.setItem('ms_access_token', token);
                } catch(e) { console.warn('[auth] _t decode failed', e); }
            }

            // Clean URL so hash routing starts fresh
            if (loginError || msUserB64 || msTokenB64) {
                window.history.replaceState({}, '', window.location.pathname);
            }

            window.MicrosoftAuth = {
                signIn: function () { window.location.href = BACKEND + '/auth/microsoft'; },
                loginError: loginError,
