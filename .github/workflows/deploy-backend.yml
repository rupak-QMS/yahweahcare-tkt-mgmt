name: Deploy Backend

# ============================================================
# Deploys the backend to Azure App Service.
# Runs on push to main (backend changes only) or manual trigger.
#
# Required GitHub Secrets (Settings → Secrets → Actions):
#   AZURE_CREDENTIALS — Service Principal JSON from:
#     az ad sp create-for-rbac --sdk-auth ...
# ============================================================

on:
  push:
    branches: [main]
    paths:
      - 'api/**'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:

permissions:
  contents: read

env:
  AZURE_WEBAPP_NAME: yahweahcare-api
  NODE_VERSION: '22'

jobs:
  # ── Test gate ──────────────────────────────────────────────
  test:
    name: Run backend tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: api/package-lock.json

      - name: Install dependencies
        working-directory: api
        run: npm ci

      - name: Run tests
        working-directory: api
        run: npm test -- --passWithNoTests

  # ── Deploy to Azure App Service ────────────────────────────
  deploy:
    name: Deploy to Azure App Service
    needs: test
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://yahweahcare-api.azurewebsites.net

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: api/package-lock.json

      - name: Install production dependencies
        working-directory: api
        run: npm ci --omit=dev

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v2
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          package: api

      - name: Health probe
        run: |
          sleep 15
          curl --fail --retry 5 --retry-delay 5 \
            "https://yahweahcare-api.azurewebsites.net/api/health" && \
            echo "✓ /api/health responded OK"
