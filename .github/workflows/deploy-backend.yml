name: Deploy Backend

# ============================================================
# Deploys the backend-hrms TypeScript service to Vercel.
# Only runs on push to main AND only after CI passes.
#
# Required GitHub Secrets (Settings → Secrets → Actions):
#   VERCEL_TOKEN               — vercel.com/account/tokens
#   VERCEL_ORG_ID              — found in .vercel/project.json after `vercel link`
#   VERCEL_BACKEND_PROJECT_ID  — found in .vercel/project.json for the backend project
# ============================================================

on:
  push:
    branches: [main]
    paths:
      - 'backend-hrms/**'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # ── CI gate ────────────────────────────────────────────────
  ci:
    name: Type-check & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend-hrms/package-lock.json

      - name: Install dependencies
        working-directory: backend-hrms
        run: npm ci

      - name: TypeScript type-check
        working-directory: backend-hrms
        run: npx tsc --noEmit

      - name: Build
        working-directory: backend-hrms
        run: npm run build

  # ── Deploy to Vercel ───────────────────────────────────────
  deploy:
    name: Deploy to Vercel (production)
    needs: ci
    runs-on: ubuntu-latest
    environment:
      name: production
      url: ${{ steps.deploy.outputs.url }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel environment
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_BACKEND_PROJECT_ID }}
        run: vercel pull --yes --environment=production --token=$VERCEL_TOKEN

      - name: Deploy (production)
        id: deploy
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_BACKEND_PROJECT_ID }}
        run: |
          url=$(vercel deploy --prod --token=$VERCEL_TOKEN)
          echo "url=$url" >> $GITHUB_OUTPUT
          echo "✓ Backend deployed → $url"

      - name: Health probe
        run: |
          sleep 10
          curl --fail --retry 5 --retry-delay 5 \
            "${{ steps.deploy.outputs.url }}/health" && \
            echo "✓ /health responded OK"
