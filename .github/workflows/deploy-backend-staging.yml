name: Deploy Backend (Staging)

# ============================================================
# Deploys the backend to Vercel (staging environment).
# Runs on push to staging branch (backend changes only).
#
# Required GitHub Secrets (Settings → Secrets → Actions):
#   VERCEL_TOKEN          — Vercel personal access token
#   VERCEL_ORG_ID         — Vercel team/org ID
#   VERCEL_API_PROJECT_ID — Vercel project ID for the API
#
# DATABASE_URL on Vercel project = Neon DB (staging)
# ============================================================

on:
  push:
    branches: [staging]
    paths:
      - 'api/**'
      - '.github/workflows/deploy-backend-staging.yml'
  workflow_dispatch:

permissions:
  contents: read

env:
  NODE_VERSION: '22'

jobs:
  # ── Test gate ──────────────────────────────────────────────
  test:
    name: Run backend tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: api/package-lock.json

      - name: Install dependencies
        working-directory: api
        run: npm ci

      - name: Run tests
        working-directory: api
        run: npm test -- --passWithNoTests

  # ── Deploy to Vercel (staging) ─────────────────────────────
  deploy:
    name: Deploy to Vercel
    needs: test
    runs-on: ubuntu-latest
    environment:
      name: staging
      url: https://yahweahcare-tkt-mgmt-hx48.vercel.app

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Deploy to Vercel
        working-directory: api
        run: |
          vercel deploy --prod \
            --token=${{ secrets.VERCEL_TOKEN }} \
            --scope=${{ secrets.VERCEL_ORG_ID }} \
            --yes
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_API_PROJECT_ID }}
