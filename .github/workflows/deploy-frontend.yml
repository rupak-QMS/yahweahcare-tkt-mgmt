name: Deploy Frontend

# ============================================================
# Deploys the static Yahweh Care frontend to Vercel.
# Injects the production backend URL into the <meta> tag
# before uploading so the app knows where the API lives.
#
# Required GitHub Secrets (Settings → Secrets → Actions):
#   VERCEL_TOKEN                — vercel.com/account/tokens
#   VERCEL_ORG_ID               — found in .vercel/project.json after `vercel link`
#   VERCEL_FRONTEND_PROJECT_ID  — found in .vercel/project.json for the frontend project
#   PROD_BACKEND_URL            — e.g. https://yahweahcare-backend.vercel.app
# ============================================================

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.github/workflows/deploy-frontend.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy Frontend to Vercel
    runs-on: ubuntu-latest
    environment:
      name: production
      url: ${{ steps.deploy.outputs.url }}

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Inject production backend URL into meta tag
        run: |
          sed -i "s|content=\"http://localhost:4002\"|content=\"${{ secrets.PROD_BACKEND_URL }}\"|g" \
            frontend/index.html
          echo "✓ HRMS API URL set to ${{ secrets.PROD_BACKEND_URL }}"

      - name: Verify injection
        run: grep 'name="hrms-api"' frontend/index.html

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel environment
        working-directory: frontend
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_FRONTEND_PROJECT_ID }}
        run: vercel pull --yes --environment=production --token=$VERCEL_TOKEN

      - name: Deploy (production)
        id: deploy
        working-directory: frontend
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_FRONTEND_PROJECT_ID }}
        run: |
          url=$(vercel deploy --prod --token=$VERCEL_TOKEN)
          echo "url=$url" >> $GITHUB_OUTPUT
          echo "✓ Frontend deployed → $url"

      - name: Smoke test
        run: |
          sleep 10
          curl --fail --retry 5 --retry-delay 5 \
            "${{ steps.deploy.outputs.url }}/" && \
            echo "✓ Frontend responding OK"
