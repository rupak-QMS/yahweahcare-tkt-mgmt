name: Deploy Frontend

# ============================================================
# Builds and deploys the frontend to Azure Static Web Apps.
# Runs on push to main (frontend changes only) or manual trigger.
#
# Required GitHub Secrets (Settings → Secrets → Actions):
#   AZURE_STATIC_WEB_APPS_API_TOKEN — from Azure Portal:
#     Static Web App → yahweahcare → Manage deployment token
# ============================================================

# DISABLED 2026-07-04: auto-trigger removed. The target Azure Static Web App
# no longer exists / its deploy token is stale ("No matching Static Web App
# was found or the api key was invalid"), so this was failing on every push.
# The real production frontend deploys via Vercel's own Git integration, not
# this workflow. Kept for manual/historical use only - run via Actions tab
# ("Run workflow") if Azure hosting is ever restored.
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build_and_deploy:
    name: Build and Deploy Frontend
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    environment:
      name: production
      url: https://thankful-bay-00c592d00.7.azurestaticapps.net

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: YCTMFrontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: YCTMFrontend
        run: npm ci

      - name: Build frontend (Babel + Terser)
        working-directory: YCTMFrontend
        run: node build.js

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: YCTMFrontend
          output_location: ''
          skip_app_build: true

  close_pull_request:
    name: Close Pull Request
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    steps:
      - name: Close pull request environment
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          action: close
