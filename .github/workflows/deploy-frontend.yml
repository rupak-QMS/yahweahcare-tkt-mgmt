name: Deploy Frontend

# ============================================================
# Deploy the static Yahweh Care frontend to Azure App Service.
# Uses the tiny Node static server in frontend/server.js.
# ============================================================

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.github/workflows/deploy-frontend.yml'
  workflow_dispatch:

env:
  NODE_VERSION: '20'
  AZURE_WEBAPP_NAME: yahwehcare-hrms-web    # ← Azure App Service name (override in repo Variables)

jobs:
  deploy:
    name: Deploy frontend
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://${{ env.AZURE_WEBAPP_NAME }}.azurewebsites.net
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Inject production HRMS API URL
        run: |
          # Replace localhost API URL with the production backend
          sed -i.bak "s|http://localhost:4001|${{ secrets.PROD_BACKEND_URL }}|g" frontend/index.html
          # Or use the <meta name="hrms-api"> tag — add it to the <head>
          sed -i.bak "s|<title>Yahweh Care|<meta name=\"hrms-api\" content=\"${{ secrets.PROD_BACKEND_URL }}\" />\n<title>Yahweh Care|" frontend/index.html
          echo "✓ API URL baked in: ${{ secrets.PROD_BACKEND_URL }}"

      - name: Create web.config for IIS/Azure App Service
        run: |
          cat > frontend/web.config <<'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <configuration>
            <system.webServer>
              <handlers>
                <add name="iisnode" path="server.js" verb="*" modules="iisnode" />
              </handlers>
              <rewrite>
                <rules>
                  <rule name="DynamicContent">
                    <match url="/*" />
                    <action type="Rewrite" url="server.js" />
                  </rule>
                </rules>
              </rewrite>
              <httpProtocol>
                <customHeaders>
                  <add name="X-Content-Type-Options" value="nosniff" />
                  <add name="X-Frame-Options" value="SAMEORIGIN" />
                  <add name="Referrer-Policy" value="strict-origin-when-cross-origin" />
                </customHeaders>
              </httpProtocol>
            </system.webServer>
          </configuration>
          EOF

      - name: Create package.json for the static server
        working-directory: frontend
        run: |
          if [ ! -f package.json ]; then
            cat > package.json <<'EOF'
          {
            "name": "yahwehcare-frontend",
            "version": "1.0.0",
            "private": true,
            "scripts": { "start": "node server.js" },
            "engines": { "node": ">=18" }
          }
          EOF
          fi

      - name: Authenticate to Azure (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          package: ./frontend

      - name: Health probe
        run: |
          sleep 15
          curl --fail --retry 5 --retry-delay 5 \
            https://${{ env.AZURE_WEBAPP_NAME }}.azurewebsites.net/
          echo "✓ Frontend deployed"

      - name: Logout from Azure
        if: always()
        run: az logout
