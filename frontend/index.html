      const count = resolvedTickets.filter(t => {
        const r = t.resolvedAt ? new Date(t.resolvedAt) : t.updatedAt ? new Date(t.updatedAt) : null;
        return r && r >= start && r < end;

      weeks.push({ name: `Week ${4 - w}`, resolved: count });

const KPIBar = ({ label, value, suffix, target, good, reverse }) => {
  const pct = reverse
    ? Math.max(0, Math.min(100, 100 - ((value / (target * 2)) * 100)))
    : Math.max(0, Math.min(100, (value / target) * 100));
  const barColor = good ? 'bg-emerald-500' : value === 0 ? 'bg-slate-300' : 'bg-orange-500';
  const valueColor = good ? 'text-emerald-600' : value === 0 ? 'text-slate-400' : 'text-orange-600';
  return (
    <div className="card p-5">
      <div className="flex items-center justify-between mb-2">
        <span className="text-sm font-medium text-slate-700">{label}</span>
        <span className={`text-sm font-bold ${valueColor}`}>{value}{suffix}</span>
      </div>
      <div className="w-full h-2 bg-slate-100 rounded-full overflow-hidden mb-2">
        <div className={`h-full ${barColor} rounded-full transition-all`} style={{ width: pct + '%' }}></div>
      </div>
      <div className="text-xs text-slate-500">Target: {target}{suffix}</div>
    </div>
  );
};

// TEAM COMPARISON

const computeTeamMetrics = (deptName, members, tickets) => {
  const memberIds = members.map(m => m.id);
  const assigned = tickets.filter(t => memberIds.includes(t.assigneeId));
  const resolved = assigned.filter(t => ['resolved', 'closed'].includes(t.status));
  const open = assigned.filter(t => !['resolved', 'closed'].includes(t.status));
  const escalated = assigned.filter(t => t.status === 'escalated');
  const urgentOpen = assigned.filter(t => t.priority === 'urgent' && !['resolved', 'closed'].includes(t.status));
  const closedWithTime = resolved.filter(t => t.resolvedAt);
  const slaMetCount = closedWithTime.filter(t => computeSLA(t).met).length;
  const slaPct = closedWithTime.length ? Math.round((slaMetCount / closedWithTime.length) * 100) : 100;
  const avgHours = closedWithTime.length === 0 ? 0 :
    Math.round(closedWithTime.reduce((s, t) => s + ((new Date(t.resolvedAt).getTime() - new Date(t.createdAt).getTime()) / 3600000), 0) / closedWithTime.length);
  const resolutionRate = assigned.length ? Math.round((resolved.length / assigned.length) * 100) : 0;
  return {
    department: deptName,
    members,
    memberCount: members.length,
    assigned: assigned.length,
    resolved: resolved.length,
    open: open.length,
    escalated: escalated.length,
    urgentOpen: urgentOpen.length,
    slaPct,
    avgHours,
    resolutionRate,
  };
};

// Team Insight Modal — drilldown when "View Details" clicked on a team card

  if (!open || !team) return null;

  const memberIds = team.members.map(m => m.id);
  const assignedTickets = tickets.filter(t => memberIds.includes(t.assigneeId));
  const resolvedTickets = assignedTickets.filter(t => ['resolved', 'closed'].includes(t.status));

  // Weekly trend for the team
  const weeklyTrend = (() => {
    const weeks = [];
    for (let w = 3; w >= 0; w--) {
      const start = new Date(); start.setDate(start.getDate() - (w + 1) * 7);
      const end   = new Date(); end.setDate(end.getDate() - w * 7);
      const count = resolvedTickets.filter(t => {
        const r = t.resolvedAt ? new Date(t.resolvedAt) : t.updatedAt ? new Date(t.updatedAt) : null;
        return r && r >= start && r < end;
      }).length;
      weeks.push({ name: `Week ${4 - w}`, resolved: count });
    }
    return weeks;
  })();

  // Top performer of the team
  const topPerformer = (() => {
    let best = null;
    let bestCount = -1;
    team.members.forEach(m => {
      const cnt = resolvedTickets.filter(t => t.assigneeId === m.id).length;
      if (cnt > bestCount) { bestCount = cnt; best = m; }
    });
    return best && bestCount > 0 ? { user: best, count: bestCount } : null;
  })();

  const ticketsPerStaff = team.memberCount ? Math.round(team.assigned / team.memberCount) : 0;
  const deptInitial = team.department.charAt(0).toUpperCase();
  const deptColors = ['bg-blue-500', 'bg-emerald-500', 'bg-purple-500', 'bg-orange-500', 'bg-pink-500', 'bg-cyan-500', 'bg-indigo-500', 'bg-teal-500'];

  return (
    <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/40 fade-in" onClick={onClose}>
      <div className="bg-white rounded-2xl shadow-2xl w-full max-w-2xl max-h-[90vh] overflow-y-auto scrollbar-thin" onClick={e => e.stopPropagation()}>

            <div className={`w-10 h-10 ${deptColors[colorIdx]} rounded-xl flex items-center justify-center text-white font-bold`}>{deptInitial}</div>
            <div>
              <div className="flex items-center gap-2">
                <h2 className="text-xl font-bold text-slate-800">{team.department}</h2>

        </div>

        {/* Body */}
        <div className="p-6">
          {/* KPI cards */}
          <div className="grid grid-cols-4 gap-3 mb-5">
            <div className="bg-slate-50 rounded-xl p-3 text-center">
              <div className="flex justify-center mb-1"><Icon name="activity" className="w-5 h-5 text-blue-500" /></div>
              <div className="text-2xl font-bold text-slate-800">{team.assigned}</div>
              <div className="text-xs text-slate-500 mt-1">Total Assigned</div>
            </div>
            <div className="bg-emerald-50 rounded-xl p-3 text-center">
              <div className="flex justify-center mb-1"><Icon name="sent" className="w-5 h-5 text-emerald-500" /></div>
              <div className="text-2xl font-bold text-slate-800">{team.resolved}</div>
              <div className="text-xs text-slate-500 mt-1">Resolved</div>
            </div>
            <div className="bg-sky-50 rounded-xl p-3 text-center">
              <div className="flex justify-center mb-1"><Icon name="clock" className="w-5 h-5 text-sky-500" /></div>
              <div className="text-2xl font-bold text-slate-800">{assignedTickets.filter(t => t.status === 'in_progress').length}</div>
              <div className="text-xs text-slate-500 mt-1">In Progress</div>

            <div className="bg-orange-50 rounded-xl p-3 text-center">
              <div className="flex justify-center mb-1"><Icon name="alert" className="w-5 h-5 text-orange-500" /></div>
              <div className="text-2xl font-bold text-slate-800">{team.escalated}</div>
              <div className="text-xs text-slate-500 mt-1">Escalated</div>
            </div>
          </div>

          {/* Progress bars with targets */}
          <div className="space-y-4 mb-5">
            <KPIBar label="SLA Compliance" value={team.slaPct} suffix="%" target={90} good={team.slaPct >= 70} />
            <KPIBar label="Resolution Rate" value={team.resolutionRate} suffix="%" target={80} good={team.resolutionRate >= 60} />
            <KPIBar label="Avg Resolution Time" value={team.avgHours} suffix="h" target={48} good={team.avgHours > 0 && team.avgHours <= 48} reverse />
            <KPIBar label="Tickets per Staff" value={ticketsPerStaff} suffix="" target={10} good={ticketsPerStaff > 0 && ticketsPerStaff <= 10} reverse />
          </div>

          {/* Weekly Resolution Trend */}
          <div className="card p-4 mb-5">
            <h3 className="font-semibold text-slate-800 mb-3">Weekly Resolution Trend</h3>
            <ResponsiveContainer width="100%" height={180}>
              <LineChart data={weeklyTrend}>
                <CartesianGrid strokeDasharray="3 3" stroke="#e2e8f0" />
                <XAxis dataKey="name" tick={{ fontSize: 11, fill: '#64748b' }} />
                <YAxis allowDecimals={false} tick={{ fontSize: 11, fill: '#64748b' }} />
                <Tooltip />
                <Line type="monotone" dataKey="resolved" stroke="#6366F1" strokeWidth={3} dot={{ r: 5, fill: '#6366F1' }} />
              </LineChart>
            </ResponsiveContainer>
          </div>

          {/* Top performer */}
          {topPerformer && (
            <div className="rounded-xl p-4 bg-gradient-to-br from-amber-50 to-yellow-50 border border-amber-200 flex items-center justify-between">
              <div className="flex items-center gap-3">
                <div className="w-10 h-10 bg-amber-200 rounded-full flex items-center justify-center text-lg">👑</div>
                <div>
                  <div className="text-xs font-semibold text-amber-700 uppercase tracking-wider">Top Performer</div>
                  <div className="font-bold text-slate-800">{topPerformer.user.name}</div>
                  <div className="text-xs text-slate-600">{topPerformer.count} ticket{topPerformer.count !== 1 ? 's' : ''} resolved</div>
                </div>
              </div>
              <button onClick={() => { onClose(); onOpenStaff(topPerformer.user.id); }} className="flex items-center gap-1.5 px-3 py-1.5 border border-amber-300 text-amber-700 rounded-lg text-sm font-medium hover:bg-amber-100 transition">
                View Profile <Icon name="chevronRight" className="w-4 h-4" />
              </button>
            </div>
          )}

          {/* Members list */}
          {team.members.length > 0 && (
            <div className="mt-5">
              <div className="text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2">Team Members</div>
              <div className="flex flex-wrap gap-2">
                {team.members.map(m => (
                  <button key={m.id} onClick={() => { onClose(); onOpenStaff(m.id); }} className="flex items-center gap-2 px-3 py-1.5 border border-slate-200 rounded-lg text-sm hover:bg-slate-50 hover:border-blue-300 transition">
                    <Avatar user={m} size="sm" />
                    <span className="text-slate-700">{m.name}</span>
                  </button>
                ))}
              </div>
            </div>
          )}
        </div>

        {/* Footer */}
        <div className="px-6 py-4 border-t border-slate-100 flex items-center justify-end gap-2 sticky bottom-0 bg-white">
          <Button variant="secondary" onClick={onClose}>Close</Button>
          <Button variant="primary" onClick={() => { onClose(); onViewTickets(team); }}>
            View Team Tickets <Icon name="chevronRight" className="w-4 h-4" />
          </Button>
        </div>
      </div>
      </div>
  );
};

const TeamComparison = ({ tickets, users, currentUser, onOpenStaff, onViewTeamTickets, onNavigate }) => {
  const [selectedTeams, setSelectedTeams] = useState([]);
  const [insightTeam, setInsightTeam] = useState(null);
  const isAdminUser = isAdmin(currentUser);
  const breadcrumbs = [
    { label: 'Dashboard', clickable: true, action: 'dashboard', icon: 'dashboard' },
    { label: 'Team Comparison', clickable: false },
  ];
  const myDept = currentUser.department;

  // Group users by department
  const teams = useMemo(() => {
    const byDept = {};
    users.forEach(u => { (byDept[u.department] = byDept[u.department] || []).push(u); });
    return Object.entries(byDept).map(([dept, members]) => computeTeamMetrics(dept, members, tickets))
      .sort((a, b) => b.resolved - a.resolved);
  }, [users, tickets]);

  // Top-level metrics
  const totalTeams = teams.length;
  const bestTeam = [...teams].sort((a, b) => b.slaPct - a.slaPct)[0];
  const mostTickets = [...teams].sort((a, b) => b.assigned - a.assigned)[0];
  const fastestTeam = [...teams].filter(t => t.avgHours > 0).sort((a, b) => a.avgHours - b.avgHours)[0];

  // Chart: tickets resolved vs assigned per team
  const teamBarData = teams.map(t => ({
    name: t.department.length > 12 ? t.department.slice(0, 12) + '…' : t.department,
    assigned: t.assigned,
    resolved: t.resolved,
  })).filter(t => t.assigned > 0);

  // Chart: SLA per team
  const slaBarData = teams.map(t => ({
    name: t.department.length > 12 ? t.department.slice(0, 12) + '…' : t.department,
    sla: t.slaPct,
    fill: t.slaPct >= 70 ? '#10b981' : '#ef4444',
  }));

  // Radar for head-to-head: only when 2+ teams selected
  const radarData = useMemo(() => {
    if (selectedTeams.length === 0) return [];
    const dims = [
      { axis: 'Resolution', getter: (t) => Math.min(100, t.resolved * 10) },
      { axis: 'SLA',        getter: (t) => t.slaPct },
      { axis: 'Speed',      getter: (t) => t.avgHours ? Math.max(0, 100 - t.avgHours) : 0 },
      { axis: 'Volume',     getter: (t) => Math.min(100, t.assigned * 5) },
      { axis: 'Throughput', getter: (t) => t.resolutionRate },
    ];
    return dims.map(d => {
      const row = { axis: d.axis };
      selectedTeams.forEach(name => {
        const t = teams.find(x => x.department === name);
        row[name] = t ? d.getter(t) : 0;
      });
      return row;
    });
  }, [selectedTeams, teams]);

  const radarColors = ['#6366F1', '#06B6D4', '#F59E0B', '#8B5CF6'];

  const toggleTeam = (dept) => {
    setSelectedTeams(prev => {
      if (prev.includes(dept)) return prev.filter(d => d !== dept);
      if (prev.length >= 4) return prev;
      return [...prev, dept];
    });
  };


  return (
    <>
      <Breadcrumb items={breadcrumbs} onNavigate={onNavigate} />
      <div className="p-6 flex-1 overflow-y-auto scrollbar-thin">
        {/* Header */}
        <div className="flex items-start justify-between mb-6">
        <div className="flex items-start gap-2">
          <Icon name="branch" className="w-7 h-7 text-blue-600 mt-1" />
          <div>
            <h1 className="text-3xl font-bold text-slate-900">Team Comparison</h1>
            <p className="text-sm text-slate-500 mt-1">Compare departments side-by-side — performance, SLA, and workload</p>
          </div>
        </div>
        <Button variant="secondary" size="md" onClick={() => exportToPDF({
            title: 'Team Comparison Report',
            subtitle: 'Department performance side-by-side',
            generatedBy: currentUser.name,
            stats: [
              { label: 'Total Teams', value: totalTeams },
              { label: 'Best SLA', value: bestTeam ? bestTeam.department + ' ' + bestTeam.slaPct + '%' : '—' },
              { label: 'Fastest Team', value: fastestTeam ? fastestTeam.department + ' ' + fastestTeam.avgHours + 'h' : '—' },
            ],
            columns: ['Department', 'Members', 'Assigned', 'Resolved', 'Open', 'SLA %', 'Avg Hrs', 'Resolution Rate'],
            rows: teams.map(t => [
              t.department,
              t.memberCount,
              t.assigned,
              t.resolved,
              t.open,
              t.slaPct + '%',
              t.avgHours + 'h',
              t.resolutionRate + '%',
            ]),
          })}><Icon name="document" className="w-4 h-4" /> Export PDF</Button>
      </div>

      {!isAdminUser && (
        <div className="card p-3 mb-4 bg-blue-50 border-blue-200 flex items-center gap-2">
          <Icon name="branch" className="w-4 h-4 text-blue-600" />
          <span className="text-sm text-blue-800">Your team — <strong>{myDept}</strong> — is highlighted. You can compare against other teams to benchmark.</span>
        </div>
      )}

      {/* KPI cards */}
      <div className="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-6">
        <StaffStatCard label="Total Teams" value={totalTeams} icon="branch" bgClass="bg-gradient-to-br from-blue-50 to-slate-50" iconColor="text-blue-600" />
        <StaffStatCard label="Best SLA" value={bestTeam ? `${bestTeam.slaPct}%` : '—'} icon="trend" bgClass="bg-gradient-to-br from-emerald-50 to-slate-50" iconColor="text-emerald-600" />
        <StaffStatCard label="Most Tickets" value={mostTickets ? mostTickets.assigned : 0} icon="activity" bgClass="bg-gradient-to-br from-sky-50 to-slate-50" iconColor="text-sky-600" />
        <StaffStatCard label="Fastest Team" value={fastestTeam ? `${fastestTeam.avgHours}h` : '—'} icon="clock" bgClass="bg-gradient-to-br from-amber-50 to-slate-50" iconColor="text-amber-600" />
      </div>

      {/* Annotation: best/most/fastest */}
      <div className="grid lg:grid-cols-3 gap-3 mb-6">
        {bestTeam && (
          <div className="card p-4 bg-gradient-to-br from-emerald-50 to-white border-emerald-200">
            <div className="flex items-center gap-2 mb-1"><span className="text-xl">🏆</span><span className="text-xs font-semibold text-emerald-700 uppercase tracking-wider">Highest SLA</span></div>
            <div className="font-bold text-slate-800">{bestTeam.department}</div>
            <div className="text-xs text-slate-500">{bestTeam.slaPct}% on-time · {bestTeam.memberCount} member{bestTeam.memberCount !== 1 ? 's' : ''}</div>
          </div>
        )}
        {mostTickets && (
          <div className="card p-4 bg-gradient-to-br from-sky-50 to-white border-sky-200">
            <div className="flex items-center gap-2 mb-1"><span className="text-xl">📈</span><span className="text-xs font-semibold text-sky-700 uppercase tracking-wider">Most Active</span></div>
            <div className="font-bold text-slate-800">{mostTickets.department}</div>
            <div className="text-xs text-slate-500">{mostTickets.assigned} tickets handled · {mostTickets.resolved} resolved</div>
          </div>
        )}
        {fastestTeam && (
          <div className="card p-4 bg-gradient-to-br from-amber-50 to-white border-amber-200">
            <div className="flex items-center gap-2 mb-1"><span className="text-xl">⚡</span><span className="text-xs font-semibold text-amber-700 uppercase tracking-wider">Fastest</span></div>
            <div className="font-bold text-slate-800">{fastestTeam.department}</div>
            <div className="text-xs text-slate-500">{fastestTeam.avgHours}h avg · {fastestTeam.resolutionRate}% resolution rate</div>
          </div>
        )}
      </div>

      {/* Charts row */}
      <div className="grid lg:grid-cols-2 gap-4 mb-6">
        <div className="card p-6">
          <div className="flex items-center gap-2 mb-1">
            <Icon name="activity" className="w-5 h-5 text-blue-600" />
            <h2 className="font-semibold text-slate-800">Ticket Volume by Team</h2>
          </div>
          <p className="text-xs text-slate-500 mb-4">Resolved vs assigned per department</p>
          <ResponsiveContainer width="100%" height={300}>
            <BarChart data={teamBarData}>
              <CartesianGrid strokeDasharray="3 3" stroke="#e2e8f0" />
              <XAxis dataKey="name" tick={{ fontSize: 10, fill: '#64748b' }} angle={-15} textAnchor="end" height={50} />
              <YAxis tick={{ fontSize: 11, fill: '#64748b' }} />
              <Tooltip />
              <Legend wrapperStyle={{ fontSize: '11px' }} />
              <Bar dataKey="resolved" fill="#6366F1" name="Resolved" radius={[4,4,0,0]} />
              <Bar dataKey="assigned" fill="#06B6D4" name="Assigned" radius={[4,4,0,0]} />
            </BarChart>
          </ResponsiveContainer>
        </div>
        <div className="card p-6">
          <div className="flex items-center gap-2 mb-1">
            <Icon name="trend" className="w-5 h-5 text-emerald-600" />
            <h2 className="font-semibold text-slate-800">SLA Compliance by Team</h2>
          </div>
          <p className="text-xs text-slate-500 mb-4">On-time resolution percentage</p>
          <ResponsiveContainer width="100%" height={300}>
            <BarChart data={slaBarData} layout="vertical" margin={{ left: 8, right: 16 }}>
              <CartesianGrid strokeDasharray="3 3" stroke="#e2e8f0" horizontal={false} />
              <XAxis type="number" domain={[0, 100]} tick={{ fontSize: 11, fill: '#64748b' }} ticks={[0,25,50,75,100]} />
              <YAxis dataKey="name" type="category" tick={{ fontSize: 11, fill: '#64748b' }} width={110} />
              <Tooltip formatter={(v) => `${v}%`} />
              <Bar dataKey="sla" radius={[0,4,4,0]}>
                {slaBarData.map((e, i) => <Cell key={i} fill={e.fill} />)}
              </Bar>
            </BarChart>
          </ResponsiveContainer>
        </div>
      </div>

      {/* Head-to-head comparison */}
      <div className="card p-6 mb-6">
        <div className="flex items-center justify-between mb-4">
          <div>
            <h2 className="font-semibold text-slate-800">Head-to-Head Comparison</h2>
            <p className="text-xs text-slate-500 mt-0.5">Select up to 4 teams below to compare them across 5 dimensions</p>
          </div>
          {selectedTeams.length > 0 && (
            <button onClick={() => setSelectedTeams([])} className="text-xs text-slate-500 hover:text-red-600">Clear selection</button>
          )}
        </div>
        {selectedTeams.length >= 2 ? (
          <ResponsiveContainer width="100%" height={350}>
            <RadarChart data={radarData}>
              <PolarGrid stroke="#e2e8f0" />
              <PolarAngleAxis dataKey="axis" tick={{ fontSize: 12, fill: '#475569' }} />
              <PolarRadiusAxis angle={90} domain={[0, 100]} tick={{ fontSize: 10, fill: '#94a3b8' }} />
              <Tooltip />
              <Legend wrapperStyle={{ fontSize: '12px' }} />
              {selectedTeams.map((dept, idx) => (
                <Radar key={dept} name={dept} dataKey={dept} stroke={radarColors[idx]} fill={radarColors[idx]} fillOpacity={0.2} strokeWidth={2} />
              ))}
            </RadarChart>
          </ResponsiveContainer>
        ) : (
          <div className="flex items-center justify-center py-12 text-center text-slate-500">
            <div>
              <Icon name="trend" className="w-10 h-10 mx-auto mb-2 text-slate-300" />
              <div className="text-sm">{selectedTeams.length === 0 ? 'Click on team cards below to start comparing' : 'Select at least one more team to compare'}</div>
            </div>
          </div>
        )}
      </div>

      {/* Team cards */}
      <h2 className="font-semibold text-slate-800 mb-3 px-1">All Teams</h2>
      <div className="grid md:grid-cols-2 lg:grid-cols-3 gap-4">
        {teams.map(t => {
          const isSel = selectedTeams.includes(t.department);
          const slaColor = t.slaPct >= 80 ? 'bg-emerald-500' : t.slaPct >= 50 ? 'bg-amber-500' : 'bg-red-500';
          const slaText  = t.slaPct >= 80 ? 'text-emerald-600' : t.slaPct >= 50 ? 'text-amber-600' : 'text-red-600';
          const deptInitial = t.department.charAt(0).toUpperCase();
          const deptColors = ['bg-blue-500', 'bg-emerald-500', 'bg-purple-500', 'bg-orange-500', 'bg-pink-500', 'bg-cyan-500', 'bg-indigo-500', 'bg-teal-500'];
          const colorIdx = t.department.charCodeAt(0) % deptColors.length;
          const isMyTeam = !isAdminUser && t.department === myDept;
          return (
            <div key={t.department} className={`card p-5 transition cursor-pointer relative ${isSel ? 'border-2 border-blue-500 shadow-md' : isMyTeam ? 'border-2 border-emerald-400 shadow-md' : 'hover:border-blue-200 hover:shadow-md'}`} onClick={() => toggleTeam(t.department)}>
              {isMyTeam && <Badge className="absolute -top-2 -right-2 bg-emerald-500 text-white shadow-md">Your team</Badge>}
              <div className="flex items-center justify-between mb-4">
                <div className="flex items-center gap-3">
                  <div className={`w-12 h-12 ${deptColors[colorIdx]} rounded-xl flex items-center justify-center text-white font-bold text-lg`}>{deptInitial}</div>
                  <div>
                    <div className="font-bold text-slate-800">{t.department}</div>
                    <div className="text-xs text-slate-500">{t.memberCount} member{t.memberCount !== 1 ? 's' : ''}</div>
                  </div>
                </div>
                <div className={`w-5 h-5 rounded-full border-2 flex items-center justify-center ${isSel ? 'bg-blue-500 border-blue-500' : 'border-slate-300'}`}>
                  {isSel && <Icon name="check" className="w-3 h-3 text-white" />}
                </div>
              </div>
              <div className="grid grid-cols-3 gap-2 text-center py-3 border-y border-slate-100">
                <div>
                  <div className="text-2xl font-bold text-slate-800">{t.resolved}</div>
                  <div className="text-xs text-slate-500 mt-1">Resolved</div>
                </div>
                <div>
                  <div className="text-2xl font-bold text-slate-800">{t.open}</div>
                  <div className="text-xs text-slate-500 mt-1">Open</div>
                </div>
                <div>
                  <div className="text-2xl font-bold text-slate-800">{t.urgentOpen}</div>
                  <div className="text-xs text-slate-500 mt-1">Urgent</div>
                </div>
              </div>
              <div className="mt-4 space-y-3">
                <div>
                  <div className="flex items-center justify-between text-xs mb-1.5">
                    <span className="text-slate-600 font-medium">SLA Compliance</span>
                    <span className={`font-semibold ${slaText}`}>{t.slaPct}%</span>
                  </div>
                  <div className="w-full h-2 bg-slate-100 rounded-full overflow-hidden">
                    <div className={`h-full ${slaColor}`} style={{ width: t.slaPct + '%' }}></div>
                  </div>
                </div>
                <div>
                  <div className="flex items-center justify-between text-xs mb-1.5">
                    <span className="text-slate-600 font-medium">Resolution Rate</span>
                    <span className="font-semibold text-blue-600">{t.resolutionRate}%</span>
                  </div>
                  <div className="w-full h-2 bg-slate-100 rounded-full overflow-hidden">
                    <div className="h-full bg-blue-500" style={{ width: t.resolutionRate + '%' }}></div>
                  </div>
                </div>
              </div>
              <div className="flex items-center justify-between mt-4 text-xs text-slate-500">
                <div className="flex items-center gap-1.5"><Icon name="clock" className="w-3.5 h-3.5" />{t.avgHours ? `${t.avgHours}h avg` : 'N/A'}</div>
                {t.escalated > 0 && <div className="flex items-center gap-1.5 text-orange-600"><Icon name="alert" className="w-3.5 h-3.5" />{t.escalated} escalated</div>}
              </div>
              <div className="flex items-center justify-between gap-2 mt-4 pt-3 border-t border-slate-100">
                {t.members.length > 0 ? (
                  <div className="flex items-center gap-1">
                    {t.members.slice(0, 4).map(m => (
                      <button key={m.id} onClick={(e) => { e.stopPropagation(); onOpenStaff(m.id); }} title={m.name} className="hover:scale-110 transition">
                        <Avatar user={m} size="sm" />
                      </button>
                    ))}
                    {t.members.length > 4 && <span className="text-xs text-slate-500 ml-1">+{t.members.length - 4}</span>}
                  </div>
                ) : <span></span>}
                <button onClick={(e) => { e.stopPropagation(); setInsightTeam(t); }} className="flex items-center gap-1.5 px-3 py-1.5 text-xs font-medium text-blue-600 border border-blue-200 rounded-lg hover:bg-blue-50 transition">
                  View Details <Icon name="chevronRight" className="w-3.5 h-3.5" />
                </button>
              </div>
            </div>
          );
        })}
      </div>

      {/* Team insight modal */}
      <TeamInsightModal
        open={!!insightTeam}
        team={insightTeam}
        tickets={tickets}
        users={users}
        onClose={() => setInsightTeam(null)}
        onOpenStaff={onOpenStaff}
        onViewTickets={(team) => onViewTeamTickets(team.members.map(m => m.id))}
      />
      </div>
    </>
  );
};

const DAYS_OF_WEEK = ['Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday', 'Sunday'];

const computeNextSend = (schedule) => {
  const [hh, mm] = (schedule.time || '09:00').split(':').map(Number);
  const next = new Date();
  next.setHours(hh, mm, 0, 0);
  if (schedule.frequency === 'daily') {
    if (next <= new Date()) next.setDate(next.getDate() + 1);
  } else if (schedule.frequency === 'weekly') {
    const targetDay = DAYS_OF_WEEK.indexOf(schedule.dayOfWeek || 'Monday') + 1;
    const cur = next.getDay() === 0 ? 7 : next.getDay();
    let diff = targetDay - cur;
    if (diff < 0 || (diff === 0 && next <= new Date())) diff += 7;
    next.setDate(next.getDate() + diff);
  } else if (schedule.frequency === 'monthly') {
    next.setDate(schedule.dayOfMonth || 1);
    if (next <= new Date()) next.setMonth(next.getMonth() + 1);
  }
  return next.toISOString();
};

const scheduleSummary = (s) => {
  const time = s.time || '09:00';
  if (s.frequency === 'daily')   return `Daily at ${time}`;
  if (s.frequency === 'weekly')  return `Every ${s.dayOfWeek || 'Monday'} at ${time}`;
  if (s.frequency === 'monthly') return `Monthly on day ${s.dayOfMonth || 1} at ${time}`;
  return '';
};

        })}
      </div>

      <ScheduleModal open={modalOpen} initial={editing} users={users} onClose={() => setModalOpen(false)} onSave={save} />

      {/* Delete confirm */}
      {deleteConfirm && (
        <Modal open={true} onClose={() => setDeleteConfirm(null)} title="Delete schedule?">
          <div className="p-6">
            <p className="text-sm text-slate-600">Are you sure you want to delete <span className="font-semibold text-slate-800">"{deleteConfirm.name}"</span>? This action cannot be undone.</p>
            <div className="flex justify-end gap-2 mt-5">
              <Button variant="secondary" onClick={() => setDeleteConfirm(null)}>Cancel</Button>
              <Button variant="danger" onClick={() => { onDelete(deleteConfirm.id); setDeleteConfirm(null); }}>Delete</Button>
            </div>
          </div>
        </Modal>
      )}
    </div>
  );
};

// Small helper — save button with a loading spinner for StaffModal
const StaffSaveButton = ({ canSave, isEdit, onSave }) => {
  const [busy, setBusy] = useState(false);
  const handle = () => {
    if (!canSave || busy) return;
    setBusy(true);
    setTimeout(() => { onSave(); setBusy(false); }, 300);
  };
  return (
    <button onClick={handle} disabled={!canSave || busy}
      className="inline-flex items-center justify-center gap-2 px-4 py-2 text-sm font-medium rounded-lg transition bg-blue-600 hover:bg-blue-700 text-white shadow-sm disabled:opacity-50"
      style={busy ? {boxShadow:'0 0 16px rgba(59,130,246,0.4)'} : {}}>
      {busy ? <span className="btn-spinner" style={{width:'14px',height:'14px'}}></span> : null}
      {busy ? (isEdit ? 'Saving…' : 'Adding…') : (isEdit ? 'Save Changes' : 'Add Staff')}
    </button>
  );
};

const StaffManagement = ({ users, tickets, currentUser, onAddStaff, onUpdateStaff, onDeleteStaff, onNavigate }) => {
  const admin    = isAdmin(currentUser);
  const canManage = admin || currentUser.role === 'manager';
  const MIN_ADMINS = 2;

  const [search, setSearch]       = useState('');
  const [deptFilter, setDeptFilter] = useState('all');
  const [statusFilter, setStatusFilter] = useState('all');
  const [viewMode, setViewMode]   = useState('list'); // 'list' | 'grouped'
  const [editing, setEditing]     = useState(null);
  const [modalOpen, setModalOpen] = useState(false);
  const [confirm, setConfirm]     = useState(null);
  const [activeTab, setActiveTab] = useState('staff');

  // Org hierarchy data (loaded from /org endpoint)
  const [orgDepts, setOrgDepts]         = useState([]);
  const [orgPositions, setOrgPositions] = useState([]);

  useEffect(() => {
    // Load departments and positions for the modal dropdowns
    Promise.all([
      fetch(`${API_BASE}/org/departments`, { credentials: 'include' }).then(r => r.ok ? r.json() : {}),
      fetch(`${API_BASE}/org/positions`,   { credentials: 'include' }).then(r => r.ok ? r.json() : {}),
    ]).then(([deptData, posData]) => {
      if (deptData.departments) setOrgDepts(deptData.departments);
      if (posData.positions)    setOrgPositions(posData.positions);
    }).catch(() => {});
  }, []);

  const breadcrumbs = [
    { label: 'Dashboard', clickable: true, action: 'dashboard', icon: 'dashboard' },
    { label: 'Staff Management', clickable: false },
  ];

  // Scoped by role — managers see their dept only
  const scopedUsers = admin ? users : users.filter(u => u.department === currentUser.department);
  const activeAdminCount = scopedUsers.filter(u => u.isAdmin && u.active !== false).length;
  const allDepts = Array.from(new Set(scopedUsers.map(u => u.department).filter(Boolean))).sort();

  const filtered = useMemo(() => scopedUsers.filter(u => {
    if (deptFilter !== 'all' && u.department !== deptFilter) return false;
    if (statusFilter === 'active'     && u.active === false)  return false;
    if (statusFilter === 'inactive'   && u.active !== false)  return false;
    if (statusFilter === 'assignable' && !u.assignable)       return false;
    if (search.trim()) {
      const q = search.toLowerCase();
      if (!u.name.toLowerCase().includes(q)
        && !(u.email||'').toLowerCase().includes(q)
        && !(u.designation||'').toLowerCase().includes(q)
        && !(u.department||'').toLowerCase().includes(q)) return false;
    }
    return true;
  }), [scopedUsers, deptFilter, statusFilter, search]);

  const total    = scopedUsers.length;
  const active   = scopedUsers.filter(u => u.active !== false).length;
  const inactive = total - active;
  const assignable = scopedUsers.filter(u => u.assignable).length;

  // Grouped by department for 'grouped' view
  const grouped = useMemo(() => {
    const map = {};
    for (const u of filtered) {
      const d = u.department || 'Unassigned';
      if (!map[d]) map[d] = [];
      map[d].push(u);
    }
    return map;
  }, [filtered]);

  const openCreate = () => { setEditing(null); setModalOpen(true); };
  const openEdit   = (u) => { setEditing(u); setModalOpen(true); };
  const save = (form) => {
    if (editing) onUpdateStaff(editing.id, form);
    else onAddStaff(form);
    setModalOpen(false);
  };

  const toggleAssignable = (u) => { if (canManage) onUpdateStaff(u.id, { assignable: !u.assignable }); };
  const toggleActive = (u) => {
    if (!admin || u.bootstrapAdmin) return;
    if (u.active !== false && activeAdminCount <= MIN_ADMINS && u.isAdmin) return;
    onUpdateStaff(u.id, { active: u.active === false ? true : false });
  };

  // ── Dept color palette ──────────────────────────────────────
  const deptColor = (dept) => {
    const map = {
      'Operations':   { bg:'#EFF6FF', text:'#1D4ED8', border:'#BFDBFE' },
      'Finance':      { bg:'#F0FDF4', text:'#166534', border:'#BBF7D0' },
      'Strategic Development & Client Relations': { bg:'#FDF4FF', text:'#7E22CE', border:'#E9D5FF' },
      'Director Level': { bg:'#FFFBEB', text:'#92400E', border:'#FDE68A' },
    };
    return map[dept] || { bg:'#F8FAFC', text:'#475569', border:'#E2E8F0' };
  };

  // ── Role badge ──────────────────────────────────────────────
  const RoleBadge = ({ u }) => {
    if (u.isAdmin || u.role === 'super_admin') {
      return (
        <span style={{display:'inline-flex',alignItems:'center',gap:3,padding:'2px 7px',borderRadius:999,fontSize:10,fontWeight:700,background:'rgba(124,58,237,0.1)',color:'#7c3aed',border:'1px solid rgba(124,58,237,0.2)'}}>
          <Icon name="cog" className="w-2.5 h-2.5" /> Super Admin
          {u.bootstrapAdmin && <span style={{opacity:0.6}}>· System</span>}
        </span>
      );
    }
    if (u.role === 'manager') {
      return <span style={{display:'inline-flex',alignItems:'center',gap:3,padding:'2px 7px',borderRadius:999,fontSize:10,fontWeight:700,background:'rgba(245,158,11,0.1)',color:'#d97706',border:'1px solid rgba(245,158,11,0.2)'}}>Manager</span>;
    }
    return <span style={{display:'inline-flex',alignItems:'center',gap:3,padding:'2px 7px',borderRadius:999,fontSize:10,fontWeight:700,background:'rgba(100,116,139,0.08)',color:'#64748b',border:'1px solid rgba(100,116,139,0.15)'}}>Staff</span>;
  };

  const StatusBadge = ({ u }) => u.active !== false
    ? <span style={{display:'inline-flex',alignItems:'center',gap:3,padding:'2px 7px',borderRadius:999,fontSize:10,fontWeight:700,background:'rgba(16,185,129,0.1)',color:'#059669',border:'1px solid rgba(16,185,129,0.25)'}}><span style={{width:6,height:6,borderRadius:'50%',background:'#10b981',display:'inline-block'}}></span> Active</span>
    : <span style={{display:'inline-flex',alignItems:'center',gap:3,padding:'2px 7px',borderRadius:999,fontSize:10,fontWeight:700,background:'rgba(100,116,139,0.08)',color:'#64748b',border:'1px solid rgba(100,116,139,0.15)'}}>Inactive</span>;

  // ── Single staff row ────────────────────────────────────────
  const StaffRow = ({ u, idx, listLength }) => {
    const isMe = u.id === currentUser.id;
    const canDelete = admin && !isMe && !u.bootstrapAdmin && activeAdminCount > MIN_ADMINS;
    const dc = deptColor(u.department);
    // Find manager name
    const mgr = users.find(m => m.backendId === u.managerId || String(m.backendId) === String(u.managerId));

    return (
      <div className={`flex items-center gap-3 px-5 py-4 transition-colors hover:bg-slate-50/60 ${idx < listLength - 1 ? 'border-b border-slate-100' : ''}`}>
        {/* Avatar */}
        <Avatar user={u} size="md" />

        {/* Primary info */}
        <div className="flex-1 min-w-0">
          <div className="flex items-center gap-2 flex-wrap">
            <span className="font-semibold text-slate-800 text-sm">{u.name}</span>
            {isMe && <span className="text-[10px] text-blue-500 font-medium">(you)</span>}
            <StatusBadge u={u} />
            <RoleBadge u={u} />
          </div>
          {/* Designation / position */}
          {(u.designation || u.department) && (
            <div className="flex items-center gap-3 mt-1 flex-wrap">
              {u.designation && (
                <span className="text-xs text-slate-600 font-medium">{u.designation}</span>
              )}
              {u.department && (
                <span style={{fontSize:10,fontWeight:600,padding:'1px 7px',borderRadius:999,background:dc.bg,color:dc.text,border:`1px solid ${dc.border}`}}>
                  {u.department}
                </span>
              )}
            </div>
          )}
          {/* Email + manager */}
          <div className="flex items-center gap-3 mt-1 flex-wrap">
            <div className="flex items-center gap-1">
              <Icon name="mail" className="w-3 h-3 text-slate-400" />
              <span className="text-xs text-slate-500">{u.email}</span>
            </div>
            {mgr && (
              <div className="flex items-center gap-1">
                <Icon name="user" className="w-3 h-3 text-slate-400" />
                <span className="text-xs text-slate-500">Reports to: <strong className="text-slate-600">{mgr.name}</strong></span>
              </div>
            )}
          </div>
        </div>

        {/* Assignable toggle */}
        <div className="flex flex-col items-center gap-1 flex-shrink-0">
          <span className="text-[10px] font-semibold uppercase tracking-wide text-slate-400">Assignable</span>
          <button onClick={() => toggleAssignable(u)} style={{width:38,height:20,position:'relative',flexShrink:0}} title={u.assignable ? 'Remove from ticket assignment pool' : 'Add to ticket assignment pool'}>
            <span style={{display:'block',width:'100%',height:'100%',borderRadius:999,background:u.assignable?'linear-gradient(135deg,#10b981,#059669)':'var(--toggle-off,#cbd5e1)',boxShadow:u.assignable?'0 0 0 3px rgba(16,185,129,0.18)':'inset 0 1px 3px rgba(0,0,0,0.12)',transition:'all 0.25s'}}></span>
            <span style={{position:'absolute',top:3,left:u.assignable?21:3,width:14,height:14,borderRadius:'50%',background:'#fff',boxShadow:'0 1px 4px rgba(0,0,0,0.25)',transition:'left 0.25s'}}></span>
          </button>
        </div>

        {/* Active toggle (admin only) */}
        {admin && !u.bootstrapAdmin && (
          <div className="flex flex-col items-center gap-1 flex-shrink-0">
            <span className="text-[10px] font-semibold uppercase tracking-wide text-slate-400">Active</span>
            <button onClick={() => toggleActive(u)} style={{width:38,height:20,position:'relative',flexShrink:0}}>
              <span style={{display:'block',width:'100%',height:'100%',borderRadius:999,background:u.active!==false?'linear-gradient(135deg,#3b82f6,#1d4ed8)':'var(--toggle-off,#cbd5e1)',boxShadow:u.active!==false?'0 0 0 3px rgba(59,130,246,0.18)':'inset 0 1px 3px rgba(0,0,0,0.12)',transition:'all 0.25s'}}></span>
              <span style={{position:'absolute',top:3,left:u.active!==false?21:3,width:14,height:14,borderRadius:'50%',background:'#fff',boxShadow:'0 1px 4px rgba(0,0,0,0.25)',transition:'left 0.25s'}}></span>
            </button>
          </div>
        )}

        {/* Edit */}
        {canManage && (
          <button onClick={() => openEdit(u)} className="p-1.5 rounded-lg text-slate-400 hover:text-blue-600 hover:bg-blue-50 transition-colors flex-shrink-0" title="Edit">
            <Icon name="edit" className="w-4 h-4" />
          </button>
        )}

        {/* Delete */}
        {canDelete
          ? <button onClick={() => setConfirm({ kind:'delete', user:u })} className="p-1.5 rounded-lg text-slate-400 hover:text-red-600 hover:bg-red-50 transition-colors flex-shrink-0" title="Delete"><Icon name="trash" className="w-4 h-4" /></button>
          : <div className="w-7 flex-shrink-0" />
        }
      </div>
    );
  };

  const tabs = [
    { id:'staff',         label:'Staff Management' },
    { id:'notifications', label:'Notifications' },
    { id:'email',         label:'Email' },
  ];

  return (

// ORG CHART — tree view of organizational hierarchy
// ============================================================
const OrgChart = ({ currentUser, onNavigate }) => {
  const [tree, setTree]           = React.useState([]);
  const [depts, setDepts]         = React.useState([]);
  const [bootstrap, setBootstrap] = React.useState([]);
  const [loading, setLoading]     = React.useState(true);
  const [error, setError]         = React.useState(null);
  const [search, setSearch]       = React.useState('');
  const [collapsed, setCollapsed] = React.useState({});

  React.useEffect(() => {
    setLoading(true);
    fetch(`${API_BASE}/org/chart`, { credentials: 'include' })
      .then(r => r.json())
      .then(d => { setTree(d.tree || []); setDepts(d.departments || []); setBootstrap(d.bootstrapAdmins || []); setLoading(false); })
      .catch(() => { setError('Could not load org chart.'); setLoading(false); });
  }, []);

  const toggleCollapse = (id) => setCollapsed(c => ({ ...c, [id]: !c[id] }));

  const matchSearch = (node) => {
    if (!search) return true;
    const q = search.toLowerCase();
    return (node.title || '').toLowerCase().includes(q)
      || (node.user_name || '').toLowerCase().includes(q)
      || (node.user_email || '').toLowerCase().includes(q)
      || (node.department_name || '').toLowerCase().includes(q);
  };

  const hasMatch = (node) => {
    if (matchSearch(node)) return true;
    return (node.children || []).some(c => hasMatch(c));
  };

  const StatusBadge = ({ isVacant, isActive }) => {
    if (isVacant) return <span style={{ fontSize: '10px', fontWeight: 700, padding: '2px 7px', borderRadius: '999px', background: '#FEF3C7', color: '#92400E', border: '1px solid #FCD34D' }}>VACANT</span>;
    if (isActive) return <span style={{ fontSize: '10px', fontWeight: 700, padding: '2px 7px', borderRadius: '999px', background: '#D1FAE5', color: '#065F46', border: '1px solid #6EE7B7' }}>ACTIVE</span>;
    return <span style={{ fontSize: '10px', fontWeight: 700, padding: '2px 7px', borderRadius: '999px', background: '#F1F5F9', color: '#64748B', border: '1px solid #CBD5E1' }}>INACTIVE</span>;
  };

  const Avatar = ({ name, photoUrl, size = 36 }) => {
    const initials = (name || '?').split(' ').map(s => s[0]).slice(0, 2).join('').toUpperCase();
    if (photoUrl) return <img src={photoUrl} alt={name} style={{ width: size, height: size, borderRadius: '50%', objectFit: 'cover' }} />;
    const colors = ['#4F46E5','#0891B2','#059669','#D97706','#DC2626','#7C3AED'];
    const bg = colors[(name || '').charCodeAt(0) % colors.length];
    return <div style={{ width: size, height: size, borderRadius: '50%', background: bg, display: 'flex', alignItems: 'center', justifyContent: 'center', color: '#fff', fontWeight: 700, fontSize: size * 0.36 }}>{initials}</div>;
  };

  const OrgNode = ({ node, depth = 0 }) => {
    if (!hasMatch(node)) return null;
    const hasChildren = (node.children || []).length > 0;
    const isOpen = !collapsed[node.id];
    const isVacant = node.is_vacant;
    const hasHolder = !!node.user_id;

    return (
      <div style={{ marginLeft: depth === 0 ? 0 : 28, borderLeft: depth > 0 ? '2px solid #E2E8F0' : 'none', paddingLeft: depth > 0 ? 16 : 0, marginTop: 8 }}>
        {/* Node card */}
        <div style={{
          display: 'flex', alignItems: 'flex-start', gap: 10, padding: '10px 14px',
          background: 'var(--card-bg, #fff)', borderRadius: 10,
          border: '1px solid var(--border-color, #E2E8F0)',
          boxShadow: '0 1px 4px rgba(0,0,0,0.06)',
          opacity: isVacant ? 0.75 : 1,
          transition: 'box-shadow 0.15s',
          maxWidth: 340,
        }}>
          {/* Collapse toggle */}
          {hasChildren && (
            <button onClick={() => toggleCollapse(node.id)} style={{ background: 'none', border: 'none', cursor: 'pointer', padding: 0, color: '#94A3B8', marginTop: 4, flexShrink: 0 }}>
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style={{ width: 14, height: 14, transform: isOpen ? 'rotate(90deg)' : 'none', transition: 'transform 0.2s' }}><polyline points="9 18 15 12 9 6"/></svg>
            </button>
          )}
          {!hasChildren && <div style={{ width: 14, flexShrink: 0 }} />}

          {/* Avatar or placeholder */}
          {hasHolder
            ? <Avatar name={node.user_name} photoUrl={node.profile_photo_url} size={36} />
            : <div style={{ width: 36, height: 36, borderRadius: '50%', background: '#F1F5F9', border: '2px dashed #CBD5E1', display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0 }}>
                <svg viewBox="0 0 24 24" fill="none" stroke="#94A3B8" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style={{ width: 16, height: 16 }}><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
              </div>
          }

          {/* Info */}
          <div style={{ flex: 1, minWidth: 0 }}>
            <div style={{ fontWeight: 700, fontSize: 13, color: 'var(--text-primary, #0F172A)', whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>
              {hasHolder ? node.user_name : <span style={{ color: '#94A3B8', fontStyle: 'italic' }}>Unassigned</span>}
            </div>
            <div style={{ fontSize: 11, color: 'var(--text-secondary, #64748B)', marginTop: 1, whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>{node.title}</div>
            {hasHolder && node.user_email && (
              <div style={{ fontSize: 10, color: '#94A3B8', marginTop: 1, whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>{node.user_email}</div>
            )}
            <div style={{ marginTop: 5 }}>
              <StatusBadge isVacant={isVacant} isActive={node.is_active} />
              {node.is_bootstrap_admin && <span style={{ fontSize: '10px', fontWeight: 700, padding: '2px 7px', borderRadius: '999px', background: '#EDE9FE', color: '#5B21B6', border: '1px solid #C4B5FD', marginLeft: 4 }}>BOOTSTRAP ADMIN</span>}
            </div>
          </div>
        </div>

        {/* Children */}
        {hasChildren && isOpen && (
          <div>
            {node.children.map(child => <OrgNode key={child.id} node={child} depth={depth + 1} />)}
          </div>
        )}
      </div>
    );
  };

  const BootstrapPanel = () => (
    <div style={{ marginBottom: 24, padding: '14px 18px', background: 'linear-gradient(135deg, #EDE9FE 0%, #F5F3FF 100%)', borderRadius: 12, border: '1px solid #C4B5FD' }}>
      <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 10 }}>
        <svg viewBox="0 0 24 24" fill="none" stroke="#7C3AED" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style={{ width: 16, height: 16 }}><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
        <span style={{ fontWeight: 700, fontSize: 12, color: '#5B21B6', letterSpacing: '0.06em' }}>SYSTEM ROLES — NOT PART OF ORG HIERARCHY</span>
      </div>
      <div style={{ display: 'flex', flexWrap: 'wrap', gap: 10 }}>
        {bootstrap.map(u => (
          <div key={u.id} style={{ display: 'flex', alignItems: 'center', gap: 8, padding: '8px 12px', background: '#fff', borderRadius: 8, border: '1px solid #DDD6FE' }}>
            <Avatar name={u.name} photoUrl={u.profile_photo_url} size={30} />
            <div>
              <div style={{ fontWeight: 700, fontSize: 12, color: '#0F172A' }}>{u.name}</div>
              <div style={{ fontSize: 10, color: '#7C3AED', fontWeight: 600 }}>Bootstrap {u.role === 'super_admin' ? 'Super Admin' : 'Admin'}</div>
              <div style={{ fontSize: 10, color: '#94A3B8' }}>{u.email}</div>
              <div style={{ marginTop: 3 }}><span style={{ fontSize: '10px', fontWeight: 700, padding: '1px 6px', borderRadius: '999px', background: '#D1FAE5', color: '#065F46', border: '1px solid #6EE7B7' }}>ACTIVE</span></div>
            </div>
          </div>
        ))}
      </div>
    </div>
  );

  return (
    <div className="p-6 max-w-6xl mx-auto">
      {/* Header */}
      <div style={{ marginBottom: 24 }}>
        <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', flexWrap: 'wrap', gap: 12 }}>
          <div>
            <h1 style={{ fontWeight: 800, fontSize: 22, color: 'var(--text-primary, #0F172A)', margin: 0 }}>Organisational Chart</h1>
            <p style={{ fontSize: 13, color: 'var(--text-secondary, #64748B)', marginTop: 4 }}>Yahweh Care — full reporting hierarchy</p>
          </div>
          <div style={{ display: 'flex', gap: 8, alignItems: 'center' }}>
            {/* Legend */}
            <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap' }}>
              {[['ACTIVE','#D1FAE5','#065F46','#6EE7B7'],['VACANT','#FEF3C7','#92400E','#FCD34D'],['INACTIVE','#F1F5F9','#64748B','#CBD5E1']].map(([lbl,bg,col,bdr]) => (
                <span key={lbl} style={{ fontSize: 10, fontWeight: 700, padding: '3px 8px', borderRadius: 999, background: bg, color: col, border: `1px solid ${bdr}` }}>{lbl}</span>
              ))}
            </div>
          </div>
        </div>
        {/* Search */}
        <div style={{ marginTop: 16, position: 'relative', maxWidth: 360 }}>
          <svg viewBox="0 0 24 24" fill="none" stroke="#94A3B8" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style={{ width: 15, height: 15, position: 'absolute', left: 12, top: '50%', transform: 'translateY(-50%)' }}><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input
            type="text"
            placeholder="Search by name, email, position or department…"
            value={search}
            onChange={e => setSearch(e.target.value)}
            style={{ width: '100%', paddingLeft: 36, paddingRight: 12, paddingTop: 8, paddingBottom: 8, borderRadius: 8, border: '1px solid var(--border-color, #E2E8F0)', background: 'var(--input-bg, #fff)', fontSize: 13, color: 'var(--text-primary, #0F172A)', outline: 'none', boxSizing: 'border-box' }}
          />
        </div>
      </div>

      {loading && <div style={{ textAlign: 'center', padding: 60, color: '#94A3B8', fontSize: 14 }}>Loading org chart…</div>}
      {error && <div style={{ textAlign: 'center', padding: 40, color: '#EF4444', fontSize: 14 }}>{error}</div>}

      {!loading && !error && (
        <>
          <BootstrapPanel />
          <div style={{ display: 'flex', gap: 32, flexWrap: 'wrap', alignItems: 'flex-start' }}>
            {tree.map(root => (
              <div key={root.id} style={{ flex: '0 0 auto', minWidth: 320 }}>
                <OrgNode node={root} depth={0} />
              </div>
            ))}
          </div>
          {tree.length === 0 && !search && (
            <div style={{ textAlign: 'center', padding: 60 }}>
              <div style={{ fontSize: 40, marginBottom: 12 }}>🏢</div>
              <p style={{ color: '#94A3B8', fontSize: 14 }}>No org chart data yet. Run the database migration first.</p>
            </div>
          )}
          {tree.length > 0 && search && tree.every(r => !hasMatch(r)) && (
            <div style={{ textAlign: 'center', padding: 40, color: '#94A3B8', fontSize: 14 }}>No results for "{search}"</div>
          )}
        </>
      )}
    </div>
  );
};

// ANALYTICS DASHBOARD — Super Admin / Admin only
// ============================================================
const AnalyticsDashboard = ({ tickets = [], users = [], currentUser, onOpenTicket, onNavigate }) => {
  const [range, setRange] = React.useState('30d');

  /* ── helpers ── */
  const now = Date.now();
  const msDay = 86400000;
  const rangeMs = { '7d': 7*msDay, '30d': 30*msDay, '90d': 90*msDay, '12m': 365*msDay, 'all': Infinity };

  const filtered = React.useMemo(() => {
    const cutoff = range === 'all' ? 0 : now - rangeMs[range];
    return tickets.filter(t => {
      const ts = t.createdAt ? new Date(t.createdAt).getTime() : 0;
      return ts >= cutoff;
    });
  }, [tickets, range, now]);

  /* ── KPI calculations ── */
  const kpi = React.useMemo(() => {
    const total = filtered.length;
    const open  = filtered.filter(t => t.status === 'open' || t.status === 'in_progress' || t.status === 'escalated').length;
    const resolved = filtered.filter(t => t.status === 'resolved' || t.status === 'closed').length;
    const resRate = total ? Math.round((resolved / total) * 100) : 0;
    const slaResults = filtered.map(t => computeSLA(t));
    const slaMet = slaResults.filter(s => s.met).length;
    const slaTotal = slaResults.filter(s => s.state !== 'na').length;
    const slaPct = slaTotal ? Math.round((slaMet / slaTotal) * 100) : 0;
    const resolvedWithTime = filtered.filter(t => (t.status === 'resolved' || t.status === 'closed') && t.resolvedAt && t.createdAt);
    const avgHours = resolvedWithTime.length
      ? Math.round(resolvedWithTime.reduce((acc, t) => acc + (new Date(t.resolvedAt) - new Date(t.createdAt)) / 3600000, 0) / resolvedWithTime.length)
      : 0;
    const activeStaff = users.filter(u => u.active && u.role !== 'super_admin' && !u.isAdmin).length;
    return { total, open, resRate, slaPct, avgHours, activeStaff };
  }, [filtered, users]);

  /* ── monthly trend (last 12 months) ── */
  const trendData = React.useMemo(() => {
    const months = [];
    for (let i = 11; i >= 0; i--) {
      const d = new Date();
      d.setDate(1);
      d.setMonth(d.getMonth() - i);
      const key = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
      const label = d.toLocaleString('default', { month: 'short', year: '2-digit' });
      months.push({ key, label, created: 0, resolved: 0 });
    }
    tickets.forEach(t => {
      if (t.createdAt) {
        const d = new Date(t.createdAt);
        const k = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
        const m = months.find(x => x.key === k);
        if (m) m.created++;
      }
      if ((t.status === 'resolved' || t.status === 'closed') && t.resolvedAt) {
        const d = new Date(t.resolvedAt);
        const k = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
        const m = months.find(x => x.key === k);
        if (m) m.resolved++;
      }
    });
    return months;
  }, [tickets]);

  /* ── status distribution ── */
  const statusData = React.useMemo(() => {
    const counts = {};
    STATUSES.forEach(s => { counts[s.id] = 0; });
    filtered.forEach(t => { if (counts[t.status] !== undefined) counts[t.status]++; });
    return STATUSES.map(s => ({ name: s.label, value: counts[s.id] || 0, color: s.color })).filter(x => x.value > 0);
  }, [filtered]);

  /* ── priority breakdown ── */
  const priorityData = React.useMemo(() => {
    return PRIORITIES.map(p => ({
      name: p.label,
      count: filtered.filter(t => t.priority === p.id).length,
      color: p.color || '#6366F1',
    }));
  }, [filtered]);

  /* ── category breakdown ── */
  const categoryData = React.useMemo(() => {
    return CATEGORIES.map(c => ({
      name: c.label,
      count: filtered.filter(t => t.category === c.id).length,
      color: c.color,
    })).sort((a, b) => b.count - a.count);
  }, [filtered]);

  /* ── department performance ── */
  const deptData = React.useMemo(() => {
    const depts = {};
    filtered.forEach(t => {
      const d = t.department || 'Unassigned';
      if (!depts[d]) depts[d] = { dept: d, total: 0, open: 0, resolved: 0, slaMetCount: 0, slaTotalCount: 0, resHours: [] };
      depts[d].total++;
      if (t.status === 'open' || t.status === 'in_progress' || t.status === 'escalated') depts[d].open++;
      if (t.status === 'resolved' || t.status === 'closed') depts[d].resolved++;
      const sla = computeSLA(t);
      if (sla.state !== 'na') { depts[d].slaTotalCount++; if (sla.met) depts[d].slaMetCount++; }
      if ((t.status === 'resolved' || t.status === 'closed') && t.resolvedAt && t.createdAt) {
        depts[d].resHours.push((new Date(t.resolvedAt) - new Date(t.createdAt)) / 3600000);
      }
    });
    return Object.values(depts).map(d => ({
      dept: d.dept, total: d.total, open: d.open, resolved: d.resolved,
      rate: d.total ? Math.round((d.resolved / d.total) * 100) : 0,
      slaPct: d.slaTotalCount ? Math.round((d.slaMetCount / d.slaTotalCount) * 100) : 0,
      avgHours: d.resHours.length ? Math.round(d.resHours.reduce((a, b) => a + b, 0) / d.resHours.length) : 0,
    })).sort((a, b) => b.total - a.total).slice(0, 8);
  }, [filtered]);

  /* ── top performers ── */
  const topPerformers = React.useMemo(() => {
    const staff = users.filter(u => u.active && (u.role === 'staff' || u.role === 'manager'));
    return staff.map(u => {
      const m = computeStaffMetrics(u, filtered);
      return { ...u, ...m };
    }).sort((a, b) => b.resolved - a.resolved).slice(0, 5);
  }, [users, filtered]);

  /* ── users by role ── */
  const roleData = React.useMemo(() => {
    const roleCounts = {};
    users.filter(u => u.active).forEach(u => {
      const r = u.role === 'super_admin' || u.isAdmin ? 'Super Admin' : u.role === 'manager' ? 'Manager' : 'Staff';
      roleCounts[r] = (roleCounts[r] || 0) + 1;
    });
    const colors = { 'Super Admin': '#6366F1', 'Manager': '#8B5CF6', 'Staff': '#06B6D4' };
    return Object.entries(roleCounts).map(([name, value]) => ({ name, value, color: colors[name] || '#94a3b8' }));
  }, [users]);

  /* ── recent activity ── */
  const recentActivity = React.useMemo(() => {
    const events = [];
    [...tickets].sort((a, b) => new Date(b.createdAt || 0) - new Date(a.createdAt || 0)).slice(0, 5).forEach(t => {
      events.push({ type: 'created', ticket: t, ts: t.createdAt });
    });
    [...tickets].filter(t => t.resolvedAt).sort((a, b) => new Date(b.resolvedAt) - new Date(a.resolvedAt)).slice(0, 5).forEach(t => {
      events.push({ type: 'resolved', ticket: t, ts: t.resolvedAt });
    });
    return events.sort((a, b) => new Date(b.ts || 0) - new Date(a.ts || 0)).slice(0, 10);
  }, [tickets]);

  /* ── KPI card component ── */
  const KpiCard = ({ label, value, sub, icon, gradient, delta }) => (
    <div className="card rounded-2xl p-5 flex flex-col gap-3" style={{ boxShadow: 'var(--shadow-sm)' }}>
      <div className="flex items-center justify-between">
        <span className="text-xs font-semibold uppercase tracking-wider text-slate-500">{label}</span>
        <div className="w-9 h-9 rounded-xl flex items-center justify-center" style={{ background: gradient }}>
          <Icon name={icon} className="w-4 h-4 text-white" />
        </div>
      </div>
      <div>
        <div className="text-3xl font-bold text-slate-800" style={{ fontFamily: 'Poppins, Inter, sans-serif' }}>{value}</div>
        {sub && <div className="text-xs text-slate-500 mt-1">{sub}</div>}
      </div>
      {delta !== undefined && (
        <div className={`text-xs font-medium ${delta >= 0 ? 'text-emerald-600' : 'text-red-500'}`}>
          {delta >= 0 ? '▲' : '▼'} {Math.abs(delta)}% vs prior period
        </div>
      )}
    </div>
  );

  const RANGES = [
    { id: '7d', label: '7 Days' },
    { id: '30d', label: '30 Days' },
    { id: '90d', label: '90 Days' },
    { id: '12m', label: '12 Months' },
    { id: 'all', label: 'All Time' },
  ];

  const CUSTOM_TOOLTIP = ({ active, payload, label }) => {
    if (!active || !payload || !payload.length) return null;
    return (
      <div className="card rounded-xl p-3 text-xs shadow-lg border border-slate-200">
        <div className="font-semibold text-slate-700 mb-1">{label}</div>
        {payload.map((p, i) => (
          <div key={i} className="flex items-center gap-2">
            <span className="w-2 h-2 rounded-full inline-block" style={{ background: p.color }}></span>
            <span className="text-slate-600">{p.name}:</span>
            <span className="font-bold text-slate-800">{p.value}</span>
          </div>
        ))}
      </div>
    );
  };

  return (
    <div className="flex-1 overflow-y-auto p-6" style={{ background: 'transparent' }}>
      {/* Header */}
      <div className="flex items-center justify-between mb-6">
        <div>
          <h1 className="text-2xl font-bold" style={{ fontFamily: 'Poppins, Inter, sans-serif', background: 'linear-gradient(135deg,#6366F1,#8B5CF6,#06B6D4)', WebkitBackgroundClip: 'text', WebkitTextFillColor: 'transparent' }}>
            Analytics Dashboard
          </h1>
          <p className="text-sm text-slate-500 mt-0.5">Operational insights across all tickets and staff</p>
        </div>
        {/* Range filter */}
        <div className="flex gap-1 p-1 rounded-xl" style={{ background: 'rgba(99,102,241,0.08)', border: '1px solid rgba(99,102,241,0.15)' }}>
          {RANGES.map(r => (
            <button
              key={r.id}
              onClick={() => setRange(r.id)}
              className="px-3 py-1.5 rounded-lg text-xs font-semibold transition-all"
              style={range === r.id ? {
                background: 'linear-gradient(135deg,#6366F1,#8B5CF6)',
                color: '#fff',
                boxShadow: '0 2px 8px rgba(99,102,241,0.35)',
              } : { color: '#64748B' }}
            >{r.label}</button>
          ))}
        </div>
      </div>

      {/* KPI Cards */}
      <div className="grid grid-cols-2 md:grid-cols-3 xl:grid-cols-6 gap-4 mb-6">
        <KpiCard label="Total Tickets"     value={kpi.total}          sub={`In selected period`}       icon="list"      gradient="linear-gradient(135deg,#6366F1,#8B5CF6)" />
        <KpiCard label="Open / Active"     value={kpi.open}           sub="Open · In Progress · Esc."  icon="alert"     gradient="linear-gradient(135deg,#f59e0b,#ef4444)" />
        <KpiCard label="Resolution Rate"   value={`${kpi.resRate}%`}  sub="Resolved or Closed"         icon="check"     gradient="linear-gradient(135deg,#10b981,#059669)" />
        <KpiCard label="SLA Compliance"    value={`${kpi.slaPct}%`}   sub="Tickets meeting SLA"        icon="clock"     gradient="linear-gradient(135deg,#06b6d4,#0ea5e9)" />
        <KpiCard label="Avg Resolution"    value={`${kpi.avgHours}h`} sub="Hours to resolve"           icon="trend"     gradient="linear-gradient(135deg,#8B5CF6,#6366F1)" />
        <KpiCard label="Active Staff"      value={kpi.activeStaff}    sub="Non-admin users"            icon="users"     gradient="linear-gradient(135deg,#0ea5e9,#06b6d4)" />
      </div>

      {/* Row: Trend + Status Donut */}
      <div className="grid grid-cols-1 xl:grid-cols-3 gap-4 mb-4">
        {/* Monthly Trend */}
        <div className="xl:col-span-2 card rounded-2xl p-5" style={{ boxShadow: 'var(--shadow-sm)' }}>
          <div className="flex items-center justify-between mb-4">
            <h3 className="font-semibold text-slate-700">Monthly Ticket Volume</h3>
            <span className="text-xs text-slate-400">Last 12 months</span>
          </div>
          <ResponsiveContainer width="100%" height={220}>
            <LineChart data={trendData} margin={{ top: 5, right: 20, left: -10, bottom: 5 }}>
              <CartesianGrid strokeDasharray="3 3" stroke="rgba(148,163,184,0.2)" />
              <XAxis dataKey="label" tick={{ fontSize: 11, fill: '#94a3b8' }} />
              <YAxis tick={{ fontSize: 11, fill: '#94a3b8' }} />
              <Tooltip content={<CUSTOM_TOOLTIP />} />
              <Legend wrapperStyle={{ fontSize: 12 }} />
              <Line type="monotone" dataKey="created"  name="Created"  stroke="#6366F1" strokeWidth={2.5} dot={{ r: 3, fill: '#6366F1' }} activeDot={{ r: 5 }} />
              <Line type="monotone" dataKey="resolved" name="Resolved" stroke="#10b981" strokeWidth={2.5} dot={{ r: 3, fill: '#10b981' }} activeDot={{ r: 5 }} />
            </LineChart>
          </ResponsiveContainer>
        </div>

        {/* Status Donut */}
        <div className="card rounded-2xl p-5" style={{ boxShadow: 'var(--shadow-sm)' }}>
          <h3 className="font-semibold text-slate-700 mb-4">Status Distribution</h3>
          {statusData.length > 0 ? (
            <>
              <ResponsiveContainer width="100%" height={170}>
                <PieChart>
                  <Pie data={statusData} cx="50%" cy="50%" innerRadius={50} outerRadius={75} paddingAngle={3} dataKey="value">
                    {statusData.map((entry, i) => <Cell key={i} fill={entry.color} />)}
                  </Pie>
                  <Tooltip formatter={(value, name) => [value, name]} contentStyle={{ borderRadius: 10, fontSize: 12 }} />
                </PieChart>
              </ResponsiveContainer>
              <div className="flex flex-col gap-1.5 mt-2">
                {statusData.map((s, i) => (
                  <div key={i} className="flex items-center justify-between text-xs">
                    <div className="flex items-center gap-1.5">
                      <span className="w-2 h-2 rounded-full" style={{ background: s.color }}></span>
                      <span className="text-slate-600">{s.name}</span>
                    </div>
                    <span className="font-semibold text-slate-700">{s.value}</span>
                  </div>
                ))}
              </div>
            </>
          ) : (
            <div className="flex items-center justify-center h-40 text-slate-400 text-sm">No data in range</div>
          )}
        </div>
      </div>

      {/* Row: Priority Bar + Category Horizontal Bar */}
      <div className="grid grid-cols-1 xl:grid-cols-2 gap-4 mb-4">
        {/* Priority Breakdown */}
        <div className="card rounded-2xl p-5" style={{ boxShadow: 'var(--shadow-sm)' }}>
          <h3 className="font-semibold text-slate-700 mb-4">Tickets by Priority</h3>
          <ResponsiveContainer width="100%" height={200}>
            <BarChart data={priorityData} margin={{ top: 5, right: 20, left: -10, bottom: 5 }}>
              <CartesianGrid strokeDasharray="3 3" stroke="rgba(148,163,184,0.2)" vertical={false} />
              <XAxis dataKey="name" tick={{ fontSize: 11, fill: '#94a3b8' }} />
              <YAxis tick={{ fontSize: 11, fill: '#94a3b8' }} />
              <Tooltip content={<CUSTOM_TOOLTIP />} />
              <Bar dataKey="count" name="Tickets" radius={[6, 6, 0, 0]}>
                {priorityData.map((entry, i) => <Cell key={i} fill={entry.color || '#6366F1'} />)}
              </Bar>
            </BarChart>
          </ResponsiveContainer>
        </div>

        {/* Category Horizontal Bar */}
        <div className="card rounded-2xl p-5" style={{ boxShadow: 'var(--shadow-sm)' }}>
          <h3 className="font-semibold text-slate-700 mb-4">Tickets by Category</h3>
          <div className="flex flex-col gap-2.5">
            {categoryData.map((c, i) => {
              const pct = kpi.total > 0 ? Math.round((c.count / kpi.total) * 100) : 0;
              return (
                <div key={i}>
                  <div className="flex items-center justify-between text-xs mb-1">
                    <span className="text-slate-600 font-medium">{c.name}</span>
                    <span className="text-slate-500">{c.count} <span className="text-slate-400">({pct}%)</span></span>
                  </div>
                  <div className="h-2 rounded-full overflow-hidden" style={{ background: 'rgba(148,163,184,0.15)' }}>
                    <div className="h-full rounded-full transition-all duration-700" style={{ width: `${pct}%`, background: c.color }} />
                  </div>
                </div>
              );
            })}
            {categoryData.every(c => c.count === 0) && (
              <div className="text-sm text-slate-400 text-center py-8">No data in selected range</div>
            )}
          </div>
        </div>
      </div>

      {/* Row: Dept Table + Top Performers */}
      <div className="grid grid-cols-1 xl:grid-cols-2 gap-4 mb-4">
        {/* Department Performance */}
        <div className="card rounded-2xl p-5" style={{ boxShadow: 'var(--shadow-sm)' }}>
          <h3 className="font-semibold text-slate-700 mb-4">Department Performance</h3>
          <div className="overflow-x-auto">
            <table className="w-full text-xs">
              <thead>
                <tr style={{ borderBottom: '1px solid rgba(148,163,184,0.2)' }}>
                  {['Department','Total','Open','Resolved','Rate','SLA%','Avg Hrs'].map(h => (
                    <th key={h} className="text-left py-2 px-2 text-slate-400 font-semibold uppercase tracking-wide text-[10px]">{h}</th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {deptData.length === 0 && (
                  <tr><td colSpan={7} className="text-center py-6 text-slate-400">No data available</td></tr>
                )}
                {deptData.map((d, i) => (
                  <tr key={i} className="transition-colors" style={{ borderBottom: '1px solid rgba(148,163,184,0.1)' }}
                    onMouseEnter={e => e.currentTarget.style.background = 'rgba(99,102,241,0.05)'}
                    onMouseLeave={e => e.currentTarget.style.background = ''}
                  >
                    <td className="py-2 px-2 font-medium text-slate-700">{d.dept}</td>
                    <td className="py-2 px-2 text-slate-600">{d.total}</td>
                    <td className="py-2 px-2">
                      <span className="px-1.5 py-0.5 rounded-md text-[10px] font-semibold" style={{ background: 'rgba(245,158,11,0.12)', color: '#d97706' }}>{d.open}</span>
                    </td>
                    <td className="py-2 px-2">
                      <span className="px-1.5 py-0.5 rounded-md text-[10px] font-semibold" style={{ background: 'rgba(16,185,129,0.12)', color: '#059669' }}>{d.resolved}</span>
                    </td>
                    <td className="py-2 px-2">
                      <div className="flex items-center gap-1">
                        <div className="w-10 h-1.5 rounded-full overflow-hidden" style={{ background: 'rgba(148,163,184,0.2)' }}>
                          <div className="h-full rounded-full" style={{ width: `${d.rate}%`, background: 'linear-gradient(90deg,#6366F1,#8B5CF6)' }} />
                        </div>
                        <span className="text-slate-600">{d.rate}%</span>
                      </div>
                    </td>
                    <td className="py-2 px-2">
                      <span className={`font-semibold ${d.slaPct >= 80 ? 'text-emerald-600' : d.slaPct >= 60 ? 'text-amber-600' : 'text-red-500'}`}>{d.slaPct}%</span>
                    </td>
                    <td className="py-2 px-2 text-slate-600">{d.avgHours}h</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>

        {/* Top Performers */}
        <div className="card rounded-2xl p-5" style={{ boxShadow: 'var(--shadow-sm)' }}>
          <h3 className="font-semibold text-slate-700 mb-4">Top Performers</h3>
          <div className="flex flex-col gap-3">
            {topPerformers.length === 0 && (
              <div className="text-sm text-slate-400 text-center py-8">No staff data available</div>
            )}
            {topPerformers.map((u, i) => (
              <div key={u.id} className="flex items-center gap-3 p-3 rounded-xl transition-all cursor-pointer"
                style={{ background: 'rgba(99,102,241,0.04)', border: '1px solid rgba(99,102,241,0.08)' }}
                onMouseEnter={e => e.currentTarget.style.background = 'rgba(99,102,241,0.10)'}
                onMouseLeave={e => e.currentTarget.style.background = 'rgba(99,102,241,0.04)'}
              >
                <div className="w-6 h-6 rounded-full flex items-center justify-center text-xs font-bold text-white flex-shrink-0"
                  style={{ background: i === 0 ? 'linear-gradient(135deg,#f59e0b,#ef4444)' : i === 1 ? 'linear-gradient(135deg,#94a3b8,#64748b)' : 'linear-gradient(135deg,#92400e,#78350f)' }}>
                  {i + 1}
                </div>
                <div className="w-8 h-8 rounded-full flex items-center justify-center text-xs font-bold text-white flex-shrink-0"
                  style={{ background: 'linear-gradient(135deg,#6366F1,#8B5CF6)' }}>
                  {(u.avatar || u.name?.slice(0,2) || '??').slice(0,2).toUpperCase()}
                </div>
                <div className="flex-1 min-w-0">
                  <div className="text-sm font-semibold text-slate-700 truncate">{u.name}</div>
                  <div className="text-xs text-slate-500">{u.department}</div>
                </div>
                <div className="flex flex-col items-end gap-0.5">
                  <div className="text-xs font-bold text-slate-700">{u.resolved} resolved</div>
                  <div className="flex gap-2 text-[10px] text-slate-400">
                    <span>SLA {u.slaPct}%</span>
                    {u.rating > 0 && <span>★ {u.rating.toFixed(1)}</span>}
                  </div>
                </div>
              </div>
            ))}
          </div>
        </div>
      </div>

      {/* Row: Users by Role + Recent Activity */}
      <div className="grid grid-cols-1 xl:grid-cols-2 gap-4">
        {/* Users by Role */}
        <div className="card rounded-2xl p-5" style={{ boxShadow: 'var(--shadow-sm)' }}>
          <h3 className="font-semibold text-slate-700 mb-4">Team Composition</h3>
          {roleData.length > 0 ? (
            <div className="flex items-center gap-4">
              <ResponsiveContainer width={160} height={160}>
                <PieChart>
                  <Pie data={roleData} cx="50%" cy="50%" innerRadius={45} outerRadius={70} paddingAngle={4} dataKey="value">
                    {roleData.map((entry, i) => <Cell key={i} fill={entry.color} />)}
                  </Pie>
                  <Tooltip formatter={(value, name) => [value, name]} contentStyle={{ borderRadius: 10, fontSize: 12 }} />
                </PieChart>
              </ResponsiveContainer>
              <div className="flex flex-col gap-3 flex-1">
                {roleData.map((r, i) => (
                  <div key={i} className="flex items-center justify-between">
                    <div className="flex items-center gap-2">
                      <span className="w-3 h-3 rounded-full" style={{ background: r.color }}></span>
                      <span className="text-sm text-slate-600">{r.name}</span>
                    </div>
                    <div className="text-right">
                      <div className="text-sm font-bold text-slate-700">{r.value}</div>
                      <div className="text-[10px] text-slate-400">{users.filter(u => u.active).length > 0 ? Math.round((r.value / users.filter(u => u.active).length) * 100) : 0}%</div>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          ) : (
            <div className="flex items-center justify-center h-40 text-slate-400 text-sm">No user data</div>
          )}
        </div>

        {/* Recent Activity */}
        <div className="card rounded-2xl p-5" style={{ boxShadow: 'var(--shadow-sm)' }}>
          <h3 className="font-semibold text-slate-700 mb-4">Recent Activity</h3>
          <div className="flex flex-col gap-2">
            {recentActivity.length === 0 && (
              <div className="text-sm text-slate-400 text-center py-8">No recent activity</div>
            )}
            {recentActivity.map((evt, i) => {
              const isResolved = evt.type === 'resolved';
              const t = evt.ticket;
              const assigneeName = users.find(u => u.id === t.assignedTo)?.name || 'Unassigned';
              return (
                <div key={i} className="flex items-start gap-3 p-2 rounded-xl cursor-pointer transition-all"
                  style={{ borderBottom: '1px solid rgba(148,163,184,0.1)' }}
                  onClick={() => onOpenTicket && onOpenTicket(t.id)}
                  onMouseEnter={e => e.currentTarget.style.background = 'rgba(99,102,241,0.05)'}
                  onMouseLeave={e => e.currentTarget.style.background = ''}
                >
                  <div className="w-6 h-6 rounded-full flex items-center justify-center flex-shrink-0 mt-0.5"
                    style={{ background: isResolved ? 'rgba(16,185,129,0.15)' : 'rgba(99,102,241,0.15)' }}>
                    <Icon name={isResolved ? 'check' : 'list'} className="w-3 h-3" style={{ color: isResolved ? '#10b981' : '#6366F1' }} />
                  </div>
                  <div className="flex-1 min-w-0">
                    <div className="text-xs font-semibold text-slate-700 truncate">
                      {isResolved ? 'Resolved: ' : 'Created: '}{t.title || t.subject || 'Untitled ticket'}
                    </div>
                    <div className="text-[10px] text-slate-400 mt-0.5">{assigneeName} · {t.department || 'No dept'} · {fmtRelative ? fmtRelative(evt.ts) : evt.ts}</div>
                  </div>
                  <span className="text-[10px] font-semibold px-1.5 py-0.5 rounded-md flex-shrink-0"
                    style={{ background: isResolved ? 'rgba(16,185,129,0.12)' : 'rgba(99,102,241,0.12)', color: isResolved ? '#059669' : '#6366F1' }}>
                    {isResolved ? 'Resolved' : 'New'}
                  </span>
                </div>
              );
            })}
          </div>
        </div>
      </div>
    </div>
  );
};
