const StaffModal = ({ open, initial, currentUser, onClose, onSave }) => {
  const isEdit = !!initial?.id;
  const isBootstrap = !!initial?.bootstrapAdmin;
  const initialRole = (u) => u?.isAdmin || u?.role === 'super_admin' ? 'super_admin' : (u?.role === 'manager' ? 'manager' : 'user');
  const [form, setForm] = useState({ name: '', email: '', department: 'Operations', active: true, role: 'user' });

  useEffect(() => {
    if (open) {
      setForm(initial ? {
        name: initial.name || '',
        email: initial.email || '',
        department: initial.department || 'Operations',
        active: initial.active !== false,
        role: initialRole(initial),
      } : { name: '', email: '', department: 'Operations', active: true, role: 'user' });
    }
  }, [open, initial]);

  if (!open) return null;
  const inputCls = "w-full px-3 py-2 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500/30 focus:border-blue-500 text-sm bg-white";
  const adminGrantor = isAdmin(currentUser); // only Super Admin can promote others
  const emailCheck = form.email ? validateOrgEmail(form.email) : { valid: true };
  const canSave = form.name.trim() && form.email.trim() && emailCheck.valid;

  return (
    <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/40 fade-in" onClick={onClose}>
      <div className="bg-white rounded-2xl shadow-2xl w-full max-w-lg" onClick={e => e.stopPropagation()}>
        <div className="flex items-center justify-between px-6 py-4 border-b border-slate-100">
          <div>
            <h2 className="text-lg font-bold text-slate-800">{isEdit ? 'Edit Staff Member' : 'Add Staff Member'}</h2>
            <p className="text-xs text-slate-500 mt-0.5">{isEdit ? 'Update this staff member\'s details' : 'Add a new staff member to the system'}</p>
          </div>
          <button onClick={onClose} className="text-slate-400 hover:text-slate-700"><Icon name="x" /></button>
        </div>
        {isBootstrap && (
          <div className="mx-6 mt-4 p-3 rounded-lg bg-red-50 border border-red-200 flex items-start gap-2">
            <Icon name="cog" className="w-4 h-4 text-red-600 flex-shrink-0 mt-0.5" />
            <div className="text-xs text-red-800">
              <strong>Bootstrap Super Admin — protected.</strong> Role and active status are locked. Only contact details can be edited.
            </div>
          </div>
        )}
        <div className="p-6 space-y-4">
          <div>
            <label className="block text-sm font-medium text-slate-700 mb-1.5">Full Name <span className="text-red-500">*</span></label>
            <input value={form.name} onChange={e => setForm({...form, name: e.target.value})} placeholder="Enter full name" className={inputCls} autoFocus />
          </div>
          <div>
            <label className="block text-sm font-medium text-slate-700 mb-1.5">Email Address <span className="text-red-500">*</span></label>
            <input
              type="email"
              value={form.email}
              onChange={e => setForm({...form, email: e.target.value})}
              placeholder="name@yahwehcare.com.au"
              className={`${inputCls} ${form.email && !emailCheck.valid ? 'border-red-300 focus:ring-red-500/30 focus:border-red-500' : ''}`}
            />
            {form.email && !emailCheck.valid && (
              <div className="mt-1.5 flex items-start gap-1.5 text-xs text-red-600">
                <Icon name="alert" className="w-3.5 h-3.5 flex-shrink-0 mt-0.5" />
                <span>{emailCheck.reason}</span>
              </div>
            )}
            {!form.email && (
              <div className="mt-1.5 text-xs text-slate-500">
                Allowed: {ALLOWED_EMAIL_DOMAINS.map(d => <span key={d} className="font-mono text-slate-600">@{d}</span>).reduce((a, b) => [a, ' or ', b])}
              </div>
            )}
          </div>
          <div>
            <label className="block text-sm font-medium text-slate-700 mb-1.5">Department</label>
            <select value={form.department} onChange={e => setForm({...form, department: e.target.value})} className={inputCls}>
              {DEPARTMENTS.map(d => <option key={d} value={d}>{d}</option>)}
            </select>
          </div>

          {/* Active toggle */}
          <div className="flex items-center justify-between p-3 bg-slate-50 rounded-lg">
            <div>
              <div className="text-sm font-medium text-slate-800">Active Status</div>
              <div className="text-xs text-slate-500">{isBootstrap ? 'Bootstrap admins cannot be deactivated' : 'Allow this staff member to use the system'}</div>
            </div>
            <button type="button" disabled={isBootstrap} onClick={() => !isBootstrap && setForm({...form, active: !form.active})} className="relative disabled:opacity-40 disabled:cursor-not-allowed" title={isBootstrap ? 'Locked — bootstrap admin' : (form.active ? 'Active' : 'Inactive')}>
              <div className={`w-11 h-6 rounded-full transition ${form.active ? 'bg-blue-500' : 'bg-slate-300'}`}>
                <div className={`absolute top-0.5 w-5 h-5 bg-white rounded-full shadow-sm transition ${form.active ? 'left-[22px]' : 'left-0.5'}`}></div>
              </div>
            </button>
          </div>

          {/* Role tier selector — only Super Admin can change, locked for bootstrap admins */}
          {adminGrantor ? (
            <div>
              <label className="block text-sm font-medium text-slate-700 mb-2">Role <span className="text-red-500">*</span></label>
              <div className="grid grid-cols-1 sm:grid-cols-3 gap-2">
                {[
                  { id: 'super_admin', label: 'Super Admin', desc: 'Full system access', icon: 'cog',   color: 'red' },
                  { id: 'manager',     label: 'Manager',     desc: 'Department head',    icon: 'users', color: 'amber' },
                  { id: 'user',        label: 'Dept. User',  desc: 'Regular staff',      icon: 'user',  color: 'slate' },
                ].map(opt => {
                  const sel = form.role === opt.id;
                  const locked = isBootstrap && opt.id !== 'super_admin';
                  const colorMap = {
                    red:   sel ? 'border-red-500 bg-red-50 text-red-700' : 'border-slate-200 hover:bg-slate-50',
                    amber: sel ? 'border-amber-500 bg-amber-50 text-amber-700' : 'border-slate-200 hover:bg-slate-50',
                    slate: sel ? 'border-slate-500 bg-slate-50 text-slate-700' : 'border-slate-200 hover:bg-slate-50',
                  };
                  return (
                    <button key={opt.id} type="button" disabled={locked} onClick={() => !locked && setForm({...form, role: opt.id})} className={`flex flex-col items-start gap-1 text-left p-3 rounded-lg border-2 transition ${colorMap[opt.color]} disabled:opacity-40 disabled:cursor-not-allowed`} title={locked ? 'Bootstrap admin — role locked' : undefined}>
                      <div className="flex items-center gap-1.5">
                        <Icon name={opt.icon} className="w-4 h-4" />
                        <span className="text-sm font-semibold">{opt.label}</span>
                      </div>
                      <span className="text-xs text-slate-500">{opt.desc}</span>
                    </button>
                  );
                })}
              </div>
            </div>
          ) : (
            <div className="flex items-start gap-2 p-3 rounded-lg bg-slate-50 border border-slate-200 text-xs text-slate-600">
              <Icon name="alert" className="w-4 h-4 text-slate-500 flex-shrink-0 mt-0.5" />
              <div><strong className="text-slate-700">Role changes are restricted.</strong> Only a Super Admin can promote users to Manager or Super Admin. This user will be created as a Department User.</div>
            </div>
          )}
        </div>
        <div className="px-6 py-4 border-t border-slate-100 flex items-center justify-end gap-2">
          <Button variant="secondary" onClick={onClose}>Cancel</Button>
          <Button variant="primary" disabled={!canSave} onClick={() => onSave(form)}>{isEdit ? 'Save Changes' : 'Add Staff'}</Button>
        </div>
      </div>
    </div>
  );
};

// ============================================================
// STAFF MANAGEMENT PAGE
// ============================================================
const StaffManagement = ({ users, tickets, currentUser, onAddStaff, onUpdateStaff, onDeleteStaff, onNavigate }) => {
  const [search, setSearch] = useState('');
  const [deptFilter, setDeptFilter] = useState('all');
  const [statusFilter, setStatusFilter] = useState('all');
  const breadcrumbs = [
    { label: 'Dashboard', clickable: true, action: 'dashboard', icon: 'dashboard' },
    { label: 'Staff Management', clickable: false },
  ];

  const [editing, setEditing] = useState(null);
  const [modalOpen, setModalOpen] = useState(false);
  const [menuOpen, setMenuOpen] = useState(null);
  const [confirm, setConfirm] = useState(null);

  const admin = isAdmin(currentUser);
  // Row-level security: managers only see and manage their own department's staff
  const scopedUsers = admin ? users : users.filter(u => u.department === currentUser.department);
  users = scopedUsers;
  const canManage = admin || (currentUser.role === 'manager');
  const activeAdminCount = users.filter(u => u.isAdmin && u.active !== false).length;
  const MIN_ADMINS = 2;

  const filtered = users.filter(u => {
    if (deptFilter !== 'all' && u.department !== deptFilter) return false;
    if (statusFilter === 'active' && u.active === false) return false;
    if (statusFilter === 'inactive' && u.active !== false) return false;
    if (search.trim()) {
      const q = search.toLowerCase();
      if (!u.name.toLowerCase().includes(q) && !u.email.toLowerCase().includes(q)) return false;
    }
    return true;
  });

  const total = users.length;
  const active = users.filter(u => u.active !== false).length;
  const inactive = total - active;
  const departments = Array.from(new Set(users.map(u => u.department).filter(Boolean))).sort();

  const openCreate = () => { setEditing(null); setModalOpen(true); };
  const openEdit = (u) => { setEditing(u); setModalOpen(true); };
  const save = (form) => {
    if (editing) onUpdateStaff(editing.id, form);
    else onAddStaff(form);
    setModalOpen(false);
  };

  return (
    <>
      <Breadcrumb items={breadcrumbs} onNavigate={onNavigate} />
      <div className="p-6 flex-1 overflow-y-auto scrollbar-thin" onClick={() => setMenuOpen(null)}>
        {/* Header */}
        <div className="flex items-start justify-between mb-6">
        <div>
          <div className="flex items-center gap-2 flex-wrap">
            <h1 className="text-3xl font-bold text-slate-900">Staff Management</h1>
            {admin
              ? <Badge className="bg-red-500 text-white">Super Admin</Badge>
              : <Badge className="bg-amber-500 text-white">Manager · {currentUser.department}</Badge>}
          </div>
          <p className="text-sm text-slate-500 mt-1">{admin ? 'Manage staff members and their access' : `Managing the ${currentUser.department} team`}</p>
        </div>
        {admin && <Button variant="primary" onClick={openCreate}><Icon name="plus" className="w-4 h-4" /> Add Staff</Button>}
      </div>

      {/* Row-level security banner for managers */}
      {!admin && (
        <div className="card p-3 mb-4 bg-blue-50 border-blue-200 flex items-center gap-2">
          <Icon name="branch" className="w-4 h-4 text-blue-600" />
          <span className="text-sm text-blue-800">Viewing your team only — <strong>{currentUser.department}</strong>. Managers can edit existing team members but only Super Admins can add new staff or change roles. {users.length} member{users.length !== 1 ? 's' : ''}.</span>
        </div>
      )}

      {/* Admin-count guard banner */}
      {admin && activeAdminCount <= MIN_ADMINS && (
        <div className="yc-policy-notice mb-4 flex items-start gap-3 rounded-lg border border-slate-200 bg-slate-50 px-4 py-3 border-l-4 border-l-amber-400">
          <Icon name="alert" className="w-4 h-4 text-amber-500 flex-shrink-0 mt-0.5" />
          <div className="text-sm text-slate-600 flex-1 leading-relaxed">
            <span className="font-semibold text-slate-700">Policy — minimum admin threshold: </span>
            Only <strong className="text-slate-800">{activeAdminCount}</strong> active Super Admin{activeAdminCount === 1 ? '' : 's'} in the system. The system requires at least {MIN_ADMINS} — deleting, deactivating, or demoting an admin below this threshold is blocked. Promote another user to admin to relax this restriction.
          </div>
        </div>
      )}

      {/* KPI cards */}
      <div className="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
        <div className="card p-5 flex items-center justify-between">
          <div>
            <div className="text-sm text-slate-600 font-medium">Total Staff</div>
            <div className="text-4xl font-bold text-slate-800 mt-2">{total}</div>
          </div>
          <div className="w-12 h-12 bg-blue-100 text-blue-600 rounded-xl flex items-center justify-center"><Icon name="users" className="w-6 h-6" /></div>
        </div>
        <div className="card p-5 flex items-center justify-between bg-gradient-to-br from-emerald-50 to-slate-50">
          <div>
            <div className="text-sm text-slate-600 font-medium">Active</div>
            <div className="text-4xl font-bold text-slate-800 mt-2">{active}</div>
          </div>
          <div className="w-12 h-12 bg-emerald-100 text-emerald-600 rounded-xl flex items-center justify-center"><Icon name="userPlus" className="w-6 h-6" /></div>
        </div>
        <div className="card p-5 flex items-center justify-between bg-gradient-to-br from-orange-50 to-slate-50">
          <div>
            <div className="text-sm text-slate-600 font-medium">Inactive</div>
            <div className="text-4xl font-bold text-slate-800 mt-2">{inactive}</div>
          </div>
          <div className="w-12 h-12 bg-orange-100 text-orange-600 rounded-xl flex items-center justify-center"><Icon name="alert" className="w-6 h-6" /></div>
        </div>
      </div>

      {/* Search + filters */}
      <div className="card p-3 mb-4 flex flex-wrap items-center gap-3">
        <div className="relative flex-1 min-w-[240px]">
          <Icon name="search" className="w-4 h-4 absolute left-3 top-3 text-slate-400" />
          <input value={search} onChange={e => setSearch(e.target.value)} placeholder="Search by name or email..." className="w-full pl-10 pr-4 py-2.5 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500/30 text-sm bg-white" />
        </div>
        <div className="flex items-center gap-2">
          <Icon name="branch" className="w-4 h-4 text-slate-400" />
          <select value={deptFilter} onChange={e => setDeptFilter(e.target.value)} className="px-3 py-2.5 border border-slate-200 rounded-lg text-sm bg-white">
            <option value="all">All Departments</option>
            {departments.map(d => <option key={d} value={d}>{d}</option>)}
          </select>
        </div>
        <select value={statusFilter} onChange={e => setStatusFilter(e.target.value)} className="px-3 py-2.5 border border-slate-200 rounded-lg text-sm bg-white">
          <option value="all">All Status</option>
          <option value="active">Active</option>
          <option value="inactive">Inactive</option>
        </select>
      </div>

      {/* Staff table */}
      <div className="card responsive-table-wrap overflow-visible">
        <table className="w-full text-sm">
          <thead className="bg-slate-50 border-b border-slate-200">
            <tr>
              <th className="text-left px-5 py-3 font-semibold text-slate-600">Name</th>
              <th className="text-left px-5 py-3 font-semibold text-slate-600">Email</th>
              <th className="text-left px-5 py-3 font-semibold text-slate-600">Department</th>
              <th className="text-left px-5 py-3 font-semibold text-slate-600">Status</th>
              <th className="w-12"></th>
            </tr>
          </thead>
          <tbody>
            {filtered.length === 0 ? (
              <tr><td colSpan="5" className="px-5 py-12 text-center text-slate-500">No staff match the filters</td></tr>
            ) : filtered.map(u => {
              const isMe = u.id === currentUser.id;
              return (
                <tr key={u.id} className="border-b border-slate-100 hover:bg-slate-50 group relative">
                  <td className="px-5 py-3">
                    <div className="flex items-center gap-3">
                      <Avatar user={u} size="md" />
                      <div>
                        <div className="font-medium text-slate-800">{u.name}{isMe && <span className="text-xs text-blue-600 font-normal ml-1.5">(you)</span>}</div>
                        {(u.isAdmin || u.role === 'super_admin') && (
                          <div className="flex items-center gap-1 text-xs text-red-600 font-medium mt-0.5">
                            <Icon name="cog" className="w-3 h-3" />
                            <span>Super Admin</span>
                            {u.bootstrapAdmin && <Badge className="bg-slate-100 text-slate-500 border border-slate-200 ml-1 text-[10px] font-medium tracking-wide">System</Badge>}
                          </div>
                        )}
                        {!u.isAdmin && u.role === 'manager' && <div className="flex items-center gap-1 text-xs text-amber-600 font-medium mt-0.5"><Icon name="users" className="w-3 h-3" /> Manager</div>}
                      </div>
                    </div>
                  </td>
                  <td className="px-5 py-3 text-slate-700"><div className="flex items-center gap-1.5"><Icon name="mail" className="w-3.5 h-3.5 text-slate-400" />{u.email}</div></td>
                  <td className="px-5 py-3"><Badge className="bg-slate-100 text-slate-700 border border-slate-200">{u.department}</Badge></td>
                  <td className="px-5 py-3">
                    {u.active !== false
                      ? <Badge className="bg-emerald-50 text-emerald-700 border border-emerald-200">Active</Badge>
                      : <Badge className="bg-slate-100 text-slate-600 border border-slate-200">Inactive</Badge>}
                  </td>
                  <td className="px-2 py-3 relative">
                    {canManage && (
                      <button onClick={e => { e.stopPropagation(); setMenuOpen(menuOpen === u.id ? null : u.id); }} className="row-hover-actions p-1.5 rounded bg-emerald-500 hover:bg-emerald-600 text-white" title="Actions">
                        <Icon name="moreV" className="w-4 h-4" />
                      </button>
                    )}
                    {menuOpen === u.id && (
                      <div onClick={e => e.stopPropagation()} className="absolute right-4 top-12 w-44 bg-white border border-slate-200 rounded-lg shadow-xl z-30 fade-in py-1">
                        <button onClick={() => { openEdit(u); setMenuOpen(null); }} className="w-full flex items-center gap-2 px-3 py-2 text-sm text-slate-700 hover:bg-slate-50 text-left">
                          <Icon name="edit" className="w-4 h-4" /> Edit
                        </button>
                        {admin && !isMe && !u.bootstrapAdmin && (
                          <button onClick={() => { setConfirm({ kind: u.active === false ? 'activate' : 'deactivate', user: u }); setMenuOpen(null); }} className="w-full flex items-center gap-2 px-3 py-2 text-sm text-slate-700 hover:bg-slate-50 text-left">
                            <Icon name="userPlus" className="w-4 h-4" /> {u.active === false ? 'Reactivate' : 'Deactivate'}
                          </button>
                        )}
                        {admin && !isMe && !u.bootstrapAdmin && (
                          <button onClick={() => { setConfirm({ kind: 'delete', user: u }); setMenuOpen(null); }} className="w-full flex items-center gap-2 px-3 py-2 text-sm text-red-600 hover:bg-red-50 text-left">
                            <Icon name="trash" className="w-4 h-4" /> Delete
                          </button>
                        )}
                        {u.bootstrapAdmin && admin && !isMe && (
                          <div className="px-3 py-2 text-xs text-slate-400 flex items-center gap-1.5 border-t border-slate-100">
                            <Icon name="cog" className="w-3.5 h-3.5" />
                            Bootstrap admin — cannot be deleted or deactivated
                          </div>
                        )}
                      </div>
                    )}
                  </td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>

      <StaffModal open={modalOpen} initial={editing} currentUser={currentUser} onClose={() => setModalOpen(false)} onSave={save} />

      {/* Action confirmations */}
      {confirm && (
        <Modal open={true} onClose={() => setConfirm(null)} title={
          confirm.kind === 'delete' ? 'Delete staff member?' :
          confirm.kind === 'deactivate' ? 'Deactivate this staff member?' :
          'Reactivate this staff member?'
        }>
          <div className="p-6">
            <p className="text-sm text-slate-600">
              {confirm.kind === 'delete' && <Fragment>Are you sure you want to permanently delete <span className="font-semibold text-slate-800">{confirm.user.name}</span>? This action cannot be undone. They will lose access to the system, and any tickets assigned to them will become unassigned.</Fragment>}
              {confirm.kind === 'deactivate' && <Fragment>Are you sure you want to deactivate <span className="font-semibold text-slate-800">{confirm.user.name}</span>? They will lose access to the system but their data and tickets will be preserved.</Fragment>}
              {confirm.kind === 'activate' && <Fragment>Reactivate <span className="font-semibold text-slate-800">{confirm.user.name}</span>? They will regain access to the system.</Fragment>}
            </p>
            <div className="flex justify-end gap-2 mt-5">
              <Button variant="secondary" onClick={() => setConfirm(null)}>Cancel</Button>
              {confirm.kind === 'delete' && <Button variant="danger" onClick={() => { onDeleteStaff(confirm.user.id); setConfirm(null); }}>Delete</Button>}
              {confirm.kind === 'deactivate' && <Button variant="primary" onClick={() => { onUpdateStaff(confirm.user.id, { active: false }); setConfirm(null); }}>Deactivate</Button>}
              {confirm.kind === 'activate' && <Button variant="success" onClick={() => { onUpdateStaff(confirm.user.id, { active: true }); setConfirm(null); }}>Reactivate</Button>}
            </div>
          </div>
        </Modal>
      )}
    </div>
  </>
  );
};

// ============================================================
// MAIN APP
// ============================================================
const App = () => {
  const [state, setState] = useState(loadState);
  const [view, setView] = useState('dashboard');
  const [filter, setFilter] = useState('all');
  const [currentTicketId, setCurrentTicketId] = useState(null);
  const [currentStaffId, setCurrentStaffId] = useState(null);
  const [teamFilterIds, setTeamFilterIds] = useState(null);
  const [assignModal, setAssignModal] = useState({ open: false, ticket: null });
  const [deleteModal, setDeleteModal] = useState({ open: false, ticket: null });
  const [toast, setToast] = useState(null);
  const [mobileNavOpen, setMobileNavOpen] = useState(false);
  const [authMode, setAuthMode] = useState('checking');  // 'checking' | 'microsoft' | 'demo' | 'none'
  const [msUser, setMsUser] = useState(null);
  const [loginError, setLoginError] = useState(null);
  const [theme, setTheme] = useState(() => {
    try { return localStorage.getItem('yahweh_theme') || 'light'; } catch (e) { return 'light'; }
  });

  useEffect(() => { saveState(state); }, [state]);
  useEffect(() => { const l = document.getElementById('loading'); if (l) l.remove(); }, []);
  useEffect(() => {
    if (theme === 'dark') document.documentElement.classList.add('dark');
    else document.documentElement.classList.remove('dark');
    try { localStorage.setItem('yahweh_theme', theme); } catch (e) {}
  }, [theme]);
  const toggleTheme = () => setTheme(t => t === 'dark' ? 'light' : 'dark');

  // ── On mount: check ?error= from backend redirect and try /auth/me ──
  useEffect(() => {
    const params = new URLSearchParams(window.location.search);
    const err = params.get('error');
    if (err) {
      setLoginError(decodeURIComponent(err));
      window.history.replaceState({}, '', window.location.pathname);
    }
    apiClient.me().then(data => {
      if (data && data.user) {
        const u = data.user;
        setMsUser({
          id: 'ms_' + u.id,
          backendId: u.id,
          name: u.name,
          email: u.email,
          role: u.role,
          department: u.department || 'Unknown',
          avatar: (u.name || '?').split(' ').map(s => s[0]).slice(0, 2).join('').toUpperCase(),
          isAdmin: u.is_admin || u.role === 'super_admin',
          bootstrapAdmin: u.bootstrap_admin,
          systemCreated: u.bootstrap_admin,
          active: u.active,
          permissions: data.permissions || [],
        });
        setAuthMode('microsoft');
      } else {
        setAuthMode('none');
      }
    }).catch(() => setAuthMode('none'));
    // Auto-refresh access token every 12 min (TTL 15 min)
    const refreshTimer = setInterval(() => {
      fetch(`${API_BASE}/auth/refresh`, { method: 'POST', credentials: 'include' }).catch(() => {});
    }, 12 * 60 * 1000);
    return () => clearInterval(refreshTimer);
  }, []);

  const currentUser = msUser || state.users.find(u => u.id === state.currentUserId);

  if (authMode === 'checking') {
    return (
      <div className="min-h-screen flex items-center justify-center brand-gradient text-white">
        <div className="text-center">
          <div className="inline-block w-10 h-10 border-4 border-white/30 border-t-white rounded-full animate-spin mb-3"></div>
          <div className="text-sm">Checking your session…</div>
        </div>
      </div>
    );
  }
  if (!currentUser) return <LoginScreen users={state.users} loginError={loginError} onSelect={(id) => { setAuthMode('demo'); setState(s => ({ ...s, currentUserId: id })); }} />;

  // Unified logout — calls backend if Microsoft session, clears local state if demo
  const handleLogout = async () => {
    if (authMode === 'microsoft') {
      const msLogoutUrl = await apiClient.logout();
      setMsUser(null);
      setAuthMode('none');
      // Bounce through Microsoft global sign-out to clear the Entra session too
      if (msLogoutUrl) window.location.href = msLogoutUrl;
    } else {
      setState(s => ({ ...s, currentUserId: null }));
      setAuthMode('none');
    }
  };

  const showToast = (kind, title, body) => setToast({ kind, title, body });

  const addNotification = (n) => {
    setState(s => ({ ...s, notifications: [{ id: uid(), at: now(), read: false, ...n }, ...(s.notifications || [])].slice(0, 50) }));
  };

  // Send email + push to a user about a ticket
  const notifyUser = (userId, ticket, eventLabel, body) => {
    const user = getUser(state.users, userId);
    if (!user || userId === currentUser.id) return;
    addNotification({ recipientId: userId, ticketId: ticket.id, channel: 'email', subject: `[Yahweh Care] ${eventLabel}: ${ticket.title}`, body: `${body}\n\nTicket: ${ticket.ticketNumber}` });
    addNotification({ recipientId: userId, ticketId: ticket.id, channel: 'push', subject: `${eventLabel} — ${ticket.title}`, body });
  };

  const createTicket = (data) => {
    const createdAt = now();
    const dueAt = data.expectedCompletion ? new Date(data.expectedCompletion).toISOString() : new Date(new Date(createdAt).getTime() + getPriority(data.priority).slaHours * 3600000).toISOString();
    const year = new Date(createdAt).getFullYear();
    const seq = String((state.tickets.length + 1) * 7 + 1000).padStart(4, '0');
    const ticket = {
      id: uid(),
      ticketNumber: `YPC-TKT-${year}-${seq}`,
      title: data.title,
      titleType: data.titleType,
      description: data.description,
      category: data.category,
      subcategory: data.subcategory,
      priority: data.priority,
      status: data.status || 'open',
      requesterId: currentUser.id,
      assigneeId: data.assigneeId || null,
      expectedCompletion: data.expectedCompletion,
      ndisRelated: data.ndisRelated,
      attachments: data.attachments || [],
      createdAt, updatedAt: createdAt, dueAt,
      comments: [],
      activity: [{ id: uid(), at: createdAt, userId: currentUser.id, text: 'Created' }],
    };
    setState(s => ({ ...s, tickets: [ticket, ...s.tickets] }));
    if (ticket.assigneeId) notifyUser(ticket.assigneeId, ticket, 'Ticket assigned to you', `${currentUser.name} assigned a new ${getPriority(ticket.priority).label.toLowerCase()}-priority ticket to you.`);
    showToast('success', 'Ticket created', `${ticket.ticketNumber} created` + (ticket.assigneeId ? ` and assigned to ${getUser(state.users, ticket.assigneeId)?.name}` : ''));
    setCurrentTicketId(ticket.id);
    setView('detail');
  };

  const updateTicket = (id, updates, activityText) => {
    const before = state.tickets.find(t => t.id === id);
    setState(s => ({ ...s, tickets: s.tickets.map(t => t.id !== id ? t : { ...t, ...updates, activity: [...(t.activity || []), { id: uid(), at: now(), userId: currentUser.id, text: activityText }] }) }));
    // Notify both assigner and assignee on changes
    if (before) {
      [before.requesterId, before.assigneeId].filter(uid => uid && uid !== currentUser.id).forEach(uid => {
        notifyUser(uid, before, 'Ticket updated', `${currentUser.name}: ${activityText}`);
      });
    }
  };

  const addComment = (ticketId, body) => {
    const t = state.tickets.find(x => x.id === ticketId);
    setState(s => ({ ...s, tickets: s.tickets.map(x => x.id !== ticketId ? x : { ...x, updatedAt: now(), comments: [...(x.comments || []), { id: uid(), userId: currentUser.id, body, createdAt: now() }], activity: [...(x.activity || []), { id: uid(), at: now(), userId: currentUser.id, text: 'Comment added' }] }) }));
    if (t) [t.requesterId, t.assigneeId].filter(uid => uid && uid !== currentUser.id).forEach(uid => {
      notifyUser(uid, t, 'New comment on ticket', `${currentUser.name} commented: "${body.slice(0, 120)}${body.length > 120 ? '...' : ''}"`);
    });
  };

  const assignTicket = (ticket, assigneeId) => {
    if (assigneeId === currentUser.id) {
      showToast('error', 'Cannot self-assign', 'You cannot assign tickets to yourself.');
      return;
    }
    const before = ticket;
    setState(s => ({ ...s, tickets: s.tickets.map(t => t.id !== ticket.id ? t : { ...t, assigneeId, updatedAt: now(), activity: [...(t.activity || []), { id: uid(), at: now(), userId: currentUser.id, text: `Assigned to ${getUser(state.users, assigneeId)?.name}` }] }) }));
    notifyUser(assigneeId, ticket, 'Ticket assigned to you', `${currentUser.name} assigned this ticket to you.`);
    if (before.requesterId !== currentUser.id) notifyUser(before.requesterId, ticket, 'Ticket assigned', `${currentUser.name} assigned this ticket to ${getUser(state.users, assigneeId)?.name}.`);
    showToast('success', 'Ticket assigned', `Assigned to ${getUser(state.users, assigneeId)?.name}`);
  };

  const deleteTicket = (ticket) => {
    if (!isAdmin(currentUser)) { showToast('error', 'Permission denied', 'Only admins can delete tickets.'); return; }
    setState(s => ({ ...s, tickets: s.tickets.filter(t => t.id !== ticket.id) }));
    showToast('success', 'Ticket deleted', `${ticket.ticketNumber} has been removed`);
    if (view === 'detail' && currentTicketId === ticket.id) setView('tickets');
  };

  const markComplete = (ticket) => {
    setState(s => ({ ...s, tickets: s.tickets.map(t => t.id !== ticket.id ? t : { ...t, status: 'pending_approval', resolvedAt: now(), updatedAt: now(), activity: [...(t.activity || []), { id: uid(), at: now(), userId: currentUser.id, text: 'Marked complete — awaiting approval' }] }) }));
    notifyUser(ticket.requesterId, ticket, 'Ticket awaiting your approval', `${currentUser.name} marked the ticket as complete. Please review and approve, or reopen with feedback.`);
    showToast('success', 'Marked complete', 'Awaiting approval from the requester');
  };

  const approveTicket = (ticket) => {
    setState(s => ({ ...s, tickets: s.tickets.map(t => t.id !== ticket.id ? t : { ...t, status: 'closed', updatedAt: now(), activity: [...(t.activity || []), { id: uid(), at: now(), userId: currentUser.id, text: 'Approved and closed' }] }) }));
    if (ticket.assigneeId) notifyUser(ticket.assigneeId, ticket, 'Ticket approved and closed', `${currentUser.name} approved your resolution. Ticket is now closed.`);
    showToast('success', 'Ticket approved', 'Ticket has been closed');
  };

  const reopenTicket = (ticket, feedback) => {
    setState(s => ({ ...s, tickets: s.tickets.map(t => t.id !== ticket.id ? t : {
      ...t, status: 'open', resolvedAt: null, updatedAt: now(),
      comments: [...(t.comments || []), { id: uid(), userId: currentUser.id, body: `🔄 Reopened: ${feedback}`, createdAt: now() }],
      activity: [...(t.activity || []), { id: uid(), at: now(), userId: currentUser.id, text: 'Reopened with feedback' }],
    }) }));
    if (ticket.assigneeId) notifyUser(ticket.assigneeId, ticket, 'Ticket reopened', `${currentUser.name} reopened this ticket. Feedback: ${feedback}`);
    showToast('error', 'Ticket reopened', 'Assignee has been notified with your feedback');
  };

  const mergeTicketsHandler = (primaryTicketId, secondaryTicketIds, reason) => {
    try {
      if (!isManager(currentUser) && !isAdmin(currentUser)) {
        showToast('error', 'Permission denied', 'Only managers and admins can merge tickets.');
        return;
      }

      const { updatedPrimary, archivedTickets } = mergeTickets(primaryTicketId, secondaryTicketIds, reason, state.tickets, currentUser.id);

      // Update state with merged primary and archived secondaries
      setState(s => ({
        ...s,
        tickets: s.tickets.map(t => {
          if (t.id === primaryTicketId) return updatedPrimary;
          if (secondaryTicketIds.includes(t.id)) {
            const archived = archivedTickets.find(at => at.id === t.id);
            return archived || t;
          }
          return t;
        })
      }));

      // Send notifications to all admins, bootstrap admins, and other managers
      const notifyList = state.users.filter(u =>
        u.active && (isAdmin({ role: u.role, isAdmin: u.isAdmin }) || (u.role === 'manager' && u.id !== currentUser.id))
      );

      notifyList.forEach(user => {
        const mergedTicketNumbers = archivedTickets.map(t => t.ticketNumber).join(', ');
        addNotification({
          recipientId: user.id,
          channel: 'email',
          subject: `[Yahweh Care] Tickets Merged: ${updatedPrimary.ticketNumber}`,
          body: `${currentUser.name} merged ${archivedTickets.length} duplicate ticket(s) into ${updatedPrimary.ticketNumber}.\n\nPrimary: ${updatedPrimary.title}\nMerged: ${mergedTicketNumbers}\nReason: ${reason}`
        });
        addNotification({
          recipientId: user.id,
          channel: 'push',
          subject: 'Duplicate Tickets Merged',
          body: `${archivedTickets.length} ticket(s) merged into ${updatedPrimary.ticketNumber}`
        });
      });

      showToast('success', 'Tickets merged', `${archivedTickets.length} ticket(s) merged into ${updatedPrimary.ticketNumber}`);
    } catch (error) {
      console.error('Merge error:', error);
      showToast('error', 'Merge failed', error.message || 'An error occurred while merging tickets');
    }
  };

  const markAllNotifsRead = () => setState(s => ({ ...s, notifications: (s.notifications || []).map(n => ({ ...n, read: true })) }));

  // ---- Staff Management ----
  const MIN_ADMINS = 2;

  const addStaff = (data) => {
    if (!isAdmin(currentUser)) { showToast('error', 'Admin only', 'Only Super Admins can add new staff. Managers can edit existing team members.'); return; }
    // Email domain check — match HRMS backend
    const emailCheck = validateOrgEmail(data.email);
    if (!emailCheck.valid) { showToast('error', 'Email rejected', emailCheck.reason); return; }
    // Email uniqueness check
    if (state.users.some(u => u.email.toLowerCase() === (data.email || '').toLowerCase().trim())) {
      showToast('error', 'Duplicate email', 'A user with this email already exists.');
      return;
    }
    // Only Super Admin can choose a privileged role
    const safe = { ...data };
    if (!isAdmin(currentUser)) {
      safe.role = 'user';
      // Managers can only add to their own department
      safe.department = currentUser.department;
    }
    const initials = (safe.name || '').split(' ').map(s => s[0]).slice(0, 2).join('').toUpperCase() || '?';
    const newUser = {
      id: uid(),
      name: safe.name.trim(),
      email: safe.email.toLowerCase().trim(),
      department: safe.department,
      avatar: initials,
      role: safe.role || 'user',
      active: safe.active !== false,
      isAdmin: safe.role === 'super_admin',
    };
    setState(s => ({ ...s, users: [...s.users, newUser] }));
    showToast('success', 'Staff added', `${newUser.name} added as ${ROLE_LABELS[newUser.role].label} in ${newUser.department}`);
  };
  const updateStaff = (id, data) => {
    if (!canManageStaff(currentUser)) { showToast('error', 'Permission denied', 'You don\'t have permission to edit staff.'); return; }
    const target = state.users.find(u => u.id === id);
    if (!target) return;
    // Row-level security: managers can only edit staff in their own department
    if (!isAdmin(currentUser) && target.department !== currentUser.department) {
      showToast('error', 'Permission denied', 'You can only edit members of your own department.');
      return;
    }

    // ── Bootstrap admin protection ─────────────────────────
    // Bootstrap admins cannot be demoted or deactivated by anyone (not even other super admins)
    if (target.bootstrapAdmin) {
      if (data.role && data.role !== 'super_admin') {
        showToast('error', 'Bootstrap admin protected', `${target.name} is a bootstrap Super Admin — their role cannot be changed.`);
        return;
      }
      if (data.active === false) {
        showToast('error', 'Bootstrap admin protected', `${target.name} is a bootstrap Super Admin — they cannot be deactivated.`);
        return;
      }
    }

    // Only Super Admin can change role tier
    const safe = { ...data };
    if (!isAdmin(currentUser)) {
      delete safe.role;
      delete safe.active;
      // Managers can't move staff out of their department either
      if (safe.department && safe.department !== currentUser.department) safe.department = currentUser.department;
    }
    // Translate role selector → isAdmin flag
    const wantsAdmin = safe.role === 'super_admin';

    // Cannot demote yourself from admin (prevent lockout)
    if (id === currentUser.id && target.isAdmin && safe.role && safe.role !== 'super_admin') {
      showToast('error', 'Action blocked', 'You cannot remove your own admin access. Ask another Super Admin to do it.');
      return;
    }

    // Enforce minimum admin count
    const willBeAdmin = ('role' in safe) ? wantsAdmin : !!target.isAdmin;
    const willBeActive = ('active' in safe) ? safe.active : target.active !== false;
    const willStayAdmin = willBeAdmin && willBeActive;
    const wasActiveAdmin = target.isAdmin && target.active !== false;
    if (wasActiveAdmin && !willStayAdmin) {
      const remaining = state.users.filter(u => u.id !== id && u.isAdmin && u.active !== false).length;
      if (remaining < MIN_ADMINS) {
        const action = !willBeAdmin ? 'demote' : 'deactivate';
        showToast('error', 'At least 2 admins required', `Cannot ${action} ${target.name} — at least ${MIN_ADMINS} active Super Admins must remain. Promote another user to admin first.`);
        return;
      }
    }

    setState(s => ({
      ...s,
      users: s.users.map(u => {
        if (u.id !== id) return u;
        const next = { ...u, ...safe };
        if ('role' in safe) next.isAdmin = wantsAdmin;
        return next;
      }),
    }));
    showToast('success', 'Staff updated', `${target.name} has been updated`);
  };
  const deleteStaff = (id) => {
    if (!isAdmin(currentUser)) { showToast('error', 'Permission denied', 'Only Super Admin can delete staff.'); return; }
    const target = state.users.find(u => u.id === id);
    if (!target) return;
    if (id === currentUser.id) { showToast('error', 'Cannot delete yourself', 'You cannot delete your own account.'); return; }
    if (target.bootstrapAdmin) { showToast('error', 'Bootstrap admin protected', `${target.name} is a bootstrap Super Admin and cannot be deleted.`); return; }
    if (target.isAdmin && target.active !== false) {
      const remainingAdmins = state.users.filter(u => u.id !== id && u.isAdmin && u.active !== false).length;
      if (remainingAdmins < MIN_ADMINS) {
        showToast('error', 'At least 2 admins required', `Cannot delete ${target.name} — at least ${MIN_ADMINS} active Super Admins must remain. Promote another user to admin first.`);
        return;
      }
    }
    setState(s => ({
      ...s,
      users: s.users.filter(u => u.id !== id),
      tickets: s.tickets.map(t => t.assigneeId === id ? { ...t, assigneeId: null } : t),
    }));
    showToast('success', 'Staff deleted', `${target.name} has been removed`);
  };

  // ---- Scheduled Reports (admin + manager) ----
  const requireMgmt = () => {
    if (!isManager(currentUser)) { showToast('error', 'Access required', 'Only admins and managers can manage scheduled reports.'); return false; }
    return true;
  };
  const createSchedule = (data) => {
    if (!requireMgmt()) return;
    const s = { id: uid(), ...data, createdBy: currentUser.id, lastSentAt: null, sentCount: 0, createdAt: now() };
    setState(st => ({ ...st, schedules: [...(st.schedules || []), s] }));
    showToast('success', 'Schedule created', `"${s.name}" will run ${scheduleSummary(s)}`);
  };
  const updateSchedule = (id, data) => {
    if (!requireMgmt()) return;
    // Managers can only edit their own schedules
    const target = (state.schedules || []).find(x => x.id === id);
    if (!isAdmin(currentUser) && target && target.createdBy && target.createdBy !== currentUser.id) {
      showToast('error', 'Permission denied', 'You can only edit schedules you created.');
      return;
    }
    setState(st => ({ ...st, schedules: (st.schedules || []).map(x => x.id === id ? { ...x, ...data } : x) }));
    showToast('success', 'Schedule updated', `"${data.name}" has been saved`);
  };
  const deleteSchedule = (id) => {
    if (!requireMgmt()) return;
    const target = (state.schedules || []).find(x => x.id === id);
    if (!isAdmin(currentUser) && target && target.createdBy && target.createdBy !== currentUser.id) {
      showToast('error', 'Permission denied', 'You can only delete schedules you created.');
      return;
    }
    setState(st => ({ ...st, schedules: (st.schedules || []).filter(x => x.id !== id) }));
    showToast('success', 'Schedule deleted', '');
  };
  const toggleScheduleActive = (id) => {
    if (!requireMgmt()) return;
    const target = (state.schedules || []).find(x => x.id === id);
    if (!isAdmin(currentUser) && target && target.createdBy && target.createdBy !== currentUser.id) {
      showToast('error', 'Permission denied', 'You can only manage schedules you created.');
      return;
    }
    setState(st => ({ ...st, schedules: (st.schedules || []).map(x => x.id === id ? { ...x, active: !x.active } : x) }));
  };
  const sendScheduleNow = (s) => {
    if (!requireMgmt()) return;
    setState(st => ({ ...st, schedules: (st.schedules || []).map(x => x.id === s.id ? { ...x, lastSentAt: now(), sentCount: (x.sentCount || 0) + 1 } : x) }));
    s.recipientIds.forEach(rid => {
      const u = getUser(state.users, rid);
      if (u) addNotification({ recipientId: rid, channel: 'email', subject: `[Yahweh Care] ${s.name}`, body: `Your scheduled report "${s.name}" — including ${s.reportTypes.length} report type${s.reportTypes.length !== 1 ? 's' : ''} — has been sent.` });
    });
    showToast('success', 'Report sent', `"${s.name}" sent to ${s.recipientIds.length} recipient${s.recipientIds.length !== 1 ? 's' : ''}`);
  };

  // Navigation handler for breadcrumbs
  const navigateTo = (action) => {
    if (action === 'tickets') setTeamFilterIds(null);
    setView(action);
  };

  let content;
  switch (view) {
    case 'dashboard':  content = <Dashboard tickets={state.tickets} users={state.users} currentUser={currentUser} filter={filter} setFilter={setFilter} onOpenTicket={(id) => { setCurrentTicketId(id); setView('detail'); }} onMergeTickets={mergeTicketsHandler} onApprove={approveTicket} onReopen={reopenTicket} />; break;
    case 'new':        content = <NewTicket currentUser={currentUser} users={state.users} onCreate={createTicket} onCancel={() => setView('dashboard')} />; break;
    case 'tickets':    content = <TicketsList tickets={state.tickets} users={state.users} currentUser={currentUser} onOpen={(id) => { setCurrentTicketId(id); setView('detail'); }} onAssign={(t) => setAssignModal({ open: true, ticket: t })} onDelete={(t) => setDeleteModal({ open: true, ticket: t })} onNew={() => setView('new')} teamFilterIds={teamFilterIds} onClearTeamFilter={() => setTeamFilterIds(null)} onNavigate={navigateTo} />; break;
    case 'detail':     content = <TicketDetail ticketId={currentTicketId} tickets={state.tickets} users={state.users} currentUser={currentUser} onUpdate={updateTicket} onAddComment={addComment} onAssign={(t) => setAssignModal({ open: true, ticket: t })} onDelete={(t) => setDeleteModal({ open: true, ticket: t })} onMarkComplete={markComplete} onApprove={approveTicket} onReopen={reopenTicket} onBack={() => setView('tickets')} />; break;
    case 'calendar':   content = <CalendarView tickets={state.tickets} onOpen={(id) => { setCurrentTicketId(id); setView('detail'); }} onNavigate={navigateTo} />; break;
    case 'logs':       content = isManager(currentUser) ? <TicketLogs tickets={state.tickets} users={state.users} onOpen={(id) => { setCurrentTicketId(id); setView('detail'); }} onNavigate={navigateTo} /> : <AccessDenied />; break;
    case 'staff-perf': content = isManager(currentUser) ? <StaffPerformance tickets={state.tickets} users={state.users} currentUser={currentUser} onOpen={(id) => { setCurrentTicketId(id); setView('detail'); }} onOpenStaff={(id) => { setCurrentStaffId(id); setView('staff-detail'); }} onNavigate={navigateTo} /> : <AccessDenied />; break;
    case 'staff-detail': content = isManager(currentUser) ? <StaffDetail staffId={currentStaffId} tickets={state.tickets} users={state.users} currentUser={currentUser} onBack={() => setView('staff-perf')} onOpenTicket={(id) => { setCurrentTicketId(id); setView('detail'); }} onNavigate={navigateTo} /> : <AccessDenied />; break;
    case 'team-comp':  content = isManager(currentUser) ? <TeamComparison tickets={state.tickets} users={state.users} currentUser={currentUser} onOpenStaff={(id) => { setCurrentStaffId(id); setView('staff-detail'); }} onViewTeamTickets={(memberIds) => { setTeamFilterIds(memberIds); setView('tickets'); }} onNavigate={navigateTo} /> : <AccessDenied />; break;
    case 'staff':      content = isManager(currentUser) ? <StaffManagement users={state.users} tickets={state.tickets} currentUser={currentUser} onAddStaff={addStaff} onUpdateStaff={updateStaff} onDeleteStaff={deleteStaff} onNavigate={navigateTo} /> : <AccessDenied />; break;
    case 'reports':    content = isManager(currentUser) ? <ScheduledReports schedules={state.schedules || []} users={state.users} currentUser={currentUser} onCreate={createSchedule} onUpdate={updateSchedule} onDelete={deleteSchedule} onSendNow={sendScheduleNow} onToggleActive={toggleScheduleActive} /> : <AccessDenied />; break;
    default:           content = <Dashboard tickets={state.tickets} users={state.users} currentUser={currentUser} filter={filter} setFilter={setFilter} onOpenTicket={(id) => { setCurrentTicketId(id); setView('detail'); }} onMergeTickets={mergeTicketsHandler} />;
  }

  return (
    <div className="flex h-screen brand-gradient-soft">
      <Sidebar view={view} setView={(v) => { if (v === 'tickets') setTeamFilterIds(null); setView(v); }} currentUser={currentUser} onLogout={handleLogout} mobileOpen={mobileNavOpen} onCloseMobile={() => setMobileNavOpen(false)} />
      <div className="flex-1 flex flex-col overflow-hidden">
        <TopBar currentUser={currentUser} onClose={handleLogout} onOpenMobileMenu={() => setMobileNavOpen(true)} notifications={state.notifications || []} onMarkAllRead={markAllNotifsRead} theme={theme} onToggleTheme={toggleTheme} />
        {content}
      </div>
      <AssignModal open={assignModal.open} ticket={assignModal.ticket} users={state.users} currentUser={currentUser} onClose={() => setAssignModal({ open: false, ticket: null })} onAssign={assignTicket} />
      <DeleteModal open={deleteModal.open} ticket={deleteModal.ticket} onClose={() => setDeleteModal({ open: false, ticket: null })} onDelete={deleteTicket} />
      <Toast toast={toast} onClose={() => setToast(null)} />
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>

  <div style="padding: 40px; text-align: center; font-family: system-ui;">
    <h1>JavaScript Required</h1>
    <p>Please enable JavaScript to view this application.</p>
  </div>
</noscript>

</body>
</html>
