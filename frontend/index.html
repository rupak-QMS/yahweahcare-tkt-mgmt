        :root {

        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
        .stat-card { transition: all 0.3s ease; }
        .stat-card:hover { transform: translateY(-4px); box-shadow: 0 12px 24px rgba(0,0,0,0.1); }
        .chart-container { position: relative; height: 300px; }
        .badge { display: inline-block; padding: 4px 12px; border-radius: 9999px; font-size: 12px; font-weight: 600; }
        .badge-open { background-color: #DBEAFE; color: #0369A1; }
        .badge-in-progress { background-color: #DCFCE7; color: #15803D; }
        .badge-resolved { background-color: #D1FAE5; color: #065F46; }
        .badge-closed { background-color: #F3E8FF; color: #6B21A8; }
        .badge-urgent { background-color: #FEE2E2; color: #991B1B; }
        .badge-high { background-color: #FECACA; color: #7C2D12; }
        .badge-medium { background-color: #FCD34D; color: #78350F; }
        .badge-low { background-color: #DBEAFE; color: #0C4A6E; }
        .table-row:hover { background-color: #F9FAFB; }
        input[type="text"], input[type="email"], input[type="date"], select, textarea {
            padding: 10px 12px;
            border: 1px solid #E5E7EB;
            border-radius: 6px;
            font-size: 14px;
        }
        input[type="text"]:focus, input[type="email"]:focus, input[type="date"]:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #6366F1;
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);

        .calendar-day { padding: 8px; border: 1px solid #E5E7EB; text-align: center; cursor: pointer; }
        .calendar-day:hover { background-color: #F9FAFB; }
        .calendar-day.today { background-color: #DBEAFE; border-color: #0369A1; }
        .calendar-day.event { background-color: #BFDBFE; }

                getAll: async () => {
                    const res = await fetch(`${API_BASE_URL}/tickets`);

                    return res.json();
                },
                getById: async (id) => {
                    const res = await fetch(`${API_BASE_URL}/tickets/${id}`);
                    if (!res.ok) throw new Error('Ticket not found');
                    return res.json();
                },
                create: async (data) => {
                    const res = await fetch(`${API_BASE_URL}/tickets`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(data)
                    });
                    if (!res.ok) throw new Error('Failed to create ticket');
                    return res.json();
                },
                update: async (id, data) => {
                    const res = await fetch(`${API_BASE_URL}/tickets/${id}`, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(data)
                    });
                    if (!res.ok) throw new Error('Failed to update ticket');
                    return res.json();

                    return res.json();

                        body: JSON.stringify({ escalateToUserId, reason })

        // Create Ticket Page
        function CreateTicket() {
            const [formData, setFormData] = React.useState({
                title_type: 'Service Request',
                subtitle: '',
                category_id: 'it',
                subcategory: '',
                issue_details: '',
                submitted_by: 'Ron Costa',
                email: 'IT@yahweahcare.com.au',
                ndis_related: false,
                priority_id: 'medium',
                initial_status: 'new',
                expected_completion: '',
                assign_to: 'Unassigned',
                approval_mode: 'AnyOne',
                approver_ids: [],
                created_by: 1,  // Ron Costa
                assigned_to: null
            });
            const [loading, setLoading] = React.useState(false);
            const [lookups, setLookups] = React.useState(null);
            const [error, setError] = React.useState('');
            const [success, setSuccess] = React.useState(false);

            React.useEffect(() => {
                fetchLookups();
            }, []);

            const fetchLookups = async () => {
                try {
                    const data = await API.lookups.get();
                    setLookups(data);
                } catch (err) {
                    setError('Failed to load form options');
                }
            };

            const handleSubmit = async (e) => {
                e.preventDefault();
                setLoading(true);
                setError('');
                setSuccess(false);
                try {
                    if (!formData.expected_completion) {
                        setError('Expected Completion date is required');
                        setLoading(false);
                        return;
                    }
                    if (!formData.approver_ids || formData.approver_ids.length === 0) {
                        setError('At least one approver must be selected');
                        setLoading(false);
                        return;
                    }
                    await API.tickets.create(formData);
                    setSuccess(true);
                    setFormData({
                        title_type: 'Service Request',
                        subtitle: '',
                        category_id: 'it',
                        subcategory: '',
                        issue_details: '',
                        submitted_by: 'Ron Costa',
                        email: 'IT@yahweahcare.com.au',
                        ndis_related: false,
                        priority_id: 'medium',
                        initial_status: 'new',
                        expected_completion: '',
                        assign_to: 'Unassigned',
                        approval_mode: 'AnyOne',
                        approver_ids: [],
                        created_by: 1,
                        assigned_to: null
                    });
                    setTimeout(() => setSuccess(false), 5000);
                } catch (err) {
                    setError('Failed to create ticket: ' + err.message);
                } finally {
                    setLoading(false);
                }
            };

            const handleChange = (e) => {
                const { name, value, type, checked } = e.target;
                setFormData(prev => ({
                    ...prev,
                    [name]: type === 'checkbox' ? checked : value
                }));
            };

            const inputCls = "w-full border border-gray-200 rounded-lg px-3 py-2.5 text-sm text-gray-800 bg-white focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition";
            const labelCls = "block text-xs font-semibold text-gray-500 uppercase tracking-wide mb-1.5";
            const cardCls = "bg-white rounded-xl shadow-sm border border-gray-100 p-6 mb-5";
            const sectionHeadCls = "text-sm font-semibold text-gray-400 uppercase tracking-widest mb-5 flex items-center gap-2";

            return (
                <main className="flex-1 overflow-auto" style={{background:'#F8F9FB'}}>
                    <div className="max-w-6xl mx-auto px-8 py-8">
                        {/* Page header */}
                        <div className="mb-7">
                            <div className="flex items-center gap-2 text-sm text-gray-400 mb-2 cursor-pointer hover:text-indigo-600 transition w-fit" onClick={() => {}}>
                                <span style={{fontSize:'16px'}}>←</span>
                                <span>Back</span>
                            </div>
                            <h1 className="text-2xl font-bold text-gray-900 tracking-tight">Create New Ticket</h1>
                            <p className="text-sm text-gray-400 mt-1">Submit a new support request</p>
                        </div>

                        {error && (
                            <div className="flex items-center gap-3 bg-red-50 border border-red-100 text-red-600 px-4 py-3 rounded-xl mb-5 text-sm">
                                <span>⚠️</span> {error}
                            </div>
                        )}
                        {success && (
                            <div className="flex items-center gap-3 bg-emerald-50 border border-emerald-100 text-emerald-700 px-4 py-3 rounded-xl mb-5 text-sm">
                                <span>✅</span> Ticket created successfully!
                            </div>
                        )}

                        {!lookups ? (
                            <div className="flex items-center justify-center py-20">
                                <div className="text-center">

                                            <label className={labelCls}>Initial Status <span className="text-red-400">*</span></label>
                                            <select name="initial_status" value={formData.initial_status} onChange={handleChange} className={inputCls}>

                                                <option value="assigned">Assigned</option>

                                                <option value="closed">Closed</option>

            const [escalateMode, setEscalateMode] = React.useState(false);

            const [escalateReason, setEscalateReason] = React.useState('');

                    'Open': 'badge-open',
                    'In Progress': 'badge-in-progress',
                    'Resolved': 'badge-resolved',
                    'Closed': 'badge-closed'
                };
                return badges[status] || 'badge-open';

            const getPriorityBadge = (priority) => {
                const badges = {
                    'Urgent': 'badge-urgent',
                    'High': 'badge-high',
                    'Medium': 'badge-medium',
                    'Low': 'badge-low'
                };
                return badges[priority] || 'badge-medium';

                                                        >
                                                            {actionLoading ? '⏳…' : '❌ Confirm Reject & Reopen'}
                                                        </button>

                                                            className="px-4 py-2.5 bg-gray-100 text-gray-700 text-sm font-semibold rounded-xl hover:bg-gray-200 transition"
                                                        >
                                                            Cancel
                                                        </button>
                                                    </div>
                                                </div>
                                            )}
                                        </div>
                                    )}
                                </div>
                            </div>
                        </div>

        function CalendarPage() {
            const today = new Date();
            const [viewDate, setViewDate] = React.useState(new Date(today.getFullYear(), today.getMonth(), 1));

            const [selectedDay, setSelectedDay] = React.useState(null);
            const [tickets, setTickets] = React.useState([]);

            // Load all tickets once
            React.useEffect(() => {
                API.tickets.getAll().then(data => {
                    setTickets(data.tickets || []);
                }).catch(() => {
                    // Fall back to static sample data
                    setTickets(TICKETS_DATA.map((t, i) => ({
                        ...t,
                        dueAt: null,
                        expectedCompletion: null,
                        // Spread some sample tickets across recent dates for demo
                        _calDate: (() => {
                            const d = new Date();
                            d.setDate(d.getDate() + (i * 3 - 4));
                            return d.toISOString().slice(0,10);
                        })()
                    })));
                });
            }, []);

            // Build ticket map: date string → tickets[]
            const ticketDateMap = {};
            tickets.forEach(t => {
                // Use expectedCompletion, then dueAt, then _calDate fallback
                const raw = t.expectedCompletion || t.dueAt || t._calDate;
                if (!raw) return;
                const ds = raw.slice(0, 10);
                if (!ticketDateMap[ds]) ticketDateMap[ds] = [];
                ticketDateMap[ds].push(t);
            });

            const priorityColor = p => {
                const s = (p || '').toLowerCase();
                if (s === 'critical' || s === 'urgent') return 'bg-red-500';
                if (s === 'high')   return 'bg-orange-400';
                if (s === 'medium') return 'bg-yellow-400';
                return 'bg-blue-400';
            };

            const year  = viewDate.getFullYear();
            const month = viewDate.getMonth();

            const prevMonth = () => setViewDate(new Date(year, month - 1, 1));

                const applies = h.states.includes('ALL') || h.states.includes(selectedState);
                const [hy, hm] = h.date.split('-').map(Number);
                return applies && hy === year && (hm - 1) === month;
            });

            // Build lookup: date string → holiday list
            const holidayMap = {};
            AU_HOLIDAYS.forEach(h => {
                if (h.states.includes('ALL') || h.states.includes(selectedState)) {
                    if (!holidayMap[h.date]) holidayMap[h.date] = [];
                    holidayMap[h.date].push(h);

            // Calendar grid
            const firstDow = new Date(year, month, 1).getDay(); // 0=Sun

            const pad = n => String(n).padStart(2,'0');
            const dateStr = d => `${year}-${pad(month+1)}-${pad(d)}`;
            const isToday = d => today.getFullYear()===year && today.getMonth()===month && today.getDate()===d;
            const isWeekend = d => { const dow = new Date(year,month,d).getDay(); return dow===0||dow===6; };

            // Upcoming holidays (next 90 days from today) for sidebar
            const upcoming = AU_HOLIDAYS.filter(h => {
                if (!h.states.includes('ALL') && !h.states.includes(selectedState)) return false;
                const hd = new Date(h.date); const diff = (hd - today) / 86400000;
                return diff >= 0 && diff <= 90;
            }).sort((a,b) => a.date.localeCompare(b.date)).slice(0, 10);

            const PRIORITY_STYLE = {
                critical: { bar:'#EF4444', bg:'#FEF2F2', text:'#991B1B' },
                urgent:   { bar:'#EF4444', bg:'#FEF2F2', text:'#991B1B' },
                high:     { bar:'#F97316', bg:'#FFF7ED', text:'#9A3412' },
                medium:   { bar:'#EAB308', bg:'#FEFCE8', text:'#854D0E' },
                low:      { bar:'#6366F1', bg:'#EEF2FF', text:'#3730A3' },

                            {/* ── Calendar card ── */}

                                    <button className="cal-nav-btn" onClick={nextMonth} style={{width:'34px',height:'34px',borderRadius:'10px',border:'1.5px solid rgba(255,255,255,0.3)',background:'rgba(255,255,255,0.12)',cursor:'pointer',fontSize:'18px',color:'white',fontWeight:'700',display:'flex',alignItems:'center',justifyContent:'center'}}>›</button>

                                {/* Day headers */}

                                    ))}
                                </div>

                                {/* Cells */}
                                {(() => {
                                    const monFirst = (firstDow + 6) % 7;
                                    const monCells = [];
                                    for (let i=0;i<monFirst;i++) monCells.push(null);
                                    for (let d=1;d<=daysInMonth;d++) monCells.push(d);
                                    while (monCells.length%7!==0) monCells.push(null);

                                            {monCells.map((d,i) => {
                                                const ds = d ? dateStr(d) : null;
                                                const hols = ds?(holidayMap[ds]||[]):[];
                                                const tkts = ds?(ticketDateMap[ds]||[]):[];
                                                const dow = d?new Date(year,month,d).getDay():null;
                                                const isWknd = dow===0||dow===6;
                                                const isTd = d&&isToday(d);

        // Analytics Page
        function AnalyticsPage() {
            const [tickets, setTickets] = React.useState([]);
            const [loading, setLoading] = React.useState(true);
            const [range, setRange] = React.useState('90'); // days

            const charts = React.useRef({});

            React.useEffect(() => {
                API.tickets.getAll().then(d => {
                    setTickets(d.tickets || []);
                    setLoading(false);
                }).catch(() => {
                    // Use sample data spread across last 90 days
                    const base = TICKETS_DATA.map((t,i) => {
                        const d = new Date(); d.setDate(d.getDate() - (i*9));
                        return { ...t, createdAt: d.toISOString(), status_id: t.status.toLowerCase().replace(' ','_'), priority_id: t.priority.toLowerCase(), category_id: t.category.toLowerCase().replace(/ /g,'_'), ndisRelated: i%3===0, slaBreached: i%4===0 };
                    });
                    setTickets(base);
                    setLoading(false);
                });
            }, []);

            // Derived metrics
            const now = new Date();
            const cutoff = new Date(now); cutoff.setDate(now.getDate() - Number(range));
            const filtered = tickets.filter(t => new Date(t.createdAt || t.date || now) >= cutoff);

            const total      = filtered.length;
            const open       = filtered.filter(t => !['resolved','closed'].includes((t.status||t.status_id||'').toLowerCase())).length;
            const resolved   = filtered.filter(t => ['resolved','closed'].includes((t.status||t.status_id||'').toLowerCase())).length;
            const escalated  = filtered.filter(t => t.isEscalated).length;
            const ndis       = filtered.filter(t => t.ndisRelated||t.ndis_related).length;
            const slaBreached= filtered.filter(t => t.slaBreached||t.sla_breached).length;
            const resRate    = total ? Math.round((resolved/total)*100) : 0;
            const slaRate    = total ? Math.round(((total-slaBreached)/total)*100) : 0;

            // Priority counts
            const priorityCounts = { critical:0, urgent:0, high:0, medium:0, low:0 };
            filtered.forEach(t => { const p=(t.priority||t.priority_id||'low').toLowerCase(); if(priorityCounts[p]!==undefined) priorityCounts[p]++; });

            // Status counts
            const statusCounts = {};
            filtered.forEach(t => { const s=(t.status||t.status_id||'open'); statusCounts[s]=(statusCounts[s]||0)+1; });

            // Category counts (top 6)
            const catCounts = {};
            filtered.forEach(t => { const c=t.category||t.category_id||'other'; catCounts[c]=(catCounts[c]||0)+1; });
            const topCats = Object.entries(catCounts).sort((a,b)=>b[1]-a[1]).slice(0,7);

            // Staff workload
            const staffCounts = {};
            filtered.forEach(t => { const a=t.assigneeName||t.assigned||'Unassigned'; staffCounts[a]=(staffCounts[a]||0)+1; });
            const staffRows = Object.entries(staffCounts).sort((a,b)=>b[1]-a[1]);

            // Monthly volume (last 6 months)
            const monthlyMap = {};
            for(let i=5;i>=0;i--){ const d=new Date(now); d.setMonth(d.getMonth()-i); const k=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`; monthlyMap[k]=0; }
            tickets.forEach(t => { const d=new Date(t.createdAt||t.date||now); const k=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`; if(monthlyMap[k]!==undefined) monthlyMap[k]++; });
            const monthLabels = Object.keys(monthlyMap).map(k=>{ const [y,m]=k.split('-'); return ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][Number(m)-1]+' '+y; });
            const monthData   = Object.values(monthlyMap);

            // Build / rebuild charts after render
            React.useEffect(() => {
                if(loading) return;
                const destroy = id => { if(charts.current[id]) { charts.current[id].destroy(); delete charts.current[id]; } };
                const COLORS = { critical:'#EF4444', urgent:'#EF4444', high:'#F97316', medium:'#EAB308', low:'#6366F1' };
                const PALETTE = ['#6366F1','#8B5CF6','#EC4899','#F97316','#EAB308','#10B981','#06B6D4'];

                // 1. Monthly trend line
                destroy('trend');
                const tc = document.getElementById('chart-trend');
                if(tc) charts.current.trend = new Chart(tc, { type:'line', data:{ labels:monthLabels, datasets:[{ label:'Tickets Created', data:monthData, borderColor:'#6366F1', backgroundColor:'rgba(99,102,241,0.08)', fill:true, tension:0.4, pointBackgroundColor:'#6366F1', pointRadius:4 }] }, options:{ responsive:true, plugins:{ legend:{display:false} }, scales:{ y:{ beginAtZero:true, grid:{color:'#F3F4F6'}, ticks:{stepSize:1} }, x:{ grid:{display:false} } } } });

                // 2. Priority doughnut
                destroy('priority');
                const pc = document.getElementById('chart-priority');
                const pLabels = Object.keys(priorityCounts).filter(k=>priorityCounts[k]>0);
                const pData   = pLabels.map(k=>priorityCounts[k]);
                const pColors = pLabels.map(k=>COLORS[k]||'#6366F1');
                if(pc) charts.current.priority = new Chart(pc, { type:'doughnut', data:{ labels:pLabels.map(l=>l.charAt(0).toUpperCase()+l.slice(1)), datasets:[{ data:pData, backgroundColor:pColors, borderWidth:2, borderColor:'white', hoverOffset:6 }] }, options:{ responsive:true, cutout:'68%', plugins:{ legend:{ position:'bottom', labels:{ boxWidth:10, padding:12, font:{size:11} } } } } });

                // 3. Category bar
                destroy('category');
                const cc = document.getElementById('chart-category');
                if(cc) charts.current.category = new Chart(cc, { type:'bar', data:{ labels:topCats.map(([k])=>k.replace(/_/g,' ').replace(/\b\w/g,l=>l.toUpperCase())), datasets:[{ label:'Tickets', data:topCats.map(([,v])=>v), backgroundColor:PALETTE, borderRadius:6, borderSkipped:false }] }, options:{ indexAxis:'y', responsive:true, plugins:{ legend:{display:false} }, scales:{ x:{ beginAtZero:true, grid:{color:'#F3F4F6'}, ticks:{stepSize:1} }, y:{ grid:{display:false} } } } });

                // 4. Status breakdown bar
                destroy('status');
                const sc = document.getElementById('chart-status');
                const sLabels = Object.keys(statusCounts);
                const statusColors = { open:'#6366F1', in_progress:'#F97316', resolved:'#10B981', closed:'#8B5CF6', pending_approval:'#EAB308', new:'#06B6D4', waiting:'#EC4899', assigned:'#3B82F6' };
                if(sc) charts.current.status = new Chart(sc, { type:'bar', data:{ labels:sLabels.map(l=>l.replace(/_/g,' ').replace(/\b\w/g,c=>c.toUpperCase())), datasets:[{ label:'Count', data:sLabels.map(k=>statusCounts[k]), backgroundColor:sLabels.map(k=>statusColors[k]||'#6366F1'), borderRadius:8, borderSkipped:false }] }, options:{ responsive:true, plugins:{ legend:{display:false} }, scales:{ y:{ beginAtZero:true, grid:{color:'#F3F4F6'} }, x:{ grid:{display:false} } } } });

                // 5. Staff workload bar
                destroy('staff');
                const stc = document.getElementById('chart-staff');
                if(stc) charts.current.staff = new Chart(stc, { type:'bar', data:{ labels:staffRows.map(([k])=>k), datasets:[{ label:'Assigned', data:staffRows.map(([,v])=>v), backgroundColor:'rgba(99,102,241,0.75)', borderRadius:6, borderSkipped:false }] }, options:{ indexAxis:'y', responsive:true, plugins:{ legend:{display:false} }, scales:{ x:{ beginAtZero:true, grid:{color:'#F3F4F6'} }, y:{ grid:{display:false} } } } });

                // 6. NDIS vs Non-NDIS pie
                destroy('ndis');
                const nc = document.getElementById('chart-ndis');
                if(nc) charts.current.ndis = new Chart(nc, { type:'doughnut', data:{ labels:['NDIS Related','Non-NDIS'], datasets:[{ data:[ndis, total-ndis], backgroundColor:['#6366F1','#E0E7FF'], borderWidth:2, borderColor:'white', hoverOffset:4 }] }, options:{ responsive:true, cutout:'65%', plugins:{ legend:{ position:'bottom', labels:{ boxWidth:10, padding:10, font:{size:11} } } } } });

            }, [loading, filtered.length, range]);

            const card = (label, value, sub, color='#6366F1', icon) => (
                <div style={{background:'white', borderRadius:'16px', border:'1.5px solid #E0E7FF', padding:'18px 20px', boxShadow:'0 1px 6px rgba(99,102,241,0.07)'}}>
                    <div style={{display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:'8px'}}>
                        <p style={{fontSize:'11px', fontWeight:'700', color:'#9CA3AF', textTransform:'uppercase', letterSpacing:'0.07em', margin:0}}>{label}</p>
                        <span style={{fontSize:'20px'}}>{icon}</span>
                    </div>
                    <p style={{fontSize:'30px', fontWeight:'700', color, margin:'0 0 4px', lineHeight:1}}>{value}</p>
                    <p style={{fontSize:'12px', color:'#9CA3AF', margin:0}}>{sub}</p>
                </div>
            );

            const chartCard = (title, subtitle, id, height=220) => (
                <div style={{background:'white', borderRadius:'16px', border:'1.5px solid #E0E7FF', padding:'20px', boxShadow:'0 1px 6px rgba(99,102,241,0.07)'}}>
                    <p style={{fontSize:'14px', fontWeight:'700', color:'#1E1B4B', margin:'0 0 2px'}}>{title}</p>
                    <p style={{fontSize:'11px', color:'#9CA3AF', margin:'0 0 16px'}}>{subtitle}</p>
                    <div style={{position:'relative', height:`${height}px`}}>
                        <canvas id={id}></canvas>
                    </div>
                </div>
            );

            return (
                <main className="flex-1 overflow-auto" style={{background:'#F0F2F8'}}>
                    <div style={{maxWidth:'1400px', margin:'0 auto', padding:'24px 28px'}}>

                        {/* Header */}
                        <div style={{display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:'22px', flexWrap:'wrap', gap:'12px'}}>
                            <div>
                                <h1 style={{fontSize:'22px', fontWeight:'700', color:'#1E1B4B', margin:0}}>📊 Analytics</h1>
                                <p style={{fontSize:'12px', color:'#9CA3AF', margin:'4px 0 0'}}>Business insights to drive better decisions</p>
                            </div>
                            <div style={{display:'flex', alignItems:'center', gap:'8px', background:'white', border:'1.5px solid #E0E7FF', borderRadius:'10px', padding:'8px 14px'}}>
                                <span style={{fontSize:'11px', fontWeight:'700', color:'#6366F1', textTransform:'uppercase', letterSpacing:'0.06em'}}>Period</span>
                                <select value={range} onChange={e=>setRange(e.target.value)} style={{border:'1px solid #E0E7FF', borderRadius:'6px', padding:'4px 8px', fontSize:'12px', fontWeight:'600', color:'#4338CA', background:'#F5F3FF', cursor:'pointer', outline:'none'}}>
                                    <option value="30">Last 30 days</option>
                                    <option value="60">Last 60 days</option>
                                    <option value="90">Last 90 days</option>
                                    <option value="180">Last 6 months</option>
                                    <option value="365">Last 12 months</option>
                                </select>
                            </div>
                        </div>

                        {loading ? (
                            <div style={{textAlign:'center', padding:'60px', color:'#9CA3AF'}}>
                                <p style={{fontSize:'32px', marginBottom:'8px'}}>⏳</p>
                                <p>Loading analytics…</p>
                            </div>
                        ) : (<>

                        {/* ── KPI Cards ── */}
                        <div style={{display:'grid', gridTemplateColumns:'repeat(auto-fit,minmax(160px,1fr))', gap:'14px', marginBottom:'20px'}}>
                            {card('Total Tickets', total, `in last ${range} days`, '#1E1B4B', '🎫')}
                            {card('Open', open, `${total ? Math.round((open/total)*100) : 0}% of total`, '#F97316', '🔓')}
                            {card('Resolved', resolved, `${resRate}% resolution rate`, '#10B981', '✅')}
                            {card('SLA Compliance', `${slaRate}%`, `${slaBreached} breached`, slaRate>=90?'#10B981':slaRate>=70?'#F97316':'#EF4444', '⏱️')}
                            {card('Escalated', escalated, `${total ? Math.round((escalated/total)*100) : 0}% of total`, '#8B5CF6', '⬆️')}
                            {card('NDIS Related', ndis, `${total ? Math.round((ndis/total)*100) : 0}% of total`, '#06B6D4', '🏥')}
                        </div>

                        {/* ── Row 1: Trend + Priority ── */}
                        <div style={{display:'grid', gridTemplateColumns:'2fr 1fr', gap:'16px', marginBottom:'16px'}}>
                            {chartCard('Ticket Volume Trend', 'Monthly ticket creation over the past 6 months', 'chart-trend', 200)}
                            {chartCard('Priority Breakdown', 'Distribution of tickets by priority level', 'chart-priority', 200)}
                        </div>

                        {/* ── Row 2: Status + Category ── */}
                        <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:'16px', marginBottom:'16px'}}>
                            {chartCard('Tickets by Status', 'Current status distribution across all tickets', 'chart-status', 200)}
                            {chartCard('Top Categories', 'Which support categories generate the most tickets', 'chart-category', 200)}
                        </div>

                        {/* ── Row 3: Staff + NDIS + Insights ── */}
                        <div style={{display:'grid', gridTemplateColumns:'1fr 1fr 1fr', gap:'16px', marginBottom:'16px'}}>
                            {chartCard('Staff Workload', 'Ticket assignment distribution across team members', 'chart-staff', 200)}
                            {chartCard('NDIS vs Non-NDIS', 'Proportion of NDIS-related support requests', 'chart-ndis', 200)}

                            {/* Key Insights card */}
                            <div style={{background:'white', borderRadius:'16px', border:'1.5px solid #E0E7FF', padding:'20px', boxShadow:'0 1px 6px rgba(99,102,241,0.07)'}}>
                                <p style={{fontSize:'14px', fontWeight:'700', color:'#1E1B4B', margin:'0 0 2px'}}>💡 Key Insights</p>
                                <p style={{fontSize:'11px', color:'#9CA3AF', margin:'0 0 14px'}}>Auto-generated observations</p>
                                <div style={{display:'flex', flexDirection:'column', gap:'10px'}}>
                                    {[
                                        { icon:'🟢', text: resRate >= 80 ? `Strong resolution rate of ${resRate}% — team is performing well.` : `Resolution rate is ${resRate}% — consider reviewing workload distribution.`, good: resRate >= 80 },
                                        { icon: slaRate >= 90 ? '🟢' : '🔴', text: `SLA compliance at ${slaRate}%. ${slaBreached} ticket${slaBreached!==1?'s':''} breached SLA in this period.`, good: slaRate >= 90 },
                                        { icon: escalated > 0 ? '🟡' : '🟢', text: escalated > 0 ? `${escalated} ticket${escalated!==1?'s':''} escalated — review underlying causes to prevent recurrence.` : 'No escalations in this period — excellent.', good: escalated === 0 },
                                        { icon:'🔵', text: `${ndis} NDIS-related ticket${ndis!==1?'s':''} (${total ? Math.round((ndis/total)*100) : 0}%) — ensure compliance documentation is up to date.`, good: true },
                                        { icon: topCats[0] ? '📌' : '📌', text: topCats[0] ? `Highest volume category: "${topCats[0][0].replace(/_/g,' ')}" with ${topCats[0][1]} ticket${topCats[0][1]!==1?'s':''}.` : 'No category data available.', good: true },
                                        { icon: open > resolved ? '🔴' : '🟢', text: open > resolved ? `More open (${open}) than resolved (${resolved}) tickets — backlog may be building.` : `More resolved (${resolved}) than open (${open}) — healthy pipeline.`, good: open <= resolved },
                                    ].map((ins,i) => (
                                        <div key={i} style={{display:'flex', gap:'8px', alignItems:'flex-start', padding:'8px 10px', borderRadius:'8px', background: ins.good ? '#F0FDF4' : '#FFF7ED', border:`1px solid ${ins.good ? '#BBF7D0' : '#FED7AA'}`}}>
                                            <span style={{flexShrink:0, fontSize:'13px'}}>{ins.icon}</span>
                                            <p style={{fontSize:'11px', color:'#374151', margin:0, lineHeight:'1.5'}}>{ins.text}</p>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>

                        {/* ── Summary table: Priority × Status ── */}
                        <div style={{background:'white', borderRadius:'16px', border:'1.5px solid #E0E7FF', padding:'20px', boxShadow:'0 1px 6px rgba(99,102,241,0.07)', marginBottom:'16px'}}>
                            <p style={{fontSize:'14px', fontWeight:'700', color:'#1E1B4B', margin:'0 0 2px'}}>📋 Ticket Summary Table</p>
                            <p style={{fontSize:'11px', color:'#9CA3AF', margin:'0 0 14px'}}>Breakdown by category, priority and status</p>
                            <div style={{overflowX:'auto'}}>
                                <table style={{width:'100%', borderCollapse:'collapse', fontSize:'12px'}}>
                                    <thead>
                                        <tr style={{borderBottom:'2px solid #EEF2FF', background:'#F8F7FF'}}>
                                            {['Category','Total','Critical','High','Medium','Low','Open','Resolved','SLA OK'].map(h=>(
                                                <th key={h} style={{padding:'8px 12px', textAlign: h==='Category'?'left':'center', fontWeight:'700', color:'#6366F1', fontSize:'10px', textTransform:'uppercase', letterSpacing:'0.06em', whiteSpace:'nowrap'}}>{h}</th>
                                            ))}
                                        </tr>
                                    </thead>
                                    <tbody>
                                        {Object.entries(catCounts).sort((a,b)=>b[1]-a[1]).map(([cat,cnt],i)=>{
                                            const catTkts = filtered.filter(t=>(t.category||t.category_id||'other')===cat);
                                            const critH = catTkts.filter(t=>['critical','urgent'].includes((t.priority||t.priority_id||'').toLowerCase())).length;
                                            const high   = catTkts.filter(t=>(t.priority||t.priority_id||'').toLowerCase()==='high').length;
                                            const med    = catTkts.filter(t=>(t.priority||t.priority_id||'').toLowerCase()==='medium').length;
                                            const low    = catTkts.filter(t=>(t.priority||t.priority_id||'').toLowerCase()==='low').length;
                                            const catOpen= catTkts.filter(t=>!['resolved','closed'].includes((t.status||t.status_id||'').toLowerCase())).length;
                                            const catRes = catTkts.filter(t=>['resolved','closed'].includes((t.status||t.status_id||'').toLowerCase())).length;
                                            const catSla = catTkts.filter(t=>!(t.slaBreached||t.sla_breached)).length;
                                            return (
                                                <tr key={cat} style={{borderBottom:'1px solid #EEF2FF', background: i%2===0 ? 'white' : '#FAFBFF'}}>
                                                    <td style={{padding:'9px 12px', fontWeight:'600', color:'#374151', textTransform:'capitalize'}}>{cat.replace(/_/g,' ')}</td>
                                                    <td style={{padding:'9px 12px', textAlign:'center', fontWeight:'700', color:'#1E1B4B'}}>{cnt}</td>
                                                    <td style={{padding:'9px 12px', textAlign:'center'}}>{critH>0?<span style={{background:'#FEF2F2',color:'#DC2626',padding:'2px 7px',borderRadius:'20px',fontWeight:'700',fontSize:'11px'}}>{critH}</span>:<span style={{color:'#D1D5DB'}}>—</span>}</td>
                                                    <td style={{padding:'9px 12px', textAlign:'center'}}>{high>0?<span style={{background:'#FFF7ED',color:'#C2410C',padding:'2px 7px',borderRadius:'20px',fontWeight:'700',fontSize:'11px'}}>{high}</span>:<span style={{color:'#D1D5DB'}}>—</span>}</td>
                                                    <td style={{padding:'9px 12px', textAlign:'center'}}>{med>0?<span style={{background:'#FEFCE8',color:'#A16207',padding:'2px 7px',borderRadius:'20px',fontWeight:'700',fontSize:'11px'}}>{med}</span>:<span style={{color:'#D1D5DB'}}>—</span>}</td>
                                                    <td style={{padding:'9px 12px', textAlign:'center'}}>{low>0?<span style={{background:'#EEF2FF',color:'#4338CA',padding:'2px 7px',borderRadius:'20px',fontWeight:'700',fontSize:'11px'}}>{low}</span>:<span style={{color:'#D1D5DB'}}>—</span>}</td>
                                                    <td style={{padding:'9px 12px', textAlign:'center', color:'#F97316', fontWeight:'600'}}>{catOpen}</td>
                                                    <td style={{padding:'9px 12px', textAlign:'center', color:'#10B981', fontWeight:'600'}}>{catRes}</td>
                                                    <td style={{padding:'9px 12px', textAlign:'center'}}><span style={{fontSize:'11px', fontWeight:'700', color: catSla===cnt?'#10B981':'#F97316'}}>{cnt>0?Math.round((catSla/cnt)*100)+'%':'—'}</span></td>
                                                </tr>
                                            );
                                        })}
                                    </tbody>
                                </table>
                            </div>
                        </div>

                        </>)}
                    </div>
                </main>
            );
        }

        // Org Chart Page
        // ── Org Chart helpers (defined outside to keep stable references) ──
        const ORG_GAP  = 10;   // default inner gap (px)
        const ORG_LINE = '#94A3B8';
        const ORG_LH   = 14;   // connector line height (px)

        function OrgCard({ name, title, email, type, vacant, deptLabel }) {
            const S = {
                director:  { b:'#16A34A', bg:'#F0FDF4', t:'#15803D' },
                ops:       { b:'#DC2626', bg:'#FFF5F5', t:'#DC2626' },
                finance:   { b:'#D97706', bg:'#FFFBEB', t:'#D97706' },
                strategic: { b:'#7C3AED', bg:'#F5F3FF', t:'#7C3AED' },
                staff:     { b:'#3B82F6', bg:'#EFF6FF', t:'#1D4ED8' },
                external:  { b:'#9CA3AF', bg:'#F9FAFB', t:'#6B7280' },
            };
            const s = S[type] || S.ops;
            // compact widths: dept headers slightly wider, leaf nodes narrow
            const w = deptLabel ? 178 : 108;
            return (
                <div style={{ border:`1.5px ${vacant?'dashed':'solid'} ${vacant?'#9CA3AF':s.b}`, background:vacant?'#F9FAFB':s.bg, borderRadius:10, padding: deptLabel ? '8px 10px' : '6px 8px', width:w, textAlign:'center', boxShadow:'0 1px 5px rgba(0,0,0,0.07)', flexShrink:0 }}>
                    {deptLabel && <p style={{ fontSize:8.5, fontWeight:800, color:s.t, textTransform:'uppercase', letterSpacing:'0.06em', margin:'0 0 3px', lineHeight:1.3 }}>{deptLabel}</p>}
                    <p style={{ fontSize: deptLabel?11:10, fontWeight:700, color:vacant?'#6B7280':'#111827', margin:'0 0 1px', lineHeight:1.3 }}>{name}</p>
                    {title && !vacant && <p style={{ fontSize:8.5, fontWeight:600, color:s.t, margin:'0 0 1px', lineHeight:1.3 }}>{title}</p>}
                    {email && !vacant && <p style={{ fontSize:7.5, color:'#2563EB', margin:'0 0 3px', wordBreak:'break-word', lineHeight:1.3 }}>{email}</p>}
                    <span style={{ display:'inline-block', fontSize:8.5, fontWeight:700, background:vacant?'#FEF2F2':'#DCFCE7', color:vacant?'#DC2626':'#15803D', padding:'1px 6px', borderRadius:20 }}>{vacant?'[VACANT]':'[ACTIVE]'}</span>
                </div>
            );
        }

        // gap  = px between sibling sub-trees (overrides ORG_GAP)
        // lineH = connector vertical height in px (overrides ORG_LH)
        function OrgTree({ card, ch=[], gap=ORG_GAP, lineH=ORG_LH }) {
            const G = gap, L = ORG_LINE, LH = lineH;
            const n = ch.length;
            return (
                <div style={{ display:'flex', flexDirection:'column', alignItems:'center' }}>
                    {card}
                    {n > 0 && <>
                        <div style={{ width:2, height:LH, background:L, flexShrink:0 }} />
                        {n === 1
                            ? ch[0]
                            : <div style={{ display:'flex', gap:`${G}px`, alignItems:'flex-start' }}>
                                {ch.map((c,i) => {
                                    const first=i===0, last=i===n-1;
                                    return (
                                        <div key={i} style={{ display:'flex', flexDirection:'column', alignItems:'center', position:'relative', paddingTop:LH }}>
                                            <div style={{ position:'absolute', top:0, left:'50%', transform:'translateX(-50%)', width:2, height:LH, background:L }} />
                                            {!first && <div style={{ position:'absolute', top:0, left:`${-G/2}px`, right:'50%', height:2, background:L }} />}
                                            {!last  && <div style={{ position:'absolute', top:0, left:'50%', right:`${-G/2}px`, height:2, background:L }} />}
                                            {c}
                                        </div>
                                    );
                                })}
                              </div>
                        }
                    </>}
                </div>
            );
        }

        function OrgChartPage() {

            // ── Node component (kept for compatibility) ──────────
            const Node = ({ name, title, subtitle, email, active, type='ops', icon, vacant }) => {
                const styles = {
                    director:  { border:'2px solid #16A34A', bg:'#F0FDF4', titleColor:'#15803D', accent:'#16A34A' },
                    ops:       { border:'2px solid #DC2626', bg:'#FFF5F5', titleColor:'#DC2626', accent:'#DC2626' },
                    finance:   { border:'2px solid #D97706', bg:'#FFFBEB', titleColor:'#D97706', accent:'#D97706' },
                    strategic: { border:'2px solid #7C3AED', bg:'#F5F3FF', titleColor:'#7C3AED', accent:'#7C3AED' },
                    staff:     { border:'2px solid #3B82F6', bg:'#EFF6FF', titleColor:'#1D4ED8', accent:'#3B82F6' },
                    external:  { border:'2px solid #9CA3AF', bg:'#F9FAFB', titleColor:'#6B7280', accent:'#9CA3AF' },
                };
                const s = styles[type] || styles.ops;
                return (
                    <div style={{
                        border: vacant ? '2px dashed #9CA3AF' : s.border,
                        background: vacant ? '#F9FAFB' : s.bg,
                        borderRadius:'12px', padding:'10px 14px', minWidth:'160px', maxWidth:'200px',
                        textAlign:'center', position:'relative', boxShadow:'0 2px 8px rgba(0,0,0,0.07)'
                    }}>
                        {icon && <div style={{fontSize:'22px', marginBottom:'4px'}}>{icon}</div>}
                        <p style={{fontSize:'13px', fontWeight:'700', color: vacant?'#6B7280':'#111827', margin:'0 0 2px', lineHeight:'1.3'}}>{name}</p>
                        {title && <p style={{fontSize:'11px', fontWeight:'600', color: s.titleColor, margin:'0 0 2px', lineHeight:'1.3'}}>{title}</p>}
                        {subtitle && <p style={{fontSize:'10px', color:'#6B7280', margin:'0 0 3px', lineHeight:'1.3'}}>{subtitle}</p>}
                        {email && <p style={{fontSize:'9.5px', color:'#2563EB', margin:'0 0 4px', wordBreak:'break-all'}}>{email}</p>}
                        <span style={{
                            fontSize:'10px', fontWeight:'700', padding:'2px 8px', borderRadius:'20px',
                            background: active===false||vacant ? '#FEF2F2' : '#DCFCE7',
                            color: active===false||vacant ? '#DC2626' : '#15803D'
                        }}>{vacant ? '[VACANT]' : '[ACTIVE]'}</span>
                    </div>
                );
            };

            // ── Connector line styles ────────────────────────────
            const lineV = { width:'2px', background:'#CBD5E1', margin:'0 auto' };
            const lineH = (w='100%') => ({ height:'2px', background:'#CBD5E1', width:w });

            // ── Children wrapper with T-connector ───────────────
            const Children = ({ children, gap=16 }) => (
                <div style={{display:'flex', flexDirection:'column', alignItems:'center'}}>
                    <div style={{...lineV, height:'20px'}}></div>
                    <div style={{position:'relative', display:'flex', flexDirection:'column', alignItems:'center', width:'100%'}}>
                        {/* horizontal bar across all children */}
                        <div style={{display:'flex', alignItems:'flex-start', gap:`${gap}px`, position:'relative'}}>
                            {React.Children.map(children, (child, i) => (
                                <div key={i} style={{display:'flex', flexDirection:'column', alignItems:'center'}}>
                                    {React.Children.count(children) > 1 && (
                                        <div style={{...lineV, height:'20px'}}></div>
                                    )}
                                    {child}
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            );

            // ── Branch: vertical parent → horizontal bar → children
            const Branch = ({ parent, children: kids, gap=14 }) => {
                const count = React.Children.count(kids);
                return (
                    <div style={{display:'flex', flexDirection:'column', alignItems:'center'}}>
                        {parent}
                        {kids && count > 0 && (
                            <>
                                <div style={{...lineV, height:'18px'}}></div>
                                {count === 1 ? (
                                    <>{kids}</>
                                ) : (
                                    <div style={{position:'relative', display:'flex', flexDirection:'column', alignItems:'center', width:'100%'}}>
                                        <div style={{display:'flex', gap:`${gap}px`, alignItems:'flex-start', position:'relative'}}>
                                            {React.Children.map(kids, (kid, i) => (
                                                <div key={i} style={{display:'flex', flexDirection:'column', alignItems:'center'}}>
                                                    <div style={{...lineV, height:'18px'}}></div>
                                                    {kid}
                                                </div>
                                            ))}
                                            {/* horizontal connector */}
                                            <div style={{position:'absolute', top:'0px', left:'50%', right:'50%', height:'2px', background:'#CBD5E1', transform:'translateX(-50%)', width:'calc(100% - 100px)'}}></div>
                                        </div>
                                    </div>
                                )}
                            </>
                        )}
                    </div>
                );
            };

            return (

        // Main App
        function App() {
            const [currentPage, setCurrentPage] = React.useState(() => {
                const hash = window.location.hash.slice(1) || 'dashboard';
                return hash;
            });

            React.useEffect(() => {
                const handleHashChange = () => {
                    const hash = window.location.hash.slice(1) || 'dashboard';
                    setCurrentPage(hash);
                };
                window.addEventListener('hashchange', handleHashChange);
                return () => window.removeEventListener('hashchange', handleHashChange);
            }, []);

            const handlePageChange = (pageId) => {
                window.location.hash = pageId;
            };

            const renderPage = () => {
                switch (currentPage) {
                    case 'dashboard': return <Dashboard />;
                    case 'create-ticket': return <CreateTicket />;
                    case 'tickets': return <TicketsPage />;
                    case 'calendar': return <CalendarPage />;
                    case 'ticket-logs': return <TicketLogsPage />;
                    case 'analytics': return <AnalyticsPage />;
                    case 'org-chart': return <OrgChartPage />;
                    case 'staff-performance': return <StaffPerformancePage />;
                    case 'team-comparison': return <TeamComparisonPage />;
                    case 'staff-management': return <StaffManagementPage />;
                    case 'scheduled-reports': return <ScheduledReportsPage />;
                    default: return <Dashboard />;
                }
            };

            return (
                <div className="flex h-screen bg-gray-50">
                    <Navigation currentPage={currentPage} setCurrentPage={handlePageChange} />
                    {renderPage()}
                </div>
            );
        }
