                    const url    = modalMode==='add' ? `${HRMS_API}/users` : `${HRMS_API}/users/${selStaff.id}`;
                    const method = modalMode==='add' ? 'POST' : 'PATCH';
                    const res    = await fetch(url, { method, headers:{'Content-Type':'application/json'}, body:JSON.stringify(payload) });
                    if (!res.ok) { const e=await res.json(); throw new Error(e.error || e.message || 'Save failed'); }
                    setShowModal(false);
                    showToast(modalMode==='add' ? '✅ Staff member added' : '✅ Staff member updated');
                    fetchAll();
                } catch(e) { setError(e.message); }
                finally { setSaving(false); }
            };

            const handleDelete = async () => {
                if (!delConfirm) return;
                try {
                    const res  = await fetch(`${HRMS_API}/users/${delConfirm.id}`, { method:'DELETE' });
                    const data = await res.json();
                    if (!res.ok) throw new Error(data.error || data.message || 'Delete failed');
                    setDelConfirm(null);
                    showToast(`✅ ${data.message || 'Staff member deactivated'}`);
                    fetchAll();
                } catch(e) { setError(e.message); }
            };

            const handleAddPosition = async () => {
                if (!posForm.title.trim()) return;
                try {
                    const res = await fetch(`${HRMS_API}/org/positions`, {
                        method:'POST', headers:{'Content-Type':'application/json'},
                        body:JSON.stringify({
                            title:           posForm.title.trim(),
                            departmentId:    posForm.department_id || null,
                            parentPositionId:posForm.parent_id     || null,
                            sortOrder:       0,
                        })
                    });
                    if (!res.ok) { const e=await res.json(); throw new Error(e.error || e.message); }
                    const data = await res.json();
                    setPositions(prev=>[...prev, data.position]);
                    setForm(f=>({...f, position_ids:[...f.position_ids, data.position.id]}));
                    setShowPosModal(false);
                    setPosForm({ title:'', department_id:'', position_type:'staff', dept_label:'', parent_id:'' });
                    showToast('✅ Position created');
                } catch(e) { setError(e.message); }
            };

            const togglePos = (id) => setForm(f=>({
                ...f,
                position_ids: f.position_ids.includes(id)
                    ? f.position_ids.filter(x=>x!==id)
                    : [...f.position_ids, id]
            }));

            const posTypeColor = { director:'#16A34A', ops:'#DC2626', finance:'#D97706', strategic:'#7C3AED', staff:'#3B82F6', external:'#9CA3AF' };

            const Avatar = ({name, size=36}) => {
                const ini=(name||'').split(' ').slice(0,2).map(w=>w[0]?.toUpperCase()||'').join('');
                const colors=['#6366F1','#EC4899','#14B8A6','#F59E0B','#8B5CF6','#10B981'];
                const bg=colors[(name||'').charCodeAt(0)%colors.length];
                return <div style={{width:size,height:size,borderRadius:'50%',background:bg,display:'flex',alignItems:'center',justifyContent:'center',fontSize:size*0.38,fontWeight:700,color:'white',flexShrink:0}}>{ini}</div>;
            };

            const inputStyle = { width:'100%', padding:'8px 10px', border:'1px solid #E5E7EB', borderRadius:'6px', fontSize:'13px', boxSizing:'border-box' };
            const labelStyle = { fontSize:'12px', fontWeight:'600', color:'#374151', marginBottom:'4px', display:'block' };

            return (
                <main className="flex-1 overflow-auto" style={{background:'#F0F2F8'}}>
                    {/* Toast */}
                    {toast && (
                        <div style={{position:'fixed',top:20,right:20,zIndex:9999,background:'#1E1B4B',color:'white',padding:'12px 20px',borderRadius:'10px',fontSize:'13px',fontWeight:'600',boxShadow:'0 4px 20px rgba(0,0,0,0.2)'}}>
                            {toast}
                        </div>
                    )}

                    <div style={{padding:'24px 28px'}}>
                        {/* Header */}
                        <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:'20px'}}>
                            <div>
                                <h1 style={{fontSize:'22px',fontWeight:'700',color:'#1E1B4B',margin:0}}>👥 Staff Management</h1>
                                <p style={{fontSize:'12px',color:'#9CA3AF',margin:'4px 0 0'}}>Add, manage, and organise Yahweh Care staff — changes update the Org Chart instantly</p>
                            </div>
                            <div style={{display:'flex',gap:'10px'}}>
                                <button onClick={()=>setShowPosModal(true)}
                                    style={{padding:'9px 16px',background:'white',border:'2px solid #E0E7FF',borderRadius:'10px',fontSize:'13px',fontWeight:'600',color:'#4338CA',cursor:'pointer'}}>
                                    + New Position
                                </button>
                                <button onClick={openAdd}
                                    style={{padding:'9px 18px',background:'linear-gradient(135deg,#6366F1,#7C3AED)',color:'white',border:'none',borderRadius:'10px',fontSize:'13px',fontWeight:'700',cursor:'pointer',boxShadow:'0 3px 12px rgba(99,102,241,0.35)'}}>
                                    + Add Staff Member
                                </button>
                            </div>
                        </div>

                        {/* Filters */}
                        <div style={{display:'flex',gap:'10px',marginBottom:'16px',flexWrap:'wrap'}}>
                            <input type="text" placeholder="Search name, email or position…" value={search} onChange={e=>setSearch(e.target.value)}
                                style={{flex:1,minWidth:'200px',padding:'8px 12px',border:'1.5px solid #E0E7FF',borderRadius:'8px',fontSize:'13px'}} />
                            <select value={deptFilter} onChange={e=>setDeptFilter(e.target.value)}
                                style={{padding:'8px 12px',border:'1.5px solid #E0E7FF',borderRadius:'8px',fontSize:'13px',background:'white',color:'#374151'}}>
                                <option value="all">All Departments</option>
                                {departments.map(d=><option key={d.id} value={String(d.id)}>{d.name}</option>)}
                            </select>
                            <div style={{padding:'8px 14px',background:'white',border:'1.5px solid #E0E7FF',borderRadius:'8px',fontSize:'13px',color:'#6366F1',fontWeight:'600'}}>
                                {filtered.length} staff
                            </div>
                        </div>

                        {/* Error */}
                        {error && !showModal && (
                            <div style={{background:'#FEF2F2',border:'1px solid #FECACA',borderRadius:'8px',padding:'10px 14px',marginBottom:'12px',fontSize:'13px',color:'#DC2626'}}>
                                ⚠️ {error}
                            </div>
                        )}

                        {/* Staff Table */}
                        <div style={{background:'white',borderRadius:'16px',border:'2px solid #E0E7FF',overflow:'hidden',boxShadow:'0 2px 12px rgba(99,102,241,0.07)'}}>
                            {loading ? (
                                <div style={{padding:'40px',textAlign:'center',color:'#9CA3AF',fontSize:'14px'}}>Loading staff…</div>
                            ) : filtered.length === 0 ? (
                                <div style={{padding:'40px',textAlign:'center',color:'#9CA3AF',fontSize:'14px'}}>No staff found</div>
                            ) : (
                                <table style={{width:'100%',borderCollapse:'collapse'}}>
                                    <thead>
                                        <tr style={{background:'#F8F9FF',borderBottom:'2px solid #E0E7FF'}}>
                                            {['Staff Member','Positions','Department','Employment','Login','Actions'].map(h=>(
                                                <th key={h} style={{padding:'11px 14px',textAlign:'left',fontSize:'11px',fontWeight:'700',color:'#6366F1',textTransform:'uppercase',letterSpacing:'0.05em'}}>{h}</th>
                                            ))}
                                        </tr>
                                    </thead>
                                    <tbody>
                                        {filtered.map(m=>(
                                            <tr key={m.id} style={{borderBottom:'1px solid #F0F2F8'}} className="table-row">
                                                <td style={{padding:'12px 14px'}}>
                                                    <div style={{display:'flex',alignItems:'center',gap:'10px'}}>
                                                        <Avatar name={m.name} size={34}/>
                                                        <div>
                                                            <div style={{fontSize:'13px',fontWeight:'700',color:'#111827',display:'flex',alignItems:'center',gap:'6px'}}>
                                                                {m.name}
                                                                {m.is_bootstrap_admin && <span style={{fontSize:'9px',fontWeight:'700',background:'#FEF3C7',color:'#D97706',padding:'1px 6px',borderRadius:'10px',border:'1px solid #FDE68A'}}>⭐ Bootstrap Admin</span>}
                                                            </div>
                                                            <div style={{fontSize:'11px',color:'#6B7280'}}>{m.email}</div>
                                                            {m.phone && <div style={{fontSize:'11px',color:'#9CA3AF'}}>{m.phone}</div>}
                                                        </div>
                                                    </div>
                                                </td>
                                                <td style={{padding:'12px 14px'}}>
                                                    {(m.positions||[]).length === 0 ? (
                                                        <span style={{fontSize:'11px',color:'#9CA3AF',fontStyle:'italic'}}>No position assigned</span>
                                                    ) : (
                                                        <div style={{display:'flex',flexWrap:'wrap',gap:'4px'}}>
                                                            {(m.positions||[]).map(p=>(
                                                                <span key={p.id} style={{fontSize:'10px',fontWeight:'600',padding:'2px 8px',borderRadius:'10px',background:`${posTypeColor[p.type]||'#6366F1'}15`,color:posTypeColor[p.type]||'#6366F1',border:`1px solid ${posTypeColor[p.type]||'#6366F1'}30`}}>
                                                                    {p.is_primary?'★ ':''}{p.title}
                                                                </span>
                                                            ))}
                                                        </div>
                                                    )}
                                                </td>
                                                <td style={{padding:'12px 14px',fontSize:'12px',color:'#374151'}}>{m.department_name||'—'}</td>
                                                <td style={{padding:'12px 14px'}}>
                                                    <span style={{fontSize:'11px',fontWeight:'600',padding:'3px 8px',borderRadius:'8px',background:'#EEF2FF',color:'#4338CA'}}>
                                                        {EMP_TYPES[m.employment_type]||m.employment_type||'—'}
                                                    </span>
                                                </td>
                                                <td style={{padding:'12px 14px'}}>
                                                    <span style={{fontSize:'11px',fontWeight:'600',padding:'3px 8px',borderRadius:'8px',
                                                        background: m.auth_provider==='azure_ad'?'#DBEAFE':'#F0FDF4',
                                                        color: m.auth_provider==='azure_ad'?'#1D4ED8':'#15803D'
                                                    }}>
                                                        {m.auth_provider==='azure_ad'?'🔷 Microsoft Entra':'🔑 Local'}
                                                    </span>
                                                </td>
                                                <td style={{padding:'12px 14px'}}>
                                                    <div style={{display:'flex',gap:'6px'}}>
                                                        <button onClick={()=>openEdit(m)}
                                                            style={{padding:'5px 12px',background:'#EEF2FF',border:'none',borderRadius:'6px',fontSize:'11px',fontWeight:'600',color:'#4338CA',cursor:'pointer'}}>
                                                            Edit
                                                        </button>
                                                        {!m.is_bootstrap_admin && (
                                                            <button onClick={()=>setDelConfirm(m)}
                                                                style={{padding:'5px 12px',background:'#FEF2F2',border:'none',borderRadius:'6px',fontSize:'11px',fontWeight:'600',color:'#DC2626',cursor:'pointer'}}>
                                                                Deactivate
                                                            </button>
                                                        )}
                                                    </div>
                                                </td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            )}
                        </div>

                        {/* Stats row */}
                        {!loading && (
                            <div style={{display:'flex',gap:'12px',marginTop:'14px',flexWrap:'wrap'}}>
                                {[
                                    {label:'Total Staff',   val:staff.length,                                                color:'#6366F1'},
                                    {label:'Active',        val:staff.filter(s=>s.is_active).length,                        color:'#16A34A'},
                                    {label:'Unassigned',    val:staff.filter(s=>s.is_active&&(s.positions||[]).length===0).length, color:'#D97706'},
                                    {label:'Entra Login',   val:staff.filter(s=>s.auth_provider==='azure_ad').length,        color:'#1D4ED8'},
                                    {label:'Vacant Positions', val:positions.filter(p=>p.is_vacant).length,                  color:'#DC2626'},
                                ].map(s=>(
                                    <div key={s.label} style={{background:'white',border:'2px solid #E0E7FF',borderRadius:'10px',padding:'10px 16px',display:'flex',gap:'10px',alignItems:'center'}}>
                                        <span style={{fontSize:'18px',fontWeight:'800',color:s.color}}>{s.val}</span>
                                        <span style={{fontSize:'11px',color:'#6B7280',fontWeight:'600'}}>{s.label}</span>
                                    </div>
                                ))}
                            </div>
                        )}
                    </div>

                    {/* ── ADD/EDIT STAFF MODAL ─────────────────────────────── */}
                    {showModal && (
                        <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.5)',zIndex:1000,display:'flex',alignItems:'center',justifyContent:'center',padding:'20px'}}>
                            <div style={{background:'white',borderRadius:'16px',width:'100%',maxWidth:'680px',maxHeight:'90vh',overflow:'auto',boxShadow:'0 20px 60px rgba(0,0,0,0.25)'}}>
                                {/* Modal header */}
                                <div style={{padding:'20px 24px',borderBottom:'1px solid #E0E7FF',display:'flex',justifyContent:'space-between',alignItems:'center',background:'linear-gradient(135deg,#6366F1,#7C3AED)',borderRadius:'16px 16px 0 0'}}>
                                    <h2 style={{fontSize:'16px',fontWeight:'700',color:'white',margin:0}}>
                                        {modalMode==='add'?'➕ Add New Staff Member':'✏️ Edit Staff Member'}
                                    </h2>
                                    <button onClick={()=>setShowModal(false)} style={{background:'rgba(255,255,255,0.2)',border:'none',color:'white',borderRadius:'50%',width:'28px',height:'28px',cursor:'pointer',fontSize:'14px'}}>✕</button>
                                </div>

                                <div style={{padding:'20px 24px'}}>
                                    {error && <div style={{background:'#FEF2F2',border:'1px solid #FECACA',borderRadius:'8px',padding:'8px 12px',marginBottom:'14px',fontSize:'12px',color:'#DC2626'}}>⚠️ {error}</div>}

                                    {/* Login method notice */}
                                    <div style={{background:'#EFF6FF',border:'1px solid #BFDBFE',borderRadius:'8px',padding:'10px 14px',marginBottom:'16px',fontSize:'12px',color:'#1D4ED8',display:'flex',alignItems:'center',gap:'8px'}}>
                                        <span style={{fontSize:'16px'}}>🔷</span>
                                        <span><strong>Microsoft Entra Login:</strong> New staff members login exclusively via Microsoft Entra (Azure AD). They will not have a password — only the "Sign in with Microsoft" button.</span>
                                    </div>

                                    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'14px'}}>
                                        {/* Full Name */}
                                        <div style={{gridColumn:'1/-1'}}>
                                            <label style={labelStyle}>Full Name <span style={{color:'#DC2626'}}>*</span></label>
                                            <input style={inputStyle} value={form.name} onChange={e=>setForm(f=>({...f,name:e.target.value}))} placeholder="e.g. Jane Smith"/>
                                        </div>
                                        {/* Email */}
                                        <div>
                                            <label style={labelStyle}>Email Address <span style={{color:'#DC2626'}}>*</span></label>
                                            <input style={inputStyle} type="email" value={form.email} onChange={e=>setForm(f=>({...f,email:e.target.value}))} placeholder="jane@yahwehcare.com.au"/>
                                        </div>
                                        {/* Phone */}
                                        <div>
                                            <label style={labelStyle}>Phone Number</label>
                                            <input style={inputStyle} value={form.phone} onChange={e=>setForm(f=>({...f,phone:e.target.value}))} placeholder="+61 4xx xxx xxx"/>
                                        </div>
                                        {/* Employment Type */}
                                        <div>
                                            <label style={labelStyle}>Employment Type</label>
                                            <select style={inputStyle} value={form.employment_type} onChange={e=>setForm(f=>({...f,employment_type:e.target.value}))}>
                                                {Object.entries(EMP_TYPES).map(([k,v])=><option key={k} value={k}>{v}</option>)}
                                            </select>
                                        </div>
                                        {/* Start Date */}
                                        <div>
                                            <label style={labelStyle}>Start Date</label>
                                            <input style={inputStyle} type="date" value={form.start_date} onChange={e=>setForm(f=>({...f,start_date:e.target.value}))}/>
                                        </div>
                                        {/* Department */}
                                        <div>
                                            <label style={labelStyle}>Department</label>
                                            <select style={inputStyle} value={form.department_id} onChange={e=>setForm(f=>({...f,department_id:e.target.value}))}>
                                                <option value="">— Select department —</option>
                                                {departments.map(d=><option key={d.id} value={d.id}>{d.name}</option>)}
                                            </select>
                                        </div>
                                        {/* Manager */}
                                        <div>
                                            <label style={labelStyle}>Reports To (Manager)</label>
                                            <select style={inputStyle} value={form.manager_id} onChange={e=>setForm(f=>({...f,manager_id:e.target.value}))}>
                                                <option value="">— None —</option>
                                                {staff.filter(s=>s.id!==(selStaff?.id)).map(s=><option key={s.id} value={s.id}>{s.name}</option>)}
                                            </select>
                                        </div>
                                        {/* Positions */}
                                        <div style={{gridColumn:'1/-1'}}>
                                            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'6px'}}>
                                                <label style={{...labelStyle,margin:0}}>Org Chart Positions <span style={{fontSize:'11px',color:'#9CA3AF',fontWeight:'400'}}>(one staff can hold multiple)</span></label>
                                                <button onClick={()=>setShowPosModal(true)} style={{fontSize:'11px',fontWeight:'600',color:'#6366F1',background:'#EEF2FF',border:'none',borderRadius:'6px',padding:'3px 8px',cursor:'pointer'}}>+ New Position</button>
                                            </div>
                                            <div style={{border:'1.5px solid #E0E7FF',borderRadius:'8px',maxHeight:'160px',overflow:'auto',padding:'8px'}}>
                                                {positions.length===0 ? (
                                                    <p style={{fontSize:'12px',color:'#9CA3AF',textAlign:'center',padding:'10px'}}>No positions found</p>
                                                ) : positions.map(p=>(
                                                    <label key={p.id} style={{display:'flex',alignItems:'center',gap:'8px',padding:'5px 6px',borderRadius:'6px',cursor:'pointer',background:form.position_ids.includes(p.id)?`${posTypeColor[p.position_type]||'#6366F1'}10`:'transparent'}}>
                                                        <input type="checkbox" checked={form.position_ids.includes(p.id)} onChange={()=>togglePos(p.id)}/>
                                                        <span style={{fontSize:'12px',color:'#374151',flex:1}}>{p.title}</span>
                                                        <span style={{fontSize:'10px',fontWeight:'600',color:posTypeColor[p.position_type]||'#6366F1',background:`${posTypeColor[p.position_type]||'#6366F1'}15`,padding:'1px 6px',borderRadius:'8px'}}>{p.position_type}</span>
                                                        {!p.is_vacant && <span style={{fontSize:'10px',color:'#15803D',background:'#DCFCE7',padding:'1px 6px',borderRadius:'8px'}}>Occupied</span>}
                                                        {p.is_vacant && <span style={{fontSize:'10px',color:'#DC2626',background:'#FEF2F2',padding:'1px 6px',borderRadius:'8px'}}>Vacant</span>}
                                                    </label>
                                                ))}
                                            </div>
                                            {form.position_ids.length>0 && (
                                                <p style={{fontSize:'11px',color:'#6366F1',marginTop:'4px'}}>✓ {form.position_ids.length} position(s) selected — first is primary</p>
                                            )}
                                        </div>
                                        {/* Notes */}
                                        <div style={{gridColumn:'1/-1'}}>
                                            <label style={labelStyle}>Notes</label>
                                            <textarea style={{...inputStyle,height:'70px',resize:'vertical'}} value={form.profile_notes} onChange={e=>setForm(f=>({...f,profile_notes:e.target.value}))} placeholder="Any notes about this staff member…"/>
                                        </div>
                                    </div>
                                </div>

                                {/* Modal footer */}
                                <div style={{padding:'16px 24px',borderTop:'1px solid #E0E7FF',display:'flex',justifyContent:'flex-end',gap:'10px',background:'#F8F9FF',borderRadius:'0 0 16px 16px'}}>
                                    <button onClick={()=>setShowModal(false)} style={{padding:'9px 18px',background:'white',border:'2px solid #E0E7FF',borderRadius:'8px',fontSize:'13px',fontWeight:'600',color:'#6B7280',cursor:'pointer'}}>Cancel</button>
                                    <button onClick={handleSave} disabled={saving} style={{padding:'9px 20px',background:'linear-gradient(135deg,#6366F1,#7C3AED)',color:'white',border:'none',borderRadius:'8px',fontSize:'13px',fontWeight:'700',cursor:'pointer',opacity:saving?0.7:1}}>
                                        {saving ? 'Saving…' : (modalMode==='add'?'Add Staff Member':'Save Changes')}
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* ── NEW POSITION MODAL ────────────────────────────────── */}
                    {showPosModal && (
                        <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.5)',zIndex:1100,display:'flex',alignItems:'center',justifyContent:'center',padding:'20px'}}>
                            <div style={{background:'white',borderRadius:'14px',width:'100%',maxWidth:'440px',boxShadow:'0 20px 60px rgba(0,0,0,0.25)'}}>
                                <div style={{padding:'16px 20px',borderBottom:'1px solid #E0E7FF',background:'linear-gradient(135deg,#6366F1,#7C3AED)',borderRadius:'14px 14px 0 0',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                                    <h3 style={{fontSize:'14px',fontWeight:'700',color:'white',margin:0}}>🏷️ Create New Position</h3>
                                    <button onClick={()=>setShowPosModal(false)} style={{background:'rgba(255,255,255,0.2)',border:'none',color:'white',borderRadius:'50%',width:'26px',height:'26px',cursor:'pointer'}}>✕</button>
                                </div>
                                <div style={{padding:'16px 20px',display:'grid',gap:'12px'}}>
                                    <div>
                                        <label style={labelStyle}>Position Title <span style={{color:'#DC2626'}}>*</span></label>
                                        <input style={inputStyle} value={posForm.title} onChange={e=>setPosForm(f=>({...f,title:e.target.value}))} placeholder="e.g. Community Support Worker"/>
                                    </div>
                                    <div>
                                        <label style={labelStyle}>Department</label>
                                        <select style={inputStyle} value={posForm.department_id} onChange={e=>setPosForm(f=>({...f,department_id:e.target.value}))}>
                                            <option value="">— Select —</option>
                                            {departments.map(d=><option key={d.id} value={d.id}>{d.name}</option>)}
                                        </select>
                                    </div>
                                    <div>
                                        <label style={labelStyle}>Position Type</label>
                                        <select style={inputStyle} value={posForm.position_type} onChange={e=>setPosForm(f=>({...f,position_type:e.target.value}))}>
                                            {POS_TYPES.map(t=><option key={t} value={t}>{t.charAt(0).toUpperCase()+t.slice(1)}</option>)}
                                        </select>
                                    </div>
                                    <div>
                                        <label style={labelStyle}>Reports To (Parent Position)</label>
                                        <select style={inputStyle} value={posForm.parent_id} onChange={e=>setPosForm(f=>({...f,parent_id:e.target.value}))}>
                                            <option value="">— Root / Top Level —</option>
                                            {positions.map(p=><option key={p.id} value={p.id}>{p.title}</option>)}
                                        </select>
                                    </div>
                                    <div>
                                        <label style={labelStyle}>Department Label for Org Chart <span style={{fontSize:'10px',color:'#9CA3AF'}}>(optional — shows as header above box)</span></label>
                                        <input style={inputStyle} value={posForm.dept_label} onChange={e=>setPosForm(f=>({...f,dept_label:e.target.value}))} placeholder="e.g. 👥 Operations Department"/>
                                    </div>
                                </div>
                                <div style={{padding:'12px 20px',borderTop:'1px solid #E0E7FF',display:'flex',justifyContent:'flex-end',gap:'8px',background:'#F8F9FF',borderRadius:'0 0 14px 14px'}}>
                                    <button onClick={()=>setShowPosModal(false)} style={{padding:'8px 14px',background:'white',border:'2px solid #E0E7FF',borderRadius:'8px',fontSize:'12px',fontWeight:'600',color:'#6B7280',cursor:'pointer'}}>Cancel</button>
                                    <button onClick={handleAddPosition} style={{padding:'8px 16px',background:'linear-gradient(135deg,#6366F1,#7C3AED)',color:'white',border:'none',borderRadius:'8px',fontSize:'12px',fontWeight:'700',cursor:'pointer'}}>Create Position</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* ── DELETE CONFIRM ───────────────────────────────────── */}
                    {delConfirm && (
                        <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.5)',zIndex:1000,display:'flex',alignItems:'center',justifyContent:'center'}}>
                            <div style={{background:'white',borderRadius:'14px',width:'420px',boxShadow:'0 20px 60px rgba(0,0,0,0.25)',overflow:'hidden'}}>
                                <div style={{padding:'20px 24px',textAlign:'center'}}>
                                    <div style={{fontSize:'40px',marginBottom:'12px'}}>⚠️</div>
                                    <h3 style={{fontSize:'16px',fontWeight:'700',color:'#111827',margin:'0 0 8px'}}>Deactivate Staff Member?</h3>
                                    <p style={{fontSize:'13px',color:'#6B7280',margin:'0 0 8px'}}>
                                        <strong>{delConfirm.name}</strong> will be deactivated and removed from all org chart positions.
                                    </p>
                                    <p style={{fontSize:'12px',color:'#DC2626',background:'#FEF2F2',padding:'8px',borderRadius:'6px',margin:'0 0 4px'}}>
                                        Their positions will become <strong>VACANT</strong> in the Org Chart.
                                    </p>
                                    <p style={{fontSize:'11px',color:'#9CA3AF'}}>This action can be undone by re-adding the staff member.</p>
                                </div>
                                <div style={{padding:'12px 20px',borderTop:'1px solid #F3F4F6',display:'flex',gap:'10px',justifyContent:'center',background:'#F9FAFB'}}>
                                    <button onClick={()=>setDelConfirm(null)} style={{padding:'9px 20px',background:'white',border:'2px solid #E5E7EB',borderRadius:'8px',fontSize:'13px',fontWeight:'600',cursor:'pointer',color:'#374151'}}>Cancel</button>
                                    <button onClick={handleDelete} style={{padding:'9px 20px',background:'#DC2626',color:'white',border:'none',borderRadius:'8px',fontSize:'13px',fontWeight:'700',cursor:'pointer'}}>Deactivate</button>
                                </div>
                            </div>
                        </div>
                    )}
                </main>
            );
        }

        // Scheduled Reports Page
        function ScheduledReportsPage() {
            return (
                <main className="flex-1 overflow-auto bg-gray-50">
                    <div className="p-8">
                        <h1 className="text-3xl font-bold text-gray-900 mb-2">Scheduled Reports</h1>
                        <p className="text-gray-600 mb-8">Manage automated report schedules</p>
                        <div className="bg-white rounded-lg shadow-sm border border-gray-200 p-8">
                            <p className="text-gray-600">Scheduled reports content coming soon...</p>
                        </div>
                    </div>
                </main>
            );
        }

        // Main App
        function App() {
            const [currentPage, setCurrentPage] = React.useState(() => {
                const hash = window.location.hash.slice(1) || 'dashboard';
                return hash;
            });
            const [signedOut, setSignedOut] = React.useState(false);
            const [authError, setAuthError] = React.useState(null);

            // Show any error the backend passed back via ?error= after Microsoft login
            React.useEffect(() => {
                if (window.MicrosoftAuth.loginError) {
                    const msgs = {
                        not_authorized:    'Your Microsoft account is not authorised for this app. Contact your administrator.',
                        disallowed_domain: 'Your email domain is not allowed. Contact your administrator.',
                        account_inactive:  'Your account is inactive. Contact your administrator.',
                    };
                    setAuthError(msgs[window.MicrosoftAuth.loginError] || ('Sign-in error: ' + window.MicrosoftAuth.loginError));
                    setSignedOut(true);
                }
            }, []);

            React.useEffect(() => {
                const handleHashChange = () => {
                    const hash = window.location.hash.slice(1) || 'dashboard';
                    setCurrentPage(hash);
                };
                window.addEventListener('hashchange', handleHashChange);
                return () => window.removeEventListener('hashchange', handleHashChange);
            }, []);

            const handlePageChange = (pageId) => {
                window.location.hash = pageId;
            };

            // Sign Out — clears app session only, does NOT sign out from Microsoft Entra
            const handleSignOut = () => {
                try { sessionStorage.clear(); } catch(e) {}
                try { localStorage.removeItem('authToken'); } catch(e) {}
                window.location.hash = '';
                setCurrentPage('dashboard');
                setAuthError(null);
                setSignedOut(true);
            };

            // Sign Back In — redirect to backend which handles PKCE with Microsoft
            const handleSignBackIn = () => {
                setAuthError(null);
                window.MicrosoftAuth.signIn();
            };

            const handleEmailLogin = (token) => {
                localStorage.setItem('authToken', token);
                setSignedOut(false);
                window.location.hash = 'dashboard';
                setCurrentPage('dashboard');
            };

            if (signedOut) {
                return <SignedOutScreen onSignBackIn={handleSignBackIn} onEmailLogin={handleEmailLogin} authError={authError} />;
            }

            const renderPage = () => {
                switch (currentPage) {
                    case 'dashboard': return <Dashboard />;
                    case 'create-ticket': return <CreateTicket />;
                    case 'tickets': return <TicketsPage />;
                    case 'calendar': return <CalendarPage />;
                    case 'ticket-logs': return <TicketLogsPage />;
                    case 'analytics': return <AnalyticsPage />;
                    case 'org-chart': return <OrgChartPage />;
                    case 'staff-performance': return <StaffPerformancePage />;
                    case 'team-comparison': return <TeamComparisonPage />;
                    case 'staff-management': return <StaffManagementPage />;
                    case 'scheduled-reports': return <ScheduledReportsPage />;
                    default: return <Dashboard />;
                }
            };

            return (
                <div className="flex h-screen bg-gray-50">
                    <Navigation currentPage={currentPage} setCurrentPage={handlePageChange} onSignOut={handleSignOut} />
                    {renderPage()}
                </div>
            );
        }

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>

    <!-- Enterprise Components (Approval Workflow) -->
    <script type="text/babel" src="enterprise-components.js"></script>
</body>
</html>
