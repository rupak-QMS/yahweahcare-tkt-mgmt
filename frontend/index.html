        :root {

        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
        .stat-card { transition: all 0.3s ease; }
        .stat-card:hover { transform: translateY(-4px); box-shadow: 0 12px 24px rgba(0,0,0,0.1); }
        .chart-container { position: relative; height: 300px; }
        .badge { display: inline-block; padding: 4px 12px; border-radius: 9999px; font-size: 12px; font-weight: 600; }
        .badge-open { background-color: #DBEAFE; color: #0369A1; }
        .badge-in-progress { background-color: #DCFCE7; color: #15803D; }
        .badge-resolved { background-color: #D1FAE5; color: #065F46; }
        .badge-closed { background-color: #F3E8FF; color: #6B21A8; }
        .badge-urgent { background-color: #FEE2E2; color: #991B1B; }
        .badge-high { background-color: #FECACA; color: #7C2D12; }
        .badge-medium { background-color: #FCD34D; color: #78350F; }
        .badge-low { background-color: #DBEAFE; color: #0C4A6E; }
        .table-row:hover { background-color: #F9FAFB; }
        input[type="text"], input[type="email"], input[type="date"], select, textarea {
            padding: 10px 12px;
            border: 1px solid #E5E7EB;
            border-radius: 6px;
            font-size: 14px;
        }
        input[type="text"]:focus, input[type="email"]:focus, input[type="date"]:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #6366F1;
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
        }
        .calendar-day { padding: 8px; border: 1px solid #E5E7EB; text-align: center; cursor: pointer; }
        .calendar-day:hover { background-color: #F9FAFB; }
        .calendar-day.today { background-color: #DBEAFE; border-color: #0369A1; }
        .calendar-day.event { background-color: #BFDBFE; }
    </style>

        // Create Ticket Page
        function CreateTicket() {
            const [formData, setFormData] = React.useState({
                title: '',
                description: '',
                category_id: 'general',
                priority_id: 'medium'
            });
            const [loading, setLoading] = React.useState(false);
            const [lookups, setLookups] = React.useState(null);
            const [error, setError] = React.useState('');

            React.useEffect(() => {
                fetchLookups();
            }, []);

            const fetchLookups = async () => {
                try {
                    const data = await API.lookups.get();
                    setLookups(data);
                } catch (err) {
                    setError('Failed to load form options');
                }
            };

            const handleSubmit = async (e) => {
                e.preventDefault();
                setLoading(true);
                setError('');
                try {
                    await API.tickets.create(formData);
                    alert('✅ Ticket created successfully!');
                    setFormData({ title: '', description: '', category_id: 'general', priority_id: 'medium' });
                } catch (err) {
                    setError('Failed to create ticket: ' + err.message);
                } finally {
                    setLoading(false);
                }
            };

            return (
                <main className="flex-1 overflow-auto bg-gray-50">
                    <div className="p-8">
                        <h1 className="text-3xl font-bold text-gray-900 mb-2">Create New Ticket</h1>
                        <p className="text-gray-600 mb-8">Submit a new support request</p>

                        {error && <div className="bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded mb-6">{error}</div>}

                        {!lookups ? <div className="text-center py-12"><div className="spinner mx-auto mb-4"></div></div> : (
                        <form onSubmit={handleSubmit} className="bg-white rounded-lg shadow-sm border border-gray-200 p-8">
                            <div className="grid grid-cols-2 gap-6 mb-6">
                                <div>
                                    <label className="block text-sm font-medium text-gray-900 mb-2">Title Type *</label>
                                    <select className="w-full">
                                        <option>Service Request</option>
                                        <option>Bug Report</option>
                                        <option>Feature Request</option>
                                    </select>
                                </div>
                                <div>
                                    <label className="block text-sm font-medium text-gray-900 mb-2">Subtitle *</label>
                                    <input type="text" placeholder="Brief description" className="w-full"/>
                                </div>
                            </div>

                            <div className="grid grid-cols-2 gap-6 mb-6">
                                <div>
                                    <label className="block text-sm font-medium text-gray-900 mb-2">Category *</label>
                                    <select className="w-full">
                                        <option>Client Issue</option>
                                        <option>Equipment Issue</option>
                                        <option>HR Issue</option>
                                        <option>Account Issue</option>
                                    </select>
                                </div>
                                <div>
                                    <label className="block text-sm font-medium text-gray-900 mb-2">Subcategory</label>
                                    <input type="text" placeholder="Optional subcategory" className="w-full"/>
                                </div>
                            </div>

                            <div className="mb-6">
                                <label className="block text-sm font-medium text-gray-900 mb-2">Issue Details *</label>
                                <textarea placeholder="Describe the issue in detail..." className="w-full h-32"></textarea>
                            </div>

                            <div className="border-t border-gray-200 pt-6 mt-6">
                                <h3 className="text-lg font-bold text-gray-900 mb-6">Reporter Information</h3>
                                <div className="grid grid-cols-2 gap-6 mb-6">
                                    <div>
                                        <label className="block text-sm font-medium text-gray-900 mb-2">Submitted By *</label>
                                        <input type="text" value="Ron Costa" className="w-full bg-gray-100" disabled/>
                                    </div>
                                    <div>
                                        <label className="block text-sm font-medium text-gray-900 mb-2">Email *</label>
                                        <input type="email" placeholder="IT@yahweahcare.com.au" className="w-full"/>
                                    </div>
                                </div>
                                <div className="mb-6">
                                    <label className="flex items-center gap-2">
                                        <input type="checkbox" />
                                        <span className="text-sm text-gray-700">NDIS Related</span>
                                    </label>
                                </div>

                            <div className="border-t border-gray-200 pt-6 mt-6">
                                <h3 className="text-lg font-bold text-gray-900 mb-6">Classification</h3>
                                <div className="grid grid-cols-2 gap-6 mb-6">
                                    <div>
                                        <label className="block text-sm font-medium text-gray-900 mb-2">Priority *</label>
                                        <select className="w-full">
                                            <option>Medium</option>

        // Tickets Page
        function TicketsPage() {
            const [filter, setFilter] = React.useState('all');
            const [search, setSearch] = React.useState('');

            const filtered = TICKETS_DATA.filter(t => {
                if (filter !== 'all' && t.status.toLowerCase() !== filter.toLowerCase()) return false;
                if (search && !t.title.toLowerCase().includes(search.toLowerCase())) return false;
                return true;
            });

            const getStatusBadge = (status) => {
                const badges = {
                    'Open': 'badge-open',
                    'In Progress': 'badge-in-progress',
                    'Resolved': 'badge-resolved',
                    'Closed': 'badge-closed'
                };
                return badges[status] || 'badge-open';
            };

            const getPriorityBadge = (priority) => {
                const badges = {
                    'Urgent': 'badge-urgent',
                    'High': 'badge-high',
                    'Medium': 'badge-medium',
                    'Low': 'badge-low'
                };
                return badges[priority] || 'badge-medium';
            };

            return (
                <main className="flex-1 overflow-auto bg-gray-50">
                    <div className="p-8">
                        <div className="flex justify-between items-center mb-8">
                            <div>
                                <h1 className="text-3xl font-bold text-gray-900">Tickets</h1>
                                <p className="text-gray-600">Manage and track all support tickets</p>
                            </div>
                            <button className="bg-blue-600 text-white px-6 py-2 rounded-lg font-semibold hover:bg-blue-700">
                                ➕ Create Ticket
                            </button>
                        </div>

                        <div className="bg-white rounded-lg shadow-sm border border-gray-200 p-6 mb-6">
                            <div className="flex gap-4 mb-6">
                                <input
                                    type="text"
                                    placeholder="Search tickets..."
                                    className="flex-1"
                                    value={search}
                                    onChange={(e) => setSearch(e.target.value)}
                                />
                            </div>

                            <div className="flex gap-2 mb-6">
                                {['all', 'Open', 'In Progress', 'Resolved', 'Closed'].map(s => (
                                    <button
                                        key={s}
                                        onClick={() => setFilter(s)}
                                        className={`px-4 py-2 rounded-lg font-medium ${
                                            filter === s
                                                ? 'bg-blue-600 text-white'
                                                : 'bg-gray-100 text-gray-700 hover:bg-gray-200'
                                        }`}
                                    >
                                        {s === 'all' ? 'All Tickets' : s}
                                    </button>
                                ))}
                            </div>

                            <div className="overflow-x-auto">
                                <table className="w-full">
                                    <thead>
                                        <tr className="border-b border-gray-200">
                                            <th className="text-left py-3 px-4 text-sm font-semibold text-gray-900">ID</th>
                                            <th className="text-left py-3 px-4 text-sm font-semibold text-gray-900">Title</th>
                                            <th className="text-left py-3 px-4 text-sm font-semibold text-gray-900">Category</th>
                                            <th className="text-left py-3 px-4 text-sm font-semibold text-gray-900">Priority</th>
                                            <th className="text-left py-3 px-4 text-sm font-semibold text-gray-900">Status</th>
                                            <th className="text-left py-3 px-4 text-sm font-semibold text-gray-900">Assigned To</th>
                                            <th className="text-left py-3 px-4 text-sm font-semibold text-gray-900">Date</th>
                                        </tr>
                                    </thead>
                                    <tbody>

        // Calendar Page
        function CalendarPage() {
            const [currentDate] = React.useState(new Date(2026, 4)); // May 2026

            const getDaysInMonth = (date) => new Date(date.getFullYear(), date.getMonth() + 1, 0).getDate();
            const getFirstDay = (date) => new Date(date.getFullYear(), date.getMonth(), 1).getDay();

            const days = [];
            for (let i = 0; i < getFirstDay(currentDate); i++) days.push(null);
            for (let i = 1; i <= getDaysInMonth(currentDate); i++) days.push(i);

            return (
                <main className="flex-1 overflow-auto bg-gray-50">
                    <div className="p-8">
                        <h1 className="text-3xl font-bold text-gray-900 mb-2">Calendar View</h1>
                        <p className="text-gray-600 mb-8">Track ticket timelines and deadlines</p>

                        <div className="bg-white rounded-lg shadow-sm border border-gray-200 p-8">
                            <h2 className="text-2xl font-bold text-gray-900 mb-6">📅 June 2026</h2>

                            <div className="grid grid-cols-7 gap-2 mb-4">
                                {['SUN', 'MON', 'TUE', 'WED', 'THU', 'FRI', 'SAT'].map(day => (
                                    <div key={day} className="text-center font-semibold text-gray-700 py-2">{day}</div>
                                ))}
                            </div>

                            <div className="grid grid-cols-7 gap-2">
                                {days.map((day, i) => (
                                    <div
                                        key={i}
                                        className={`calendar-day aspect-square flex items-center justify-center rounded ${
                                            day === 3 ? 'today calendar-day' : ''
                                        } ${day === 5 ? 'event' : ''}`}
                                    >
                                        {day && (
                                            <div className="text-center">
                                                <p className="font-semibold text-gray-900">{day}</p>
                                                {day === 5 && <p className="text-xs text-blue-600">2B-9881</p>}
                                            </div>
                                        )}
                                    </div>
                                ))}
                            </div>

                            <div className="mt-8 flex gap-4">
                                <div className="flex items-center gap-2">
                                    <div className="w-3 h-3 bg-blue-300 rounded"></div>
                                    <span className="text-sm">Normal Priority</span>
                                </div>
                                <div className="flex items-center gap-2">
                                    <div className="w-3 h-3 bg-orange-400 rounded"></div>
                                    <span className="text-sm">High Priority</span>
                                </div>
                                <div className="flex items-center gap-2">
                                    <div className="w-3 h-3 bg-red-500 rounded"></div>
                                    <span className="text-sm">Urgent Priority</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </main>
            );
        }

        // Main App
        function App() {
            const [currentPage, setCurrentPage] = React.useState(() => {
                const hash = window.location.hash.slice(1) || 'dashboard';
                return hash;
            });

            React.useEffect(() => {
                const handleHashChange = () => {
                    const hash = window.location.hash.slice(1) || 'dashboard';
                    setCurrentPage(hash);
                };
                window.addEventListener('hashchange', handleHashChange);
                return () => window.removeEventListener('hashchange', handleHashChange);
            }, []);

            const handlePageChange = (pageId) => {
                window.location.hash = pageId;
            };

            const renderPage = () => {
                switch (currentPage) {
                    case 'dashboard': return <Dashboard />;
                    case 'create-ticket': return <CreateTicket />;
                    case 'tickets': return <TicketsPage />;
                    case 'calendar': return <CalendarPage />;
                    case 'ticket-logs': return <TicketLogsPage />;
                    case 'analytics': return <AnalyticsPage />;
                    case 'org-chart': return <OrgChartPage />;
                    case 'staff-performance': return <StaffPerformancePage />;
                    case 'team-comparison': return <TeamComparisonPage />;
                    case 'staff-management': return <StaffManagementPage />;
                    case 'scheduled-reports': return <ScheduledReportsPage />;
                    default: return <Dashboard />;
                }
            };

            return (
                <div className="flex h-screen bg-gray-50">
                    <Navigation currentPage={currentPage} setCurrentPage={handlePageChange} />
                    {renderPage()}
                </div>
            );
        }

        ReactDOM.render(<App />, document.getElementById('root'));
