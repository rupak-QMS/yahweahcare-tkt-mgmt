// ============================================================
// MAIN APP
// ============================================================
const App = () => {
  const [state, setState] = useState(loadState);
  const [view, setView] = useState('dashboard');
  const [filter, setFilter] = useState('all');
  const [currentTicketId, setCurrentTicketId] = useState(null);
  const [currentStaffId, setCurrentStaffId] = useState(null);
  const [teamFilterIds, setTeamFilterIds] = useState(null);
  const [assignModal, setAssignModal] = useState({ open: false, ticket: null });
  const [deleteModal, setDeleteModal] = useState({ open: false, ticket: null });
  const [toast, setToast] = useState(null);
  const [mobileNavOpen, setMobileNavOpen] = useState(false);
  const [sidebarCollapsed, setSidebarCollapsed] = useState(() => {
    try { return localStorage.getItem('yc-sidebar-collapsed') === 'true'; } catch(e) { return false; }
  });
  const toggleSidebar = () => {
    setSidebarCollapsed(c => {
      const next = !c;
      try { localStorage.setItem('yc-sidebar-collapsed', String(next)); } catch(e) {}
      return next;
    });
  };
  const [authMode, setAuthMode] = useState('checking');  // 'checking' | 'microsoft' | 'demo' | 'none' | 'unauthorized_entra'
  const [msUser, setMsUser] = useState(null);
  const [loginError, setLoginError] = useState(null);
  const [theme, setTheme] = useState(() => {
    try { return localStorage.getItem('yahweh_theme') || 'light'; } catch (e) { return 'light'; }
  });

  useEffect(() => { saveState(state); }, [state]);
  useEffect(() => { const l = document.getElementById('loading'); if (l) l.remove(); }, []);
  useEffect(() => {
    if (theme === 'dark') document.documentElement.classList.add('dark');
    else document.documentElement.classList.remove('dark');
    try { localStorage.setItem('yahweh_theme', theme); } catch (e) {}
  }, [theme]);
  const toggleTheme = () => setTheme(t => t === 'dark' ? 'light' : 'dark');

  // ── On mount: check ?error= from backend redirect and try /auth/me ──
  useEffect(() => {
    const params = new URLSearchParams(window.location.search);
    const err = params.get('error');
    if (err) {
      const code = decodeURIComponent(err);
      // Domain/auth errors from the SSO callback → show Unauthorized page
      if (code === 'disallowed_domain' || code === 'not_authorized' || code === 'account_inactive') {
        setAuthMode('unauthorized_entra');
      } else {
        setLoginError(code);
      }
      window.history.replaceState({}, '', window.location.pathname);
    }
    apiClient.me().then(data => {
      if (data && data.user) {
        const u = data.user;
        setMsUser({
          id: 'ms_' + u.id,
          backendId: u.id,
          name: u.name,
          email: u.email,
          role: u.role,
          department: u.department || 'Unknown',
          avatar: (u.name || '?').split(' ').map(s => s[0]).slice(0, 2).join('').toUpperCase(),
          isAdmin: u.is_admin || u.role === 'super_admin',
          bootstrapAdmin: u.bootstrap_admin,
          systemCreated: u.bootstrap_admin,
          active: u.active,
          permissions: data.permissions || [],
        });
        setAuthMode('microsoft');
        // Load real users, roles, schedules, tickets, lookup and notifications from backend
        Promise.all([
          apiClient.getUsers(),
          apiClient.getRoles(),
          apiClient.getSchedules(),
          apiClient.getTickets(),
          apiClient.getLookup(),
          apiClient.getNotifications(),
        ]).then(([usersData, rolesData, schedulesData, ticketsData, lookupData, notifData]) => {
          const updates = {};
          if (usersData?.users)           updates.users         = usersData.users.map(backendUserToFrontend);
          if (rolesData?.roles)           updates.roles         = rolesData.roles;
          if (schedulesData?.schedules)   updates.schedules     = schedulesData.schedules;
          if (ticketsData?.tickets)       updates.tickets       = ticketsData.tickets;
          if (lookupData?.categories)     updates.categories    = lookupData.categories;
          if (lookupData?.priorities)     updates.priorities    = lookupData.priorities;
          if (lookupData?.statuses)       updates.statuses      = lookupData.statuses;
          if (notifData?.notifications)   updates.notifications = notifData.notifications;
          if (Object.keys(updates).length) setState(s => ({ ...s, ...updates }));
        }).catch(() => {});
      } else if (data && data.unauthorized_user) {
        setAuthMode('unauthorized_entra');
      } else {
        setAuthMode('none');
      }
    }).catch(() => setAuthMode('none'));
    // Auto-refresh access token every 12 min (TTL 15 min)
    const refreshTimer = setInterval(() => {
      fetch(`${API_BASE}/auth/refresh`, { method: 'POST', credentials: 'include' }).catch(() => {});
    }, 12 * 60 * 1000);
    return () => clearInterval(refreshTimer);
  }, []);

  const currentUser = msUser || state.users.find(u => u.id === state.currentUserId);

  // ── App-level effective user ID ───────────────────────────────────────────
  // Microsoft SSO users get id='ms_xxx' but localStorage tickets use demo IDs.
  // Resolve the canonical ID by matching email → name → direct id → backendId.
  const _appMatchedUser = currentUser && state.users.find(u =>
    (u.email && currentUser.email && u.email.toLowerCase() === currentUser.email.toLowerCase()) ||
    (u.name  && currentUser.name  && u.name === currentUser.name) ||
    u.id === currentUser.id ||
    u.id === currentUser.backendId
  );
  // This is the ID that should be written into ticket.requesterId / ticket.assigneeId
  const appEffectiveUserId = _appMatchedUser?.id || currentUser?.backendId || currentUser?.id;

  // ── Keyboard shortcuts — MUST be before any early returns (Rules of Hooks) ─
  // N = new ticket, ESC = go back / close, T = tickets list, D = dashboard
  useEffect(() => {
    const handler = (e) => {
      if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || e.target.tagName === 'SELECT' || e.target.isContentEditable) return;
      if (e.key === 'n' || e.key === 'N') { e.preventDefault(); setView('new'); }
      if (e.key === 't' || e.key === 'T') { e.preventDefault(); setView('tickets'); }
      if (e.key === 'd' || e.key === 'D') { e.preventDefault(); setView('dashboard'); }
      if (e.key === 'Escape') {
        if (view === 'new' || view === 'detail') setView('tickets');
        else if (view !== 'dashboard') setView('dashboard');
      }
    };
    window.addEventListener('keydown', handler);
    return () => window.removeEventListener('keydown', handler);
  }, [view]);

  // Count for sidebar badge — must be before early returns too
  const openTicketCount = state.tickets.filter(t => !['resolved','closed'].includes(t.status)).length;

  if (authMode === 'checking') {
    return (
      <div className="min-h-screen flex items-center justify-center brand-gradient text-white">
        <div className="text-center">
          <div className="inline-block w-10 h-10 border-4 border-white/30 border-t-white rounded-full animate-spin mb-3"></div>
          <div className="text-sm">Checking your session…</div>
        </div>
      </div>
    );
  }
  if (authMode === 'unauthorized_entra') return <UnauthorizedEntryPage onReturnToLogin={() => { setAuthMode('none'); setMsUser(null); }} />;
  if (!currentUser) return <LoginScreen users={state.users} loginError={loginError} onSelect={(id) => { setAuthMode('demo'); setState(s => ({ ...s, currentUserId: id })); }} />;

  // Unified logout — clears app session only; does NOT call logoutRedirect/logoutPopup or any MS global sign-out
  const handleLogout = async () => {
    try { await apiClient.logout(); } catch(e) {}
    setMsUser(null);
    setState(s => ({ ...s, currentUserId: null }));
    setAuthMode('none');
  };

  const showToast = (kind, title, body) => setToast({ kind, title, body });

  const addNotification = (n) => {
    setState(s => ({ ...s, notifications: [{ id: uid(), at: now(), read: false, ...n }, ...(s.notifications || [])].slice(0, 50) }));
  };

  // Send email + push to a user about a ticket
  const notifyUser = (userId, ticket, eventLabel, body) => {
    const user = getUser(state.users, userId);
    if (!user || userId === currentUser.id) return;
    addNotification({ recipientId: userId, ticketId: ticket.id, channel: 'email', subject: `[Yahweh Care] ${eventLabel}: ${ticket.title}`, body: `${body}\n\nTicket: ${ticket.ticketNumber}` });
    addNotification({ recipientId: userId, ticketId: ticket.id, channel: 'push', subject: `${eventLabel} — ${ticket.title}`, body });
  };

  const createTicket = async (data) => {
    if (authMode === 'microsoft') {
      try {
        const res = await apiClient.createTicket({
          title: data.titleType ? `${data.titleType}${data.subtitle ? ': ' + data.subtitle : ''}` : data.title,
          description: data.description || '',
          category: data.category,
          priority: data.priority,
          status: data.status || 'open',
          site: data.site || null,
          assigneeId: data.assigneeId ? (state.users.find(u => u.id === data.assigneeId)?.backendId || null) : null,
        });
        if (!res.ok) {
          const msg = res.data?.message || res.data?.error || 'Failed to create ticket';
          showToast('error', 'Ticket creation failed', msg);
          return;
        }
        const t = res.data?.ticket;
        if (t) {
          setState(s => ({ ...s, tickets: [t, ...s.tickets] }));
          if (t.assigneeId) notifyUser(String(t.assigneeId), t, 'Ticket assigned to you', `${currentUser.name} assigned a new ticket to you.`);
          showToast('success', 'Ticket created', `${t.ticketNumber} created`);
          setCurrentTicketId(t.id);
          setView('detail');
        }
      } catch (e) {
        showToast('error', 'Failed to create ticket', e.message || 'Server error');
      }
      return;
    }
    // Demo / offline mode
    const createdAt = now();
    const dueAt = data.expectedCompletion ? new Date(data.expectedCompletion).toISOString() : new Date(new Date(createdAt).getTime() + getPriority(data.priority).slaHours * 3600000).toISOString();
    const year = new Date(createdAt).getFullYear();
    const seq = String((state.tickets.length + 1) * 7 + 1000).padStart(4, '0');
    const ticket = {
      id: uid(),
      ticketNumber: `YPC-TKT-${year}-${seq}`,
      title: data.title,
      titleType: data.titleType,
      description: data.description,
      category: data.category,
      subcategory: data.subcategory,
      priority: data.priority,
      status: data.status || 'open',
      requesterId: appEffectiveUserId,
      assigneeId: data.assigneeId || null,
      expectedCompletion: data.expectedCompletion,
      ndisRelated: data.ndisRelated,
      attachments: data.attachments || [],
      createdAt, updatedAt: createdAt, dueAt,
      comments: [],
      activity: [{ id: uid(), at: createdAt, userId: appEffectiveUserId, text: 'Created' }],
    };
    setState(s => ({ ...s, tickets: [ticket, ...s.tickets] }));
    if (ticket.assigneeId) notifyUser(ticket.assigneeId, ticket, 'Ticket assigned to you', `${currentUser.name} assigned a new ${getPriority(ticket.priority).label.toLowerCase()}-priority ticket to you.`);
    showToast('success', 'Ticket created', `${ticket.ticketNumber} created` + (ticket.assigneeId ? ` and assigned to ${getUser(state.users, ticket.assigneeId)?.name}` : ''));
    setCurrentTicketId(ticket.id);
    setView('detail');
  };

  const updateTicket = async (id, updates, activityText) => {
    const before = state.tickets.find(t => t.id === id);
    if (authMode === 'microsoft') {
      try {
        const backendId = typeof id === 'string' && !isNaN(Number(id)) ? Number(id) : id;
        const payload = {};
        if ('status' in updates)     payload.status     = updates.status;
        if ('priority' in updates)   payload.priority   = updates.priority;
        if ('category' in updates)   payload.category   = updates.category;
        if ('title' in updates)      payload.title      = updates.title;
        if ('description' in updates) payload.description = updates.description;
        if ('assigneeId' in updates) payload.assigneeId = updates.assigneeId ? (state.users.find(u => u.id === updates.assigneeId)?.backendId || updates.assigneeId) : null;
        if ('resolvedAt' in updates) payload.resolvedAt = updates.resolvedAt;
        if ('closedAt' in updates)   payload.closedAt   = updates.closedAt;
        const res = await apiClient.updateTicket(backendId, payload);
        if (res?.ticket) {
          setState(s => ({ ...s, tickets: s.tickets.map(t => t.id !== id ? t : { ...res.ticket, activity: [...(res.ticket.activity || []), ...(t.activity || [])], comments: res.ticket.comments?.length ? res.ticket.comments : (t.comments || []) }) }));
          if (before) {
            [before.requesterId, before.assigneeId].filter(u => u && String(u) !== String(currentUser.id) && String(u) !== String(currentUser.backendId)).forEach(u => {
              notifyUser(String(u), before, 'Ticket updated', `${currentUser.name}: ${activityText || 'Ticket updated'}`);
            });
          }
          return;
        }
      } catch (e) {
        showToast('error', 'Update failed', e.message || 'Server error');
        return;
      }
    }
    setState(s => ({ ...s, tickets: s.tickets.map(t => t.id !== id ? t : { ...t, ...updates, activity: [...(t.activity || []), { id: uid(), at: now(), userId: currentUser.id, text: activityText }] }) }));
    // Notify both assigner and assignee on changes
    if (before) {
      [before.requesterId, before.assigneeId].filter(uid => uid && uid !== currentUser.id).forEach(uid => {
        notifyUser(uid, before, 'Ticket updated', `${currentUser.name}: ${activityText}`);
      });
    }
  };

  const addComment = async (ticketId, body) => {
    const t = state.tickets.find(x => x.id === ticketId);
    if (authMode === 'microsoft') {
      try {
        const backendId = typeof ticketId === 'string' && !isNaN(Number(ticketId)) ? Number(ticketId) : ticketId;
        const res = await apiClient.addComment(backendId, { body, isInternal: false });
        if (res?.comment) {
          const c = res.comment;
          setState(s => ({ ...s, tickets: s.tickets.map(x => x.id !== ticketId ? x : { ...x, updatedAt: now(), comments: [...(x.comments || []), { id: c.id, userId: c.userId, body: c.text || body, text: c.text || body, createdAt: c.at || now() }], activity: [...(x.activity || []), { id: uid(), at: now(), userId: appEffectiveUserId, text: 'Comment added' }] }) }));
          if (t) [t.requesterId, t.assigneeId].filter(u => u && String(u) !== String(appEffectiveUserId)).forEach(u => {
            notifyUser(String(u), t, 'New comment on ticket', `${currentUser.name} commented: "${body.slice(0, 120)}${body.length > 120 ? '...' : ''}"`);
          });
          return;
        }
      } catch (e) {
        showToast('error', 'Failed to add comment', e.message || 'Server error');
        return;
      }
    }
    setState(s => ({ ...s, tickets: s.tickets.map(x => x.id !== ticketId ? x : { ...x, updatedAt: now(), comments: [...(x.comments || []), { id: uid(), userId: appEffectiveUserId, body, createdAt: now() }], activity: [...(x.activity || []), { id: uid(), at: now(), userId: appEffectiveUserId, text: 'Comment added' }] }) }));
    if (t) [t.requesterId, t.assigneeId].filter(uid => uid && uid !== appEffectiveUserId).forEach(uid => {
      notifyUser(uid, t, 'New comment on ticket', `${currentUser.name} commented: "${body.slice(0, 120)}${body.length > 120 ? '...' : ''}"`);
    });
  };

  const assignTicket = async (ticket, assigneeId) => {
    if (assigneeId === appEffectiveUserId || assigneeId === currentUser.id || assigneeId === currentUser.backendId) {
      showToast('error', 'Cannot self-assign', 'You cannot assign tickets to yourself.');
      return;
    }
    await updateTicket(ticket.id, { assigneeId }, `Assigned to ${getUser(state.users, assigneeId)?.name}`);
    notifyUser(assigneeId, ticket, 'Ticket assigned to you', `${currentUser.name} assigned this ticket to you.`);
    if (ticket.requesterId !== currentUser.id) notifyUser(ticket.requesterId, ticket, 'Ticket assigned', `${currentUser.name} assigned this ticket to ${getUser(state.users, assigneeId)?.name}.`);
    showToast('success', 'Ticket assigned', `Assigned to ${getUser(state.users, assigneeId)?.name}`);
  };

  const deleteTicket = async (ticket) => {
    if (!isAdmin(currentUser)) { showToast('error', 'Permission denied', 'Only admins can delete tickets.'); return; }
    if (authMode === 'microsoft') {
      try {
        const backendId = typeof ticket.id === 'string' && !isNaN(Number(ticket.id)) ? Number(ticket.id) : ticket.id;
        await apiClient.deleteTicket(backendId);
      } catch (e) {
        showToast('error', 'Delete failed', e.message || 'Server error');
        return;
      }
    }
    setState(s => ({ ...s, tickets: s.tickets.filter(t => t.id !== ticket.id) }));
    showToast('success', 'Ticket deleted', `${ticket.ticketNumber} has been removed`);
    if (view === 'detail' && currentTicketId === ticket.id) setView('tickets');
  };

  const markComplete = (ticket) => {
    setState(s => ({ ...s, tickets: s.tickets.map(t => t.id !== ticket.id ? t : { ...t, status: 'pending_approval', resolvedAt: now(), updatedAt: now(), activity: [...(t.activity || []), { id: uid(), at: now(), userId: currentUser.id, text: 'Marked complete — awaiting approval' }] }) }));
    notifyUser(ticket.requesterId, ticket, 'Ticket awaiting your approval', `${currentUser.name} marked the ticket as complete. Please review and approve, or reopen with feedback.`);
    showToast('success', 'Marked complete', 'Awaiting approval from the requester');
  };

  const approveTicket = (ticket) => {
    setState(s => ({ ...s, tickets: s.tickets.map(t => t.id !== ticket.id ? t : { ...t, status: 'closed', updatedAt: now(), activity: [...(t.activity || []), { id: uid(), at: now(), userId: currentUser.id, text: 'Approved and closed' }] }) }));
    if (ticket.assigneeId) notifyUser(ticket.assigneeId, ticket, 'Ticket approved and closed', `${currentUser.name} approved your resolution. Ticket is now closed.`);
    showToast('success', 'Ticket approved', 'Ticket has been closed');
  };

  const reopenTicket = (ticket, feedback) => {
    setState(s => ({ ...s, tickets: s.tickets.map(t => t.id !== ticket.id ? t : {
      ...t, status: 'open', resolvedAt: null, updatedAt: now(),
      comments: [...(t.comments || []), { id: uid(), userId: currentUser.id, body: `🔄 Reopened: ${feedback}`, createdAt: now() }],
      activity: [...(t.activity || []), { id: uid(), at: now(), userId: currentUser.id, text: 'Reopened with feedback' }],
    }) }));
    if (ticket.assigneeId) notifyUser(ticket.assigneeId, ticket, 'Ticket reopened', `${currentUser.name} reopened this ticket. Feedback: ${feedback}`);
    showToast('error', 'Ticket reopened', 'Assignee has been notified with your feedback');
  };

  const mergeTicketsHandler = (primaryTicketId, secondaryTicketIds, reason) => {
    try {
      if (!isManager(currentUser) && !isAdmin(currentUser)) {
        showToast('error', 'Permission denied', 'Only managers and admins can merge tickets.');
        return;
      }

      const { updatedPrimary, archivedTickets } = mergeTickets(primaryTicketId, secondaryTicketIds, reason, state.tickets, currentUser.id);

      // Update state with merged primary and archived secondaries
      setState(s => ({
        ...s,
        tickets: s.tickets.map(t => {
          if (t.id === primaryTicketId) return updatedPrimary;
          if (secondaryTicketIds.includes(t.id)) {
            const archived = archivedTickets.find(at => at.id === t.id);
            return archived || t;
          }
          return t;
        })
      }));

      // Send notifications to all admins, bootstrap admins, and other managers
      const notifyList = state.users.filter(u =>
        u.active && (isAdmin({ role: u.role, isAdmin: u.isAdmin }) || (u.role === 'manager' && u.id !== currentUser.id))
      );

      notifyList.forEach(user => {
        const mergedTicketNumbers = archivedTickets.map(t => t.ticketNumber).join(', ');
        addNotification({
          recipientId: user.id,
          channel: 'email',
          subject: `[Yahweh Care] Tickets Merged: ${updatedPrimary.ticketNumber}`,
          body: `${currentUser.name} merged ${archivedTickets.length} duplicate ticket(s) into ${updatedPrimary.ticketNumber}.\n\nPrimary: ${updatedPrimary.title}\nMerged: ${mergedTicketNumbers}\nReason: ${reason}`
        });
        addNotification({
          recipientId: user.id,
          channel: 'push',
          subject: 'Duplicate Tickets Merged',
          body: `${archivedTickets.length} ticket(s) merged into ${updatedPrimary.ticketNumber}`
        });
      });

      showToast('success', 'Tickets merged', `${archivedTickets.length} ticket(s) merged into ${updatedPrimary.ticketNumber}`);
    } catch (error) {
      console.error('Merge error:', error);
      showToast('error', 'Merge failed', error.message || 'An error occurred while merging tickets');
    }
  };

  const markAllNotifsRead = () => setState(s => ({ ...s, notifications: (s.notifications || []).map(n => ({ ...n, read: true })) }));

  // ---- Staff Management ----
  const MIN_ADMINS = 2;

  const addStaff = async (data) => {
    if (!isAdmin(currentUser)) { showToast('error', 'Admin only', 'Only Super Admins can add new staff. Managers can edit existing team members.'); return; }
    // Email domain check — match HRMS backend
    const emailCheck = validateOrgEmail(data.email);
    if (!emailCheck.valid) { showToast('error', 'Email rejected', emailCheck.reason); return; }
    // Email uniqueness check
    if (state.users.some(u => u.email.toLowerCase() === (data.email || '').toLowerCase().trim())) {
      showToast('error', 'Duplicate email', 'A user with this email already exists.');
      return;
    }
    // Only Super Admin can choose a privileged role
    const safe = { ...data };
    if (!isAdmin(currentUser)) {
      safe.role = 'user';
      safe.department = currentUser.department;
    }
    const roleName = safe.role || 'user';
    // ── Microsoft mode: persist to backend ──────────────────────
    if (authMode === 'microsoft') {
      // Load roles on-demand if state.roles is empty (e.g. after backend redeploy)
      let roles = state.roles || [];
      if (!roles.length) {
        try {
          const rolesData = await apiClient.getRoles();
          if (rolesData?.roles?.length) {
            roles = rolesData.roles;
            setState(s => ({ ...s, roles }));
          }
        } catch (_) {}
      }
      const roleObj = roles.find(r => r.name === roleName);
      if (!roleObj) { showToast('error', 'Role not found', `Role "${roleName}" not found in the system. Please contact your admin.`); return; }
      try {
        const result = await apiClient.createUser({
          email: safe.email.toLowerCase().trim(),
          name: safe.name.trim(),
          roleId: roleObj.id,
          department: safe.department,
          designation: safe.designation || '',
        });
        if (!result.ok) {
          const msg = result.data?.message || result.data?.error || 'Failed to create user';
          showToast('error', 'Create failed', msg); return;
        }
        // Reload the full user list from backend so table reflects DB state
        const usersData = await apiClient.getUsers();
        if (usersData && usersData.users) setState(s => ({ ...s, users: usersData.users.map(backendUserToFrontend) }));
        showToast('success', 'Staff added', `${safe.name.trim()} added as ${ROLE_LABELS[roleName]?.label || roleName}`);
      } catch (e) {
        showToast('error', 'Network error', 'Could not reach the server. Please try again.');
      }
      return;
    }
    // ── Demo mode: in-memory only ────────────────────────────────
    const initials = (safe.name || '').split(' ').map(s => s[0]).slice(0, 2).join('').toUpperCase() || '?';
    const newUser = {
      id: uid(),
      name: safe.name.trim(),
      email: safe.email.toLowerCase().trim(),
      department: safe.department,
      avatar: initials,
      role: roleName,
      active: safe.active !== false,
      isAdmin: roleName === 'super_admin',
    };
    setState(s => ({ ...s, users: [...s.users, newUser] }));
    showToast('success', 'Staff added', `${newUser.name} added as ${ROLE_LABELS[newUser.role]?.label || newUser.role} in ${newUser.department}`);
  };
  const updateStaff = async (id, data) => {
    if (!canManageStaff(currentUser)) { showToast('error', 'Permission denied', 'You don\'t have permission to edit staff.'); return; }
    const target = state.users.find(u => u.id === id);
    if (!target) return;
    // Row-level security: managers can only edit staff in their own department
    if (!isAdmin(currentUser) && target.department !== currentUser.department) {
      showToast('error', 'Permission denied', 'You can only edit members of your own department.');
      return;
    }

    // ── Bootstrap admin protection ─────────────────────────
    // Bootstrap admins cannot be demoted or deactivated by anyone (not even other super admins)
    if (target.bootstrapAdmin) {
      if (data.role && data.role !== 'super_admin') {
        showToast('error', 'Bootstrap admin protected', `${target.name} is a bootstrap Super Admin — their role cannot be changed.`);
        return;
      }
      if (data.active === false) {
        showToast('error', 'Bootstrap admin protected', `${target.name} is a bootstrap Super Admin — they cannot be deactivated.`);
        return;
      }
    }

    // Only Super Admin can change role tier
    const safe = { ...data };
    if (!isAdmin(currentUser)) {
      delete safe.role;
      delete safe.active;
      // Managers can't move staff out of their department either
      if (safe.department && safe.department !== currentUser.department) safe.department = currentUser.department;
    }
    // Translate role selector → isAdmin flag
    const wantsAdmin = safe.role === 'super_admin';

    // Cannot demote yourself from admin (prevent lockout)
    if (id === currentUser.id && target.isAdmin && safe.role && safe.role !== 'super_admin') {
      showToast('error', 'Action blocked', 'You cannot remove your own admin access. Ask another Super Admin to do it.');
      return;
    }

    // Enforce minimum admin count
    const willBeAdmin = ('role' in safe) ? wantsAdmin : !!target.isAdmin;
    const willBeActive = ('active' in safe) ? safe.active : target.active !== false;
    const willStayAdmin = willBeAdmin && willBeActive;
    const wasActiveAdmin = target.isAdmin && target.active !== false;
    if (wasActiveAdmin && !willStayAdmin) {
      const remaining = state.users.filter(u => u.id !== id && u.isAdmin && u.active !== false).length;
      if (remaining < MIN_ADMINS) {
        const action = !willBeAdmin ? 'demote' : 'deactivate';
        showToast('error', 'At least 2 admins required', `Cannot ${action} ${target.name} — at least ${MIN_ADMINS} active Super Admins must remain. Promote another user to admin first.`);
        return;
      }
    }

    // ── Microsoft mode: persist to backend ──────────────────────
    if (authMode === 'microsoft' && target.backendId) {
      const payload = {};
      if ('name' in safe)        payload.name        = safe.name;
      if ('department' in safe)  payload.department  = safe.department;
      if ('designation' in safe) payload.designation = safe.designation;
      if ('active' in safe)      payload.active      = safe.active;
      if ('assignable' in safe)  payload.assignable  = safe.assignable;
      if ('role' in safe) {
        const roleObj = (state.roles || []).find(r => r.name === safe.role);
        if (roleObj) payload.role_id = roleObj.id;
      }
      const backendKeys = Object.keys(payload);
      if (backendKeys.length > 0) {
        try {
          const result = await apiClient.updateUser(target.backendId, payload);
          if (!result.ok) {
            const msg = result.data?.message || result.data?.error || 'Failed to update user';
            showToast('error', 'Update failed', msg); return;
          }
        } catch (e) {
          showToast('error', 'Network error', 'Could not reach the server. Please try again.'); return;
        }
      }
    }
    // Update local state (covers both MS and demo, and assignable-only changes)
    setState(s => ({
      ...s,
      users: s.users.map(u => {
        if (u.id !== id) return u;
        const next = { ...u, ...safe };
        if ('role' in safe) next.isAdmin = wantsAdmin;
        return next;
      }),
    }));
    showToast('success', 'Staff updated', `${target.name} has been updated`);
  };
  const deleteStaff = async (id) => {
    if (!isAdmin(currentUser)) { showToast('error', 'Permission denied', 'Only Super Admin can delete staff.'); return; }
    const target = state.users.find(u => u.id === id);
    if (!target) return;
    if (id === currentUser.id) { showToast('error', 'Cannot delete yourself', 'You cannot delete your own account.'); return; }
    if (target.bootstrapAdmin) { showToast('error', 'Bootstrap admin protected', `${target.name} is a bootstrap Super Admin and cannot be deleted.`); return; }
    if (target.isAdmin && target.active !== false) {
      const remainingAdmins = state.users.filter(u => u.id !== id && u.isAdmin && u.active !== false).length;
      if (remainingAdmins < MIN_ADMINS) {
        showToast('error', 'At least 2 admins required', `Cannot delete ${target.name} — at least ${MIN_ADMINS} active Super Admins must remain. Promote another user to admin first.`);
        return;
      }
    }
    // ── Microsoft mode: persist to backend ──────────────────────
    if (authMode === 'microsoft' && target.backendId) {
      try {
        const result = await apiClient.deleteUser(target.backendId);
        if (!result.ok) {
          const msg = result.data?.message || result.data?.error || 'Failed to delete user';
          showToast('error', 'Delete failed', msg); return;
        }
      } catch (e) {
        showToast('error', 'Network error', 'Could not reach the server. Please try again.'); return;
      }
    }
    setState(s => ({
      ...s,
      users: s.users.filter(u => u.id !== id),
      tickets: s.tickets.map(t => t.assigneeId === id ? { ...t, assigneeId: null } : t),
    }));
    showToast('success', 'Staff deleted', `${target.name} has been removed`);
  };

  // ---- Scheduled Reports (admin + manager) ----
  const requireMgmt = () => {
    if (!isManager(currentUser)) { showToast('error', 'Access required', 'Only admins and managers can manage scheduled reports.'); return false; }
    return true;
  };

  // Helper: reload schedules from backend into state
  const reloadSchedules = async () => {
    if (authMode !== 'microsoft') return;
    const data = await apiClient.getSchedules().catch(() => null);
    if (data && data.schedules) setState(st => ({ ...st, schedules: data.schedules }));
  };

  // Convert frontend form shape → backend payload
  const scheduleToPayload = (data) => ({
    name: data.name,
    description: data.description || '',
    frequency: data.frequency,
    day_of_week: data.dayOfWeek || null,
    day_of_month: data.dayOfMonth || null,
    time: data.time,
    report_types: data.reportTypes || [],
    // recipientIds are frontend user IDs (may be 'ms_N' or plain number strings)
    recipient_ids: (data.recipientIds || []).map(id => {
      const u = state.users.find(u => u.id === id);
      return u && u.backendId ? u.backendId : (parseInt(id) || null);
    }).filter(Boolean),
  });

  const createSchedule = async (data) => {
    if (!requireMgmt()) return;
    if (authMode === 'microsoft') {
      try {
        const result = await apiClient.createSchedule(scheduleToPayload(data));
        if (!result.ok) { showToast('error', 'Create failed', result.data?.message || 'Failed to create schedule'); return; }
        await reloadSchedules();
        showToast('success', 'Schedule created', `"${data.name}" will run ${scheduleSummary(data)}`);
      } catch { showToast('error', 'Network error', 'Could not reach the server'); }
      return;
    }
    // Demo mode
    const s = { id: uid(), ...data, createdBy: currentUser.id, lastSentAt: null, sentCount: 0, createdAt: now() };
    setState(st => ({ ...st, schedules: [...(st.schedules || []), s] }));
    showToast('success', 'Schedule created', `"${s.name}" will run ${scheduleSummary(s)}`);
  };

  const updateSchedule = async (id, data) => {
    if (!requireMgmt()) return;
    if (authMode === 'microsoft') {
      try {
        const result = await apiClient.updateSchedule(id, scheduleToPayload(data));
        if (!result.ok) { showToast('error', 'Update failed', result.data?.message || 'Failed to update schedule'); return; }
        await reloadSchedules();
        showToast('success', 'Schedule updated', `"${data.name}" has been saved`);
      } catch { showToast('error', 'Network error', 'Could not reach the server'); }
      return;
    }
    // Demo mode
    setState(st => ({ ...st, schedules: (st.schedules || []).map(x => x.id === id ? { ...x, ...data } : x) }));
    showToast('success', 'Schedule updated', `"${data.name}" has been saved`);
  };

  const deleteSchedule = async (id) => {
    if (!requireMgmt()) return;
    if (authMode === 'microsoft') {
      try {
        const result = await apiClient.deleteSchedule(id);
        if (!result.ok) { showToast('error', 'Delete failed', result.data?.message || 'Failed to delete schedule'); return; }
        setState(st => ({ ...st, schedules: (st.schedules || []).filter(x => x.id !== id) }));
        showToast('success', 'Schedule deleted', 'The schedule has been removed');
      } catch { showToast('error', 'Network error', 'Could not reach the server'); }
      return;
    }
    // Demo mode
    setState(st => ({ ...st, schedules: (st.schedules || []).filter(x => x.id !== id) }));
    showToast('success', 'Schedule deleted', '');
  };

  const toggleScheduleActive = async (id) => {
    if (!requireMgmt()) return;
    const target = (state.schedules || []).find(x => x.id === id);
    if (!target) return;
    const newActive = !target.active;
    if (authMode === 'microsoft') {
      try {
        const result = await apiClient.updateSchedule(id, { active: newActive });
        if (!result.ok) { showToast('error', 'Update failed', result.data?.message || 'Failed to update schedule'); return; }
      } catch { showToast('error', 'Network error', 'Could not reach the server'); return; }
    }
    setState(st => ({ ...st, schedules: (st.schedules || []).map(x => x.id === id ? { ...x, active: newActive } : x) }));
  };

  const sendScheduleNow = async (s) => {
    if (!requireMgmt()) return;
    if (authMode === 'microsoft') {
      try {
        const result = await apiClient.sendScheduleNow(s.id);
        if (!result.ok) { showToast('error', 'Send failed', result.data?.message || 'Failed'); return; }
        setState(st => ({ ...st, schedules: (st.schedules || []).map(x => x.id === s.id ? { ...x, lastSentAt: now(), sentCount: (x.sentCount || 0) + 1 } : x) }));
      } catch { showToast('error', 'Network error', 'Could not reach the server'); return; }
    } else {
      setState(st => ({ ...st, schedules: (st.schedules || []).map(x => x.id === s.id ? { ...x, lastSentAt: now(), sentCount: (x.sentCount || 0) + 1 } : x) }));
    }
    s.recipientIds.forEach(rid => {
      const u = getUser(state.users, rid);
      if (u) addNotification({ recipientId: rid, channel: 'email', subject: `[Yahweh Care] ${s.name}`, body: `Your scheduled report "${s.name}" — including ${s.reportTypes.length} report type${s.reportTypes.length !== 1 ? 's' : ''} — has been sent.` });
    });
    showToast('success', 'Report sent', `"${s.name}" sent to ${s.recipientIds.length} recipient${s.recipientIds.length !== 1 ? 's' : ''}`);
  };

  // Navigation handler for breadcrumbs
  const navigateTo = (action) => {
    if (action === 'tickets') setTeamFilterIds(null);
    setView(action);
  };

  let content;
  switch (view) {
    case 'dashboard':  content = <Dashboard tickets={state.tickets} users={state.users} currentUser={currentUser} filter={filter} setFilter={setFilter} onOpenTicket={(id) => { setCurrentTicketId(id); setView('detail'); }} onMergeTickets={mergeTicketsHandler} onApprove={approveTicket} onReopen={reopenTicket} />; break;
    case 'new':        content = <NewTicket currentUser={currentUser} users={state.users} onCreate={createTicket} onCancel={() => setView('dashboard')} />; break;
    case 'tickets': {
      // Non-admins only see tickets they raised or are assigned to
      const _isAdmin = isAdmin(currentUser);
      const _matchU = state.users.find(u =>
        (u.email && currentUser.email && u.email.toLowerCase() === currentUser.email.toLowerCase()) ||
        (u.name && currentUser.name && u.name === currentUser.name) ||
        u.id === currentUser.id || u.id === currentUser.backendId
      );
      const _uid = _matchU?.id || currentUser.backendId || currentUser.id;
      const _visibleTickets = _isAdmin
        ? state.tickets
        : state.tickets.filter(t =>
            t.requesterId === _uid || t.assigneeId === _uid ||
            (currentUser.backendId && (t.requesterId === currentUser.backendId || t.assigneeId === currentUser.backendId))
          );
      content = <TicketsList tickets={_visibleTickets} users={state.users} currentUser={currentUser} onOpen={(id) => { setCurrentTicketId(id); setView('detail'); }} onAssign={(t) => setAssignModal({ open: true, ticket: t })} onDelete={(t) => setDeleteModal({ open: true, ticket: t })} onNew={() => setView('new')} teamFilterIds={teamFilterIds} onClearTeamFilter={() => setTeamFilterIds(null)} onNavigate={navigateTo} />;
      break;
    }
    case 'detail':     content = <TicketDetail ticketId={currentTicketId} tickets={state.tickets} users={state.users} currentUser={currentUser} onUpdate={updateTicket} onAddComment={addComment} onAssign={(t) => setAssignModal({ open: true, ticket: t })} onDelete={(t) => setDeleteModal({ open: true, ticket: t })} onMarkComplete={markComplete} onApprove={approveTicket} onReopen={reopenTicket} onBack={() => setView('tickets')} />; break;
    case 'calendar':   content = <CalendarView tickets={state.tickets} onOpen={(id) => { setCurrentTicketId(id); setView('detail'); }} onNavigate={navigateTo} />; break;
    case 'analytics':  content = isAdmin(currentUser) ? <AnalyticsDashboard tickets={state.tickets} users={state.users} currentUser={currentUser} onOpenTicket={(id) => { setCurrentTicketId(id); setView('detail'); }} onNavigate={navigateTo} /> : <AccessDenied />; break;
    case 'org-chart':  content = isManager(currentUser) ? <OrgChart currentUser={currentUser} onNavigate={navigateTo} /> : <AccessDenied />; break;
    case 'logs':       content = isManager(currentUser) ? <TicketLogs tickets={state.tickets} users={state.users} onOpen={(id) => { setCurrentTicketId(id); setView('detail'); }} onNavigate={navigateTo} /> : <AccessDenied />; break;
    case 'staff-perf': content = isManager(currentUser) ? <StaffPerformance tickets={state.tickets} users={state.users} currentUser={currentUser} onOpen={(id) => { setCurrentTicketId(id); setView('detail'); }} onOpenStaff={(id) => { setCurrentStaffId(id); setView('staff-detail'); }} onNavigate={navigateTo} /> : <AccessDenied />; break;
    case 'staff-detail': content = isManager(currentUser) ? <StaffDetail staffId={currentStaffId} tickets={state.tickets} users={state.users} currentUser={currentUser} onBack={() => setView('staff-perf')} onOpenTicket={(id) => { setCurrentTicketId(id); setView('detail'); }} onNavigate={navigateTo} /> : <AccessDenied />; break;
    case 'team-comp':  content = isManager(currentUser) ? <TeamComparison tickets={state.tickets} users={state.users} currentUser={currentUser} onOpenStaff={(id) => { setCurrentStaffId(id); setView('staff-detail'); }} onViewTeamTickets={(memberIds) => { setTeamFilterIds(memberIds); setView('tickets'); }} onNavigate={navigateTo} /> : <AccessDenied />; break;
    case 'staff':      content = isManager(currentUser) ? <StaffManagement users={state.users} tickets={state.tickets} currentUser={currentUser} onAddStaff={addStaff} onUpdateStaff={updateStaff} onDeleteStaff={deleteStaff} onNavigate={navigateTo} /> : <AccessDenied />; break;
    case 'reports':    content = isManager(currentUser) ? <ScheduledReports schedules={state.schedules || []} users={state.users} currentUser={currentUser} onCreate={createSchedule} onUpdate={updateSchedule} onDelete={deleteSchedule} onSendNow={sendScheduleNow} onToggleActive={toggleScheduleActive} /> : <AccessDenied />; break;
    default:           content = <Dashboard tickets={state.tickets} users={state.users} currentUser={currentUser} filter={filter} setFilter={setFilter} onOpenTicket={(id) => { setCurrentTicketId(id); setView('detail'); }} onMergeTickets={mergeTicketsHandler} />;
  }

  return (
    <div className="flex h-screen brand-gradient-soft">
      <Sidebar view={view} setView={(v) => { if (v === 'tickets') setTeamFilterIds(null); setView(v); }} currentUser={currentUser} onLogout={handleLogout} mobileOpen={mobileNavOpen} onCloseMobile={() => setMobileNavOpen(false)} openTicketCount={openTicketCount} sidebarCollapsed={sidebarCollapsed} theme={theme} onToggleTheme={toggleTheme} />
      <div className="flex-1 flex flex-col overflow-hidden">
        <TopBar currentUser={currentUser} onClose={handleLogout} onOpenMobileMenu={() => setMobileNavOpen(true)} notifications={state.notifications || []} onMarkAllRead={markAllNotifsRead} theme={theme} onToggleTheme={toggleTheme} onToggleSidebar={toggleSidebar} sidebarCollapsed={sidebarCollapsed} />
        {/* key=view triggers remount → view-enter animation fires on every page switch */}
        <div key={view} className="view-enter flex flex-col flex-1 overflow-hidden">{content}</div>
      </div>
      <AssignModal open={assignModal.open} ticket={assignModal.ticket} users={state.users} currentUser={currentUser} onClose={() => setAssignModal({ open: false, ticket: null })} onAssign={assignTicket} />
      <DeleteModal open={deleteModal.open} ticket={deleteModal.ticket} onClose={() => setDeleteModal({ open: false, ticket: null })} onDelete={deleteTicket} />
      <Toast toast={toast} onClose={() => setToast(null)} />
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>

<noscript>
  <div style="padding: 40px; text-align: center; font-family: system-ui;">
    <h1>JavaScript Required</h1>
    <p>Please enable JavaScript to view this application.</p>
  </div>
</noscript>

<div id="yc-loader" role="status" aria-label="Loading">
  <div class="yc-loader-ring">
    <div class="yc-loader-glow"></div>
  </div>
  <div class="yc-loader-text">Yahweh Care</div>
</div>
<div id="yc-cursor-glow" aria-hidden="true"></div>

<script>
(function() {
  'use strict';

  /* ── 1. LOADER ──────────────────────────────────────────────── */
  var loader = document.getElementById('yc-loader');
  function hideLoader() {
    if (!loader) return;
    loader.classList.add('hidden');
    setTimeout(function() { loader.classList.add('gone'); }, 520);
  }
  // Hide after React mounts (poll for #root having children)
  var loaderCheck = setInterval(function() {
    var root = document.getElementById('root');
    if (root && root.children.length > 0) {
      clearInterval(loaderCheck);
      setTimeout(hideLoader, 320);
    }
  }, 80);
  // Fallback: hide after 4s regardless
  setTimeout(hideLoader, 4000);

  /* ── 2. CURSOR GLOW ─────────────────────────────────────────── */
  var glow = document.getElementById('yc-cursor-glow');
  var glowX = 0, glowY = 0, curX = 0, curY = 0;
  var glowRaf;
  document.addEventListener('mousemove', function(e) {
    curX = e.clientX; curY = e.clientY;
    if (!glowRaf) {
      glowRaf = requestAnimationFrame(function lerpGlow() {
        glowX += (curX - glowX) * 0.10;
        glowY += (curY - glowY) * 0.10;
        if (glow) glow.style.transform = 'translate(' + (glowX - 200) + 'px,' + (glowY - 200) + 'px)';
        glowRaf = requestAnimationFrame(lerpGlow);
      });
    }
  });

  /* ── 3. RIPPLE removed ──────────────────────────────────────── */

  /* ── 4. MAGNETIC BUTTON — removed (caused alignment/selection issues) */
  /* Pure CSS hover lift in brand-gradient:hover handles the effect safely */

  /* ── 5. ANIMATED BACKGROUND ORBS ───────────────────────────── */
  var ORB_CFG = [
    { w:420, h:380, color:'rgba(126,184,66,0.14)', darkColor:'rgba(126,184,66,0.10)', sx:8,  sy:15, dx: 80, dy:-60, scale:1.15, dur:22 },
    { w:320, h:320, color:'rgba(80,180,255,0.10)',  darkColor:'rgba(80,180,255,0.07)', sx:72, sy:60, dx:-70, dy: 90, scale:0.90, dur:28 },
    { w:280, h:260, color:'rgba(126,184,66,0.10)',  darkColor:'rgba(126,184,66,0.08)', sx:85, sy:20, dx:-40, dy: 50, scale:1.10, dur:18 },
    { w:360, h:300, color:'rgba(160,220,255,0.09)', darkColor:'rgba(60,100,200,0.08)', sx:20, sy:78, dx: 60, dy:-80, scale:1.05, dur:32 },
    { w:240, h:240, color:'rgba(126,184,66,0.08)',  darkColor:'rgba(176,228,85,0.07)', sx:60, sy:45, dx: 30, dy: 40, scale:0.85, dur:24 },
  ];
  var isDark = document.documentElement.classList.contains('dark');
  ORB_CFG.forEach(function(cfg, i) {
    var orb = document.createElement('div');
    orb.className = 'yc-orb';
    orb.setAttribute('aria-hidden', 'true');
    orb.style.cssText = [
      'width:'  + cfg.w + 'px',
      'height:' + cfg.h + 'px',
      'left:'   + cfg.sx + 'vw',
      'top:'    + cfg.sy + 'vh',
      'background:' + (isDark ? cfg.darkColor : cfg.color),
      '--orb-dx:' + cfg.dx + 'px',
      '--orb-dy:' + cfg.dy + 'px',
      '--orb-scale:' + cfg.scale,
      'animation-duration:' + cfg.dur + 's',
      'animation-delay:' + (i * -4.5) + 's',
    ].join(';');
    document.body.appendChild(orb);
  });

  // Update orb colors when dark mode toggles
  var observer = new MutationObserver(function() {
    var dark = document.documentElement.classList.contains('dark');
    var orbs = document.querySelectorAll('.yc-orb');
    orbs.forEach(function(orb, i) {
      var cfg = ORB_CFG[i];
      if (cfg) orb.style.background = dark ? cfg.darkColor : cfg.color;
    });
  });
  observer.observe(document.documentElement, { attributes: true, attributeFilter: ['class'] });

  /* ── 6. INTERSECTION OBSERVER — scroll reveal ───────────────── */
  function initReveal() {
    var cards = document.querySelectorAll('.card:not(.yc-obs)');
    cards.forEach(function(el) {
      el.classList.add('yc-obs');
      el.classList.add('yc-reveal');
    });
    var io = new IntersectionObserver(function(entries) {
      entries.forEach(function(entry) {
        if (entry.isIntersecting) {
          entry.target.classList.add('visible');
          io.unobserve(entry.target);
        }
      });
    }, { threshold: 0.08, rootMargin: '0px 0px -30px 0px' });
    document.querySelectorAll('.yc-reveal:not(.visible)').forEach(function(el) {
      io.observe(el);
    });
  }
  // Run after React paints
  setTimeout(initReveal, 900);
  setInterval(initReveal, 3000);

  /* ── 7. ANIMATED STAT COUNTERS ──────────────────────────────── */
  function animateCounter(el, target, duration) {
    var start = 0, startTime = null;
    function step(ts) {
      if (!startTime) startTime = ts;
      var progress = Math.min((ts - startTime) / duration, 1);
      var eased = 1 - Math.pow(1 - progress, 3); // ease-out-cubic
      var current = Math.floor(eased * target);
      el.textContent = current.toLocaleString();
      if (progress < 1) requestAnimationFrame(step);
      else el.textContent = target.toLocaleString();
    }
    requestAnimationFrame(step);
  }
  // Observe stat value elements and animate on first visibility
  function initCounters() {
    document.querySelectorAll('.text-3xl.font-bold:not(.yc-counted), .text-4xl.font-bold:not(.yc-counted)').forEach(function(el) {
      var text = el.textContent.trim();
      var num = parseFloat(text.replace(/[^0-9.]/g, ''));
      if (isNaN(num) || num < 2) return;
      el.classList.add('yc-counted');
      var io2 = new IntersectionObserver(function(entries) {
        if (entries[0].isIntersecting) {
          animateCounter(el, Math.round(num), 900);
          io2.disconnect();
        }
      }, { threshold: 0.5 });
      io2.observe(el);
    });
  }
  setTimeout(initCounters, 1200);
  setInterval(initCounters, 4000);

  /* ── 8. SMOOTH PAGE TRANSITIONS (view changes) ──────────────── */
  // React view swaps — add a brief fade on the main content area
  var lastView = null;
  setInterval(function() {
    var main = document.querySelector('main, .flex-1.overflow-y-auto');
    if (!main) return;
    var view = main.getAttribute('data-view') || main.firstElementChild && main.firstElementChild.className;
    if (view !== lastView) {
      lastView = view;
      main.style.transition = 'opacity 0.22s ease';
      main.style.opacity = '0';
      setTimeout(function() { main.style.opacity = '1'; }, 80);
    }
  }, 200);

})();
</script>

</body>
</html>
