  const [sortBy, setSortBy] = useState('createdAt');
  const [sortDir, setSortDir] = useState('desc');
  // Skeleton: show shimmer rows for 400ms on first render, feels snappy
  const [skelDone, setSkelDone] = useState(false);
  useEffect(() => { const t = setTimeout(() => setSkelDone(true), 400); return () => clearTimeout(t); }, []);
  // Debounce search so we don't re-filter on every keystroke
  const debouncedSearch = useDebounce(search, 220);

  const toggleSort = (col) => {
    if (sortBy === col) setSortDir(d => d === 'asc' ? 'desc' : 'asc');
    else { setSortBy(col); setSortDir('asc'); }
  };
  const SortIcon = ({ col }) => (
    <span className={`sort-arrow ml-0.5 ${sortBy === col ? 'text-emerald-500 opacity-100' : ''}`}>
      {sortBy === col ? (sortDir === 'asc' ? '↑' : '↓') : '↕'}
    </span>
  );
  const breadcrumbs = [
    { label: 'Dashboard', clickable: true, action: 'dashboard', icon: 'dashboard' },
    { label: 'Tickets', clickable: false },
  ];

  // ── Resolve the correct user ID for ticket ownership checks ──────────────
  // Microsoft SSO users get id='ms_xxx' but tickets store demo IDs (u1, u2…).
  // Match by email or name first, fall back to raw id.
  const matchingUser = users.find(u =>
    (u.email && currentUser.email && u.email.toLowerCase() === currentUser.email.toLowerCase()) ||
    (u.name  && currentUser.name  && u.name === currentUser.name) ||
    u.id === currentUser.id ||
    u.id === currentUser.backendId
  );
  const effectiveUserId = matchingUser?.id || currentUser.backendId || currentUser.id;
  // Helper — true if this ticket was issued by or assigned to the current user
  const isMyTicket = (t) =>
    t.requesterId === effectiveUserId || t.assigneeId === effectiveUserId ||
    (currentUser.backendId && (t.requesterId === currentUser.backendId || t.assigneeId === currentUser.backendId));

  const tabbed = useMemo(() => {
    let list = tickets;
    if (teamFilterIds && teamFilterIds.length > 0) list = list.filter(t => teamFilterIds.includes(t.assigneeId));
    if (tab === 'mine')     list = list.filter(t => isMyTicket(t));
    else if (tab === 'issued')   list = list.filter(t => t.requesterId === effectiveUserId || (currentUser.backendId && t.requesterId === currentUser.backendId));
    else if (tab === 'assigned') list = list.filter(t => t.assigneeId === effectiveUserId || (currentUser.backendId && t.assigneeId === currentUser.backendId));
    return list;
  }, [tickets, tab, effectiveUserId, teamFilterIds]);

  const filtered = useMemo(() => {
    const PRIORITY_ORDER = { urgent: 0, high: 1, medium: 2, low: 3 };
    const STATUS_ORDER = { open: 0, in_progress: 1, escalated: 2, pending_approval: 3, resolved: 4, closed: 5 };
    return tabbed.filter(t => {
      if (filters.status !== 'all' && t.status !== filters.status) return false;
      if (filters.category !== 'all' && t.category !== filters.category) return false;
      if (filters.priority !== 'all' && t.priority !== filters.priority) return false;
      if (debouncedSearch.trim()) {
        const q = debouncedSearch.toLowerCase();
        if (!t.title.toLowerCase().includes(q) && !(t.ticketNumber || '').toLowerCase().includes(q) && !(t.description || '').toLowerCase().includes(q)) return false;
      }
      return true;
    }).sort((a, b) => {
      let cmp = 0;
      if (sortBy === 'title')    cmp = (a.titleType || a.title).localeCompare(b.titleType || b.title);
      else if (sortBy === 'priority') cmp = (PRIORITY_ORDER[a.priority] ?? 99) - (PRIORITY_ORDER[b.priority] ?? 99);
      else if (sortBy === 'status')   cmp = (STATUS_ORDER[a.status] ?? 99) - (STATUS_ORDER[b.status] ?? 99);
      else cmp = new Date(a.createdAt) - new Date(b.createdAt);
      return sortDir === 'asc' ? cmp : -cmp;
    });
  }, [tabbed, filters, debouncedSearch, sortBy, sortDir]);

  const tabCount = (t) => {
    if (t === 'all')      return tickets.length;
    if (t === 'mine')     return tickets.filter(x => isMyTicket(x)).length;
    if (t === 'issued')   return tickets.filter(x => x.requesterId === effectiveUserId || (currentUser.backendId && x.requesterId === currentUser.backendId)).length;
    if (t === 'assigned') return tickets.filter(x => x.assigneeId === effectiveUserId  || (currentUser.backendId && x.assigneeId === currentUser.backendId)).length;
    return 0;
  };
  const myOpenCount = tickets.filter(t => isMyTicket(t) && !['resolved','closed'].includes(t.status)).length;

  return (
    <>
      <Breadcrumb items={breadcrumbs} onNavigate={onNavigate} />
      <div className="p-6 flex-1 overflow-y-auto scrollbar-thin" onClick={() => setMenuOpen(null)}>
      <div className="flex items-end justify-between mb-5">
        <div>
          <p className="text-[10px] font-black text-slate-400 uppercase tracking-[0.15em] mb-1">Support Centre</p>
          <div className="flex items-center gap-3">
            <h1 className="text-3xl font-black text-slate-900 tracking-tight">Tickets</h1>
            {admin && <span className="inline-flex items-center px-2 py-0.5 rounded-lg bg-violet-100 text-violet-700 text-[10px] font-black tracking-wide">ADMIN</span>}
            <span className="inline-flex items-center gap-1.5 px-2.5 py-1 rounded-full bg-emerald-50 text-emerald-700 text-xs font-semibold border border-emerald-200">
              <span className="live-dot"></span>{myOpenCount} active
            </span>
          </div>
          <p className="text-sm text-slate-500 mt-1">Manage and track all support tickets</p>
        </div>
        <Button variant="primary" onClick={onNew}><Icon name="plus" className="w-4 h-4" /> Create Ticket</Button>
      </div>

      {/* Team filter banner */}
      {teamFilterIds && teamFilterIds.length > 0 && (
        <div className="card p-3 mb-4 bg-blue-50 border-blue-200 flex items-center justify-between">
          <div className="flex items-center gap-2 text-sm text-blue-800">
            <Icon name="branch" className="w-4 h-4" />
            <span>Filtered to tickets assigned to <strong>{teamFilterIds.length} team member{teamFilterIds.length !== 1 ? 's' : ''}</strong></span>
          </div>
          <button onClick={onClearTeamFilter} className="text-xs text-blue-700 hover:text-blue-900 font-medium underline">Clear filter</button>
        </div>
      )}

      {/* Tabs */}
      <div className="flex gap-2 mb-5 p-1 bg-slate-100 rounded-2xl w-fit">
        {[
          { id: admin ? 'all' : 'mine', label: admin ? 'All Tickets' : 'All My Tickets', icon: 'dashboard' },
          { id: 'issued',   label: 'Issued by Me',   icon: 'send' },
          { id: 'assigned', label: 'Assigned to Me', icon: 'userPlus' },
        ].map(tb => (
          <button key={tb.id} onClick={() => setTab(tb.id)}
            className={`flex items-center gap-2 px-4 py-2 rounded-xl text-sm font-semibold transition-all ${
              tab === tb.id ? 'brand-gradient text-white shadow-md' : 'text-slate-500 hover:text-slate-800'
            }`}>
            <Icon name={tb.icon} className="w-4 h-4" />
            {tb.label}
            <span className={`text-[11px] font-black px-1.5 py-0.5 rounded-md ${tab === tb.id ? 'bg-white/25 text-white' : 'bg-slate-200 text-slate-600'}`}>{tabCount(tb.id)}</span>
          </button>
        ))}
      </div>

      {/* Search and filters */}
      <div className="card p-4 mb-4">
        <div className="relative mb-3">
          <Icon name="search" className="w-4 h-4 absolute left-3 top-3 text-slate-400" />
          <input value={search} onChange={e => setSearch(e.target.value)} placeholder="Search tickets..." className="w-full pl-10 pr-10 py-2.5 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-emerald-500/30 text-sm" />
          {/* Debounce indicator: tiny spinner while user is still typing */}
          {search !== debouncedSearch && (
            <div className="absolute right-3 top-3" title="Searching...">
              <span className="btn-spinner btn-spinner-dark" style={{width:'14px',height:'14px',borderWidth:'1.5px'}}></span>
            </div>
          )}
          {search && search === debouncedSearch && (
            <button onClick={() => setSearch('')} className="absolute right-3 top-3 text-slate-400 hover:text-slate-600 transition-colors">
              <Icon name="x" className="w-4 h-4" />
            </button>
          )}
        </div>
        <div className="flex flex-wrap gap-2 items-center">
          <ThemedDropdown
            value={filters.status}
            onChange={v => setFilters({...filters, status: v})}
            placeholder="All Status"
            minWidth={148}
            options={STATUSES.map(s => ({ id: s.id, label: s.label, dot: s.color }))}
          />
          <ThemedDropdown
            value={filters.category}
            onChange={v => setFilters({...filters, category: v})}
            placeholder="All Categories"
            minWidth={160}
            options={CATEGORIES.map(c => ({ id: c.id, label: c.label, dot: c.color }))}
          />
          <ThemedDropdown
            value={filters.priority}
            onChange={v => setFilters({...filters, priority: v})}
            placeholder="All Priorities"
            minWidth={148}
            options={[
              { id: 'urgent', label: 'Urgent', dot: '#ef4444' },
              { id: 'high',   label: 'High',   dot: '#f97316' },
              { id: 'medium', label: 'Medium', dot: '#eab308' },
              { id: 'low',    label: 'Low',    dot: '#06b6d4' },
            ]}
          />
          {/* Reset all filters button — visible when any filter is active */}
          {(filters.status !== 'all' || filters.category !== 'all' || filters.priority !== 'all' || search) && (
            <button onClick={() => { setFilters({ status:'all', category:'all', priority:'all' }); setSearch(''); }}
              className="px-3 py-2 rounded-lg text-xs font-bold text-slate-500 hover:text-red-600 hover:bg-red-50 border border-slate-200 transition-all">
              ✕ Clear all
            </button>
          )}
        </div>

        {/* Active filter chips */}
        {(filters.status !== 'all' || filters.category !== 'all' || filters.priority !== 'all') && (
          <div className="flex flex-wrap gap-1.5 mt-3 pt-3 border-t border-slate-100">
            <span className="text-[10px] text-slate-400 font-bold uppercase tracking-wider self-center mr-1">Active:</span>
            {filters.status !== 'all' && (
              <span className="filter-chip" onClick={() => setFilters({...filters, status:'all'})}>
                Status: {STATUSES.find(s=>s.id===filters.status)?.label} ×
              </span>
            )}
            {filters.category !== 'all' && (
              <span className="filter-chip" onClick={() => setFilters({...filters, category:'all'})}>
                Category: {CATEGORIES.find(c=>c.id===filters.category)?.label} ×
              </span>
            )}
            {filters.priority !== 'all' && (
              <span className="filter-chip" onClick={() => setFilters({...filters, priority:'all'})}>
                Priority: {PRIORITIES.find(p=>p.id===filters.priority)?.label} ×
              </span>
            )}
          </div>
        )}
      </div>

      {/* Results count bar */}
      <div className="flex items-center justify-between mb-2 px-1">
        <p className="results-bar">
          Showing <strong>{filtered.length}</strong> of <strong>{tickets.length}</strong> tickets
          {debouncedSearch && <span> matching "<em>{debouncedSearch}</em>"</span>}
        </p>
        {filtered.length > 0 && (
          <p className="results-bar text-[10px]">
            Sort: <button className={`font-bold transition-colors ${sortBy==='createdAt'?'text-emerald-500':''}`} onClick={()=>toggleSort('createdAt')}>Date</button>
            {' · '}<button className={`font-bold transition-colors ${sortBy==='priority'?'text-emerald-500':''}`} onClick={()=>toggleSort('priority')}>Priority</button>
            {' · '}<button className={`font-bold transition-colors ${sortBy==='status'?'text-emerald-500':''}`} onClick={()=>toggleSort('status')}>Status</button>
            {' '}<span className="opacity-60">{sortDir==='asc'?'↑':'↓'}</span>
          </p>
        )}
      </div>

      {/* Table */}
      <div className="card yc-ticket-table-wrap overflow-x-auto -webkit-overflow-scrolling-touch">
        <table className="w-full text-sm" style={{minWidth:'900px'}}>
          <thead className="yc-table-head border-b border-slate-100">
            <tr>
              <th className="text-left px-4 py-3 text-[10px] font-black text-slate-400 uppercase tracking-widest whitespace-nowrap" style={{width:'160px'}}>Ticket ID</th>
              <th className="text-left px-4 py-3 text-[10px] font-black text-slate-400 uppercase tracking-widest cursor-pointer hover:text-emerald-500 transition-colors" onClick={() => toggleSort('title')}>
                <span className="sort-btn">Title <SortIcon col="title" /></span>
              </th>
              <th className="text-left px-4 py-3 text-[10px] font-black text-slate-400 uppercase tracking-widest whitespace-nowrap">Category</th>
              <th className="text-left px-4 py-3 text-[10px] font-black text-slate-400 uppercase tracking-widest cursor-pointer hover:text-emerald-500 transition-colors" onClick={() => toggleSort('priority')}>
                <span className="sort-btn">Priority <SortIcon col="priority" /></span>
              </th>
              <th className="text-left px-4 py-3 text-[10px] font-black text-slate-400 uppercase tracking-widest cursor-pointer hover:text-emerald-500 transition-colors" onClick={() => toggleSort('status')}>
                <span className="sort-btn">Status <SortIcon col="status" /></span>
              </th>
              <th className="text-left px-4 py-3 text-[10px] font-black text-slate-400 uppercase tracking-widest whitespace-nowrap">SLA</th>
              <th className="text-left px-4 py-3 text-[10px] font-black text-slate-400 uppercase tracking-widest whitespace-nowrap">Assigned To</th>
              <th className="text-left px-4 py-3 text-[10px] font-black text-slate-400 uppercase tracking-widest whitespace-nowrap cursor-pointer hover:text-emerald-500 transition-colors" onClick={() => toggleSort('createdAt')}>
                <span className="sort-btn">Created <SortIcon col="createdAt" /></span>
              </th>
              <th className="w-12"></th>
            </tr>
          </thead>
          <tbody>
            {!skelDone ? (
              // Skeleton shimmer rows — shown for 400ms while JS settles
              Array.from({length: 6}).map((_, i) => (
                <tr key={`skel-${i}`} className="border-b border-slate-100">
                  <td className="px-4 py-3.5"><div className="skeleton-cell" style={{height:'22px',width:'120px'}}></div></td>
                  <td className="px-4 py-3.5">
                    <div className="skeleton-cell mb-1.5" style={{height:'14px',width:'200px'}}></div>
                    <div className="skeleton-cell" style={{height:'11px',width:'130px'}}></div>
                  </td>
                  <td className="px-4 py-3.5"><div className="skeleton-cell" style={{height:'22px',width:'80px'}}></div></td>
                  <td className="px-4 py-3.5"><div className="skeleton-cell" style={{height:'22px',width:'60px'}}></div></td>
                  <td className="px-4 py-3.5"><div className="skeleton-cell" style={{height:'28px',width:'100px'}}></div></td>
                  <td className="px-4 py-3.5"><div className="skeleton-cell" style={{height:'14px',width:'90px'}}></div></td>
                  <td className="px-4 py-3.5"><div className="skeleton-cell" style={{height:'14px',width:'65px'}}></div></td>
                  <td></td>
                </tr>
              ))
            ) : filtered.length === 0 ? (
              <tr>
                <td colSpan="9" className="px-4 py-16 text-center">
                  <div className="empty-state-ring">
                    <Icon name="search" className="w-8 h-8 text-emerald-400" />
                  </div>
                  <p className="font-bold text-slate-700 mb-1">No tickets found</p>
                  <p className="text-sm text-slate-400 mb-4">
                    {debouncedSearch ? `No results for "${debouncedSearch}"` : 'Try adjusting your filters or create a new ticket'}
                  </p>
                  {(filters.status !== 'all' || filters.category !== 'all' || filters.priority !== 'all' || search) && (
                    <button onClick={() => { setFilters({status:'all',category:'all',priority:'all'}); setSearch(''); }}
                      className="px-4 py-2 rounded-lg text-sm font-semibold text-emerald-600 border border-emerald-200 hover:bg-emerald-50 transition-all">
                      Clear filters
                    </button>
                  )}
                </td>
              </tr>
            ) : filtered.map(t => {
              const requester = getUser(users, t.requesterId);
              const assignee = getUser(users, t.assigneeId);
              const cat = getCategory(t.category);
              const pri = getPriority(t.priority);
              const stat = getStatus(t.status);
              const sla = computeSLA(t);
              const priColorClass = { urgent:'pri-urgent', high:'pri-high', medium:'pri-medium', low:'pri-low' }[t.priority] || '';
              // SLA badge label + css class
              const slaInfo = (() => {
                if (sla.state === 'na') return null;
                if (sla.state === 'met') return { label: '✓ Met', cls: 'sla-met' };
                if (sla.state === 'breached') return { label: '⚠ Breached', cls: 'sla-breached' };
                if (sla.state === 'warning') {
                  const h = Math.floor(sla.remainingMs / 3600000);
                  const m = Math.floor((sla.remainingMs % 3600000) / 60000);
                  return { label: h > 0 ? `${h}h ${m}m` : `${m}m`, cls: 'sla-warning' };
                }
                const h = Math.floor(sla.remainingMs / 3600000);
                return { label: h > 0 ? `${h}h left` : '<1h', cls: 'sla-ok' };
              })();
              return (
                <tr key={t.id} className={`yc-ticket-row border-b border-slate-100 group relative ${priColorClass}`}>
                  <td className="px-4 py-3 whitespace-nowrap" style={{width:'160px'}}>
                    <button onClick={() => onOpen(t.id)} className="yc-ticket-id inline-flex items-center gap-1.5 px-2.5 py-1 rounded-lg font-mono text-xs font-bold whitespace-nowrap transition-all">
                      <span className="yc-ticket-id-dot w-1.5 h-1.5 rounded-full flex-shrink-0"></span>
                      {t.ticketNumber || `#${t.id.slice(-6).toUpperCase()}`}
                    </button>
                  </td>
                  <td className="px-4 py-3 max-w-xs"><div className="font-semibold text-slate-800 leading-snug">{t.titleType || t.title}</div><div className="text-xs text-slate-400 truncate mt-0.5">{t.title !== (t.titleType || t.title) ? t.title : t.description}</div></td>
                  <td className="px-4 py-3 whitespace-nowrap"><Badge className="border border-slate-200 bg-white text-slate-600 text-xs">{cat.label}</Badge></td>
                  <td className="px-4 py-3 whitespace-nowrap"><Badge className={`${pri.chip} border text-xs`}>{pri.label}</Badge></td>
                  <td className="px-4 py-3">
                    {(() => {
                      const isClosed = ['resolved', 'closed'].includes(t.status);
                      const isSuperAdmin = currentUser.role === 'super_admin' || currentUser.isAdmin;
                      const canChangeStatus = !isClosed || isSuperAdmin;
                      return (
                        <select
                          value={t.status}
                          onChange={e => { e.stopPropagation(); if (canChangeStatus) onOpen(t.id, e.target.value); }}
                          onClick={e => e.stopPropagation()}
                          disabled={!canChangeStatus}
                          title={!canChangeStatus ? 'Only Super Admins can change status of closed tickets' : ''}
                          className={`px-2.5 py-1 rounded-md border text-xs font-medium ${stat.colorBg} ${stat.colorText} ${stat.border} ${canChangeStatus ? 'cursor-pointer' : 'opacity-50 cursor-not-allowed bg-slate-50'}`}
                        >
                          {STATUSES.map(s => <option key={s.id} value={s.id}>{s.label}</option>)}
                        </select>
                      );
                    })()}
                  </td>
                  <td className="px-4 py-3 whitespace-nowrap">
                    {slaInfo ? (
                      <span className={`inline-flex items-center px-2 py-0.5 rounded-md text-[10px] font-bold ${slaInfo.cls}`}>{slaInfo.label}</span>
                    ) : <span className="text-slate-300 text-xs">—</span>}
                  </td>
                  <td className="px-4 py-3 whitespace-nowrap text-slate-600 text-sm">{assignee ? assignee.name : <span className="text-slate-400 italic text-xs">Unassigned</span>}</td>
                  <td className="px-4 py-3 whitespace-nowrap text-slate-400 text-xs tabular-nums">{fmtShortDate(t.createdAt)}</td>
                  <td className="px-4 py-3 relative">
                    <button onClick={e => { e.stopPropagation(); setMenuOpen(menuOpen === t.id ? null : t.id); }} className="row-hover-actions p-1.5 rounded hover:bg-emerald-100 text-emerald-600">
                      <Icon name="moreV" className="w-5 h-5" />
                    </button>
                    {menuOpen === t.id && (
                      <div onClick={e => e.stopPropagation()} className="absolute right-4 top-12 w-44 bg-white border border-slate-200 rounded-lg shadow-xl z-30 fade-in py-1">
                        <button onClick={() => { onOpen(t.id); setMenuOpen(null); }} className="w-full flex items-center gap-2 px-3 py-2 text-sm text-slate-700 hover:bg-slate-50 text-left"><Icon name="eye" className="w-4 h-4" /> View Details</button>
                        <button onClick={() => { onAssign(t); setMenuOpen(null); }} className="w-full flex items-center gap-2 px-3 py-2 text-sm text-slate-700 hover:bg-slate-50 text-left"><Icon name="userPlus" className="w-4 h-4" /> Assign</button>
                        {admin && <button onClick={() => { onDelete(t); setMenuOpen(null); }} className="w-full flex items-center gap-2 px-3 py-2 text-sm text-red-600 hover:bg-red-50 text-left"><Icon name="trash" className="w-4 h-4" /> Delete (Admin)</button>}
                      </div>
                    )}
                  </td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>
      </div>
    </>
  );
};

// ============================================================
// TICKET DETAIL
// ============================================================
const TicketDetail = ({ ticketId, tickets, users, currentUser, onUpdate, onAddComment, onAssign, onDelete, onMarkComplete, onApprove, onReopen, onBack }) => {
  const ticket = tickets.find(t => t.id === ticketId);
  const [comment, setComment] = useState('');
  const [reopenOpen, setReopenOpen] = useState(false);
  const [reopenFeedback, setReopenFeedback] = useState('');
  const [activeTab, setActiveTab] = useState('comments');

  if (!ticket) return <div className="p-6">Ticket not found</div>;
  const requester = getUser(users, ticket.requesterId);
  const assignee = getUser(users, ticket.assigneeId);
  const stat = getStatus(ticket.status);
  const pri = getPriority(ticket.priority);
  const admin = isAdmin(currentUser);
  // Resolve effective user ID — handles Microsoft SSO where currentUser.id = 'ms_xxx'
  // but tickets store demo IDs (u1, u2…) or backend UUIDs
  const _matchedUser = users.find(u =>
    (u.email && currentUser.email && u.email.toLowerCase() === currentUser.email.toLowerCase()) ||
    (u.name && currentUser.name && u.name === currentUser.name) ||
    u.id === currentUser.id || u.id === currentUser.backendId
  );
  const _effId = _matchedUser?.id || currentUser.backendId || currentUser.id;
  const isRequester = ticket.requesterId === _effId || (currentUser.backendId && ticket.requesterId === currentUser.backendId);
  const isAssignee  = ticket.assigneeId  === _effId || (currentUser.backendId && ticket.assigneeId  === currentUser.backendId);
  const canMarkComplete = isAssignee && !['resolved', 'closed', 'pending_approval'].includes(ticket.status);
  const canApproveReopen = isRequester && ticket.status === 'pending_approval';


  return (
    <div className="p-8 flex-1 overflow-y-auto scrollbar-thin">
      <div className="max-w-7xl mx-auto">
        {/* Header */}
        <div className="flex items-start gap-3 mb-3">
          <button onClick={onBack} className="p-1.5 rounded-lg hover:bg-slate-100 text-slate-500 mt-1"><Icon name="arrowLeft" className="w-6 h-6" /></button>
          <div>
            <h1 className="text-3xl font-bold text-blue-600 font-mono">{ticket.ticketNumber || `#${ticket.id.slice(-6).toUpperCase()}`}</h1>
            <p className="text-sm text-slate-500 mt-1">Created {fmtRelative(ticket.createdAt)}</p>
          </div>
        </div>

        {/* Action toolbar */}
        <div className="flex flex-wrap items-center gap-2 mb-4">
          <Button variant="secondary" size="sm"><Icon name="edit" className="w-4 h-4" /> Edit</Button>
          <Button variant="secondary" size="sm"><Icon name="cal2" className="w-4 h-4" /> Request Date Change</Button>
          <Button variant="secondary" size="sm"><Icon name="branch" className="w-4 h-4" /> Merge Duplicates</Button>
          {admin && <Button variant="danger" size="sm" onClick={() => onDelete(ticket)}><Icon name="trash" className="w-4 h-4" /> Delete</Button>}
          {canMarkComplete && <Button variant="success" size="sm" onClick={() => onMarkComplete(ticket)}><Icon name="check" className="w-4 h-4" /> Mark Complete</Button>}
          {canApproveReopen && (
            <Fragment>
              <Button variant="success" size="sm" onClick={() => onApprove(ticket)}><Icon name="check" className="w-4 h-4" /> Approve & Close</Button>
              <Button variant="danger" size="sm" onClick={() => setReopenOpen(true)}><Icon name="refresh" className="w-4 h-4" /> Reopen Ticket</Button>
            </Fragment>
          )}
        </div>

        {/* Role badges */}
        <div className="flex gap-2 mb-6">
          {admin && <Badge className="bg-red-500 text-white">Admin</Badge>}
          {isAssignee && <Badge className="bg-emerald-500 text-white">Assignee</Badge>}
          {isRequester && <Badge className="bg-blue-500 text-white">Requester</Badge>}
        </div>

        <div className="grid lg:grid-cols-3 gap-6">
          {/* Main */}
          <div className="lg:col-span-2 space-y-4">
            <div className="card p-6">
              <div className="flex items-center gap-2 mb-5"><Icon name="document" className="w-5 h-5 text-blue-600" /><h2 className="text-lg font-semibold">Ticket Details</h2></div>
              <div className="space-y-4">
                <div>
                  <div className="text-xs text-slate-500 mb-1">Title</div>
                  <div className="font-semibold text-lg">{ticket.titleType || 'Service Request'}</div>
                  <div className="text-slate-700">{ticket.title}</div>
                </div>
                <div>
                  <div className="text-xs text-slate-500 mb-1">Issue Details</div>
                  <div className="text-slate-700 whitespace-pre-wrap">{ticket.description || '—'}</div>
                </div>
                <div className="flex gap-2 pt-2">
                  <Badge className={`${stat.colorBg} ${stat.colorText} ${stat.border} border`}>{stat.label}</Badge>
                  <Badge className={`${pri.chip} border`}>{pri.label}</Badge>
                </div>
              </div>
            </div>

            {/* Tabs */}
            <div className="card">
              <div className="border-b border-slate-100 flex">
                <button onClick={() => setActiveTab('comments')} className={`flex items-center gap-2 px-4 py-3 text-sm font-medium ${activeTab === 'comments' ? 'text-blue-600 border-b-2 border-blue-600' : 'text-slate-500 hover:text-slate-700'}`}>
                  <Icon name="log" className="w-4 h-4" /> ({(ticket.comments || []).length})
                </button>
                <button onClick={() => setActiveTab('activity')} className={`flex items-center gap-2 px-4 py-3 text-sm font-medium ${activeTab === 'activity' ? 'text-blue-600 border-b-2 border-blue-600' : 'text-slate-500 hover:text-slate-700'}`}>
                  <Icon name="clock" className="w-4 h-4" /> ({(ticket.activity || []).length})
                </button>
              </div>
              <div className="p-6">
                <form onSubmit={e => { e.preventDefault(); if (comment.trim()) { onAddComment(ticket.id, comment); setComment(''); } }} className="mb-5 flex gap-2">
                  <textarea rows={3} value={comment} onChange={e => setComment(e.target.value)} placeholder="Add a comment..." className="flex-1 px-3 py-2 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-emerald-500/30 text-sm" />
                  <button type="submit" disabled={!comment.trim()} className="px-3 py-2 bg-blue-500 hover:bg-blue-600 text-white rounded-lg disabled:opacity-50"><Icon name="send" className="w-5 h-5" /></button>
                </form>
                {activeTab === 'comments' ? (
                  (ticket.comments || []).length === 0 ? <div className="text-center text-sm text-slate-500 py-6">No comments yet</div> :
                  <div className="space-y-3">
                    {ticket.comments.map(c => {
                      const u = getUser(users, c.userId);
                      return (
                        <div key={c.id} className="flex gap-3">
                          <Avatar user={u} size="sm" />
                          <div className="flex-1 bg-slate-50 rounded-lg p-3">
                            <div className="text-sm font-medium">{u?.name}</div>
                            <div className="text-xs text-slate-400 mb-1">{fmtRelative(c.createdAt)}</div>
                            <p className="text-sm text-slate-700 whitespace-pre-wrap">{c.body}</p>
                          </div>
                        </div>
                      );
                    })}
                  </div>
                ) : (
                  <div className="space-y-2">
                    {(ticket.activity || []).slice().reverse().map((a, i) => {
                      const u = getUser(users, a.userId);
                      return (
                        <div key={i} className="flex items-center gap-3 text-xs text-slate-600 py-1">
                          <Avatar user={u} size="sm" />
                          <span className="font-medium text-slate-800">{u?.name || 'System'}</span>
                          <span>{a.text}</span>
                          <span className="text-slate-400 ml-auto">{fmtActivityTime(a.at)}</span>
                        </div>
                      );
                    })}
                  </div>
                )}
              </div>
            </div>
          </div>

          {/* Sidebar */}
          <div className="space-y-4">
            <div className="card p-5">
              <div className="text-xs font-semibold text-slate-500 uppercase tracking-wider mb-3">Status</div>
              {(() => {
                const isClosed = ['resolved', 'closed'].includes(ticket.status);
                const isSuperAdmin = currentUser.role === 'super_admin' || currentUser.isAdmin;
                const canChangeStatus = !isClosed || isSuperAdmin;

                return (
                  <>
                    <select
                      value={ticket.status}
                      onChange={e => onUpdate(ticket.id, { status: e.target.value, updatedAt: now() }, `Status changed to ${getStatus(e.target.value).label}`)}
                      disabled={!canChangeStatus}
                      className={`w-full px-3 py-2 rounded-lg border text-sm font-medium ${stat.colorBg} ${stat.colorText} ${stat.border} ${!canChangeStatus ? 'opacity-50 cursor-not-allowed bg-slate-50' : 'cursor-pointer'}`}
                    >
                      {STATUSES.map(s => <option key={s.id} value={s.id}>{s.label}</option>)}
                    </select>
                    {isClosed && !isSuperAdmin && (
                      <div className="mt-2 p-2 bg-amber-50 border border-amber-200 rounded text-xs text-amber-700">
                        🔒 This ticket is closed. Only Super Admins can change the status.
                      </div>
                    )}
                  </>
                );
              })()}
            </div>
            <div className="card p-5">
              <div className="text-xs font-semibold text-slate-500 uppercase tracking-wider mb-3">Assignee</div>
              {assignee ? (
                <div className="flex items-center gap-2 mb-3">
                  <Avatar user={assignee} size="md" />
                  <div className="text-sm font-medium">{assignee.name}</div>
                </div>
              ) : <div className="text-sm text-slate-400 mb-3">Unassigned</div>}
              <button onClick={() => onAssign(ticket)} className="w-full px-3 py-2 border border-slate-200 rounded-lg text-sm text-slate-700 hover:bg-slate-50">{assignee ? 'Reassign' : 'Assign'}</button>
            </div>
            <div className="card p-5">
              <div className="text-xs font-semibold text-slate-500 uppercase tracking-wider mb-3">Details</div>
              <div className="space-y-3 text-sm">
                <div><div className="text-xs text-slate-500">Created:</div><div>{fmtActivityTime(ticket.createdAt)}</div></div>
                <div><div className="text-xs text-slate-500">Expected Completion:</div><div>{ticket.expectedCompletion ? fmtShortDate(ticket.expectedCompletion) : fmtActivityTime(ticket.dueAt)}</div></div>
                <div><div className="text-xs text-slate-500">Submitted By:</div><div className="font-semibold">{requester?.name}</div><div className="text-xs text-slate-500">{requester?.email}</div></div>
              </div>
            </div>
            <div className="card p-5">
              <div className="flex items-center justify-between mb-3">
                <div className="text-xs font-semibold text-slate-500 uppercase tracking-wider"><Icon name="paperclip" className="w-3.5 h-3.5 inline mr-1" /> Attachments</div>
                <button className="flex items-center gap-1 px-2 py-1 text-xs border border-slate-200 rounded-md hover:bg-slate-50"><Icon name="plus" className="w-3 h-3" /> Add</button>
              </div>
              <label className="block border-2 border-dashed border-slate-200 rounded-lg p-6 text-center cursor-pointer hover:border-emerald-300">
                <input type="file" multiple className="hidden" />
                <Icon name="paperclip" className="w-6 h-6 mx-auto text-slate-400 mb-1" />
                <div className="text-xs text-slate-500"><span className="text-blue-600 font-medium">Drop files or click to upload</span></div>
                <div className="text-xs text-slate-400 mt-0.5">Images, PDF, Word, Excel</div>
              </label>
            </div>
          </div>
        </div>

        {/* Reopen modal */}
        <Modal open={reopenOpen} onClose={() => setReopenOpen(false)} title="Reopen Ticket">
          <div className="p-6">
            <p className="text-sm text-slate-600 mb-4">Reopening <span className="font-mono font-semibold text-slate-800">{ticket.ticketNumber}</span> — please provide feedback explaining what needs to be addressed. This is mandatory.</p>
            <label className="block text-sm font-medium text-slate-700 mb-1.5">Feedback <span className="text-red-500">*</span></label>
            <textarea rows={5} value={reopenFeedback} onChange={e => setReopenFeedback(e.target.value)} placeholder="What needs further work on this ticket?" className="w-full px-3 py-2 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-red-500/30 text-sm" />
            <div className="flex justify-end gap-2 mt-5">
              <Button variant="secondary" onClick={() => setReopenOpen(false)}>Cancel</Button>
              <Button variant="danger" disabled={!reopenFeedback.trim()} onClick={() => { onReopen(ticket, reopenFeedback); setReopenFeedback(''); setReopenOpen(false); }}>Reopen with Feedback</Button>
            </div>
          </div>
        </Modal>
      </div>
      </div>
  );
};

// ============================================================
// ASSIGN MODAL
// ============================================================
const AssignModal = ({ open, ticket, users, currentUser, onClose, onAssign }) => {
  const [assigneeId, setAssigneeId] = useState('');
  useEffect(() => { if (open && ticket) setAssigneeId(ticket.assigneeId || ''); }, [open, ticket]);
  if (!ticket) return null;
  const assignable = users.filter(u => u.id !== currentUser.id && isManager(u));
  return (
    <Modal open={open} onClose={onClose} title="Assign Ticket">
      <div className="p-6">
        <p className="text-sm text-slate-600 mb-5">Assign ticket <span className="text-blue-600 font-mono font-semibold">{ticket.ticketNumber}</span> to a staff member</p>
        <select value={assigneeId} onChange={e => setAssigneeId(e.target.value)} className="w-full px-3 py-2.5 border-2 border-blue-500 rounded-lg text-sm bg-white">
          <option value="">— Select assignee —</option>
          {assignable.map(u => <option key={u.id} value={u.id}>{u.name} — {u.department}</option>)}
        </select>
        <p className="text-xs text-slate-500 mt-2">You cannot assign tickets to yourself.</p>
        <div className="flex justify-end gap-2 mt-5">
          <Button variant="secondary" onClick={onClose}>Cancel</Button>
          <Button variant="primary" disabled={!assigneeId} onClick={() => { onAssign(ticket, assigneeId); onClose(); }}>Assign</Button>
        </div>
      </div>
    </Modal>
  );
};

// ============================================================
// DELETE MODAL (Admin only)
// ============================================================
const DeleteModal = ({ open, ticket, onClose, onDelete }) => {
  if (!ticket) return null;
  return (
    <Modal open={open} onClose={onClose} title="Delete Ticket?">
      <div className="p-6">
        <p className="text-sm text-slate-600">
          Are you sure you want to delete ticket <span className="text-red-600 font-mono font-semibold">{ticket.ticketNumber}</span>? This action cannot be undone and will permanently remove the ticket and all associated data.
        </p>
        <div className="flex justify-end gap-2 mt-5">
          <Button variant="secondary" onClick={onClose}>Cancel</Button>
          <Button variant="danger" onClick={() => { onDelete(ticket); onClose(); }}>Delete</Button>
        </div>
      </div>
    </Modal>
  );
};

// ============================================================
// CALENDAR VIEW
// ============================================================
const CalendarView = ({ tickets, onOpen, onNavigate }) => {
  const today = new Date();
  today.setHours(0, 0, 0, 0);
  const [cursor, setCursor] = useState(new Date(today.getFullYear(), today.getMonth(), 1));

  const breadcrumbs = [
    { label: 'Dashboard', clickable: true, action: 'dashboard' },
    { label: 'Calendar', clickable: false }
  ];

  const monthName = cursor.toLocaleString('en-AU', { month: 'long' });
  const yearName  = cursor.getFullYear();
  const firstDay  = new Date(cursor.getFullYear(), cursor.getMonth(), 1);
  const startOffset = firstDay.getDay();
  const gridStart = new Date(firstDay);
  gridStart.setDate(gridStart.getDate() - startOffset);

  const days = [];
  for (let i = 0; i < 42; i++) {
    const d = new Date(gridStart);
    d.setDate(d.getDate() + i);
    days.push(d);
  }

  const sameDay = (a, b) =>
    a.getFullYear() === b.getFullYear() &&
    a.getMonth()    === b.getMonth()    &&
    a.getDate()     === b.getDate();

  const ticketsByDay = useMemo(() => {
    const map = {};
    tickets.forEach(t => {
      if (!t.dueAt) return;
      const d = new Date(t.dueAt);
      const key = `${d.getFullYear()}-${d.getMonth()}-${d.getDate()}`;
      (map[key] = map[key] || []).push(t);
    });
    return map;
  }, [tickets]);

  const dayKey = (d) => `${d.getFullYear()}-${d.getMonth()}-${d.getDate()}`;

  // Priority pill config — dot colour + pill surface
  const pillCfg = {
    urgent: { dot: '#ef4444', bg: 'rgba(239,68,68,0.10)',   border: 'rgba(239,68,68,0.22)',   text: '#b91c1c' },
    high:   { dot: '#f97316', bg: 'rgba(249,115,22,0.10)',  border: 'rgba(249,115,22,0.22)',  text: '#c2410c' },
    medium: { dot: '#f59e0b', bg: 'rgba(245,158,11,0.10)',  border: 'rgba(245,158,11,0.22)',  text: '#b45309' },
    low:    { dot: '#3b82f6', bg: 'rgba(59,130,246,0.10)',  border: 'rgba(59,130,246,0.22)',  text: '#1d4ed8' },
  };

  const shortNumber = (tn) => {
    if (!tn) return '';
    const m = tn.match(/(\d{2})(\d{2})-(\d+)/);
    if (m) return `${m[2]}-${m[3]}`;
    return tn.slice(-7);
  };

  const goPrev  = () => setCursor(new Date(cursor.getFullYear(), cursor.getMonth() - 1, 1));
  const goNext  = () => setCursor(new Date(cursor.getFullYear(), cursor.getMonth() + 1, 1));
  const goToday = () => setCursor(new Date(today.getFullYear(), today.getMonth(), 1));

  const weekDays = ['SUN', 'MON', 'TUE', 'WED', 'THU', 'FRI', 'SAT'];

  // Month-level stats
  const monthTickets = useMemo(() => {
    const ms = new Date(cursor.getFullYear(), cursor.getMonth(), 1);
    const me = new Date(cursor.getFullYear(), cursor.getMonth() + 1, 0, 23, 59, 59);
    return tickets.filter(t => { if (!t.dueAt) return false; const d = new Date(t.dueAt); return d >= ms && d <= me; });
  }, [tickets, cursor]);
  const urgentCount = monthTickets.filter(t => t.priority === 'urgent').length;

  return (
    <div className="flex-1 overflow-y-auto scrollbar-thin">
      <Breadcrumb items={breadcrumbs} onNavigate={onNavigate} />

      <div className="p-6">
        {/* ── Hero header ─────────────────────────────────────────── */}
        <div className="flex items-end justify-between mb-5">
          <div>
            <div className="flex items-baseline gap-3">
              <h1 className="text-4xl font-black text-slate-900 tracking-tight">{monthName}</h1>
              <span className="text-2xl font-light text-slate-400">{yearName}</span>
            </div>
            <div className="flex items-center gap-3 mt-1.5">
              <p className="text-sm text-slate-500">Track ticket timelines and deadlines</p>
              {monthTickets.length > 0 && (
                <span className="inline-flex items-center gap-1.5 px-2.5 py-0.5 rounded-full bg-emerald-50 text-emerald-700 text-xs font-semibold border border-emerald-200">
                  <span className="live-dot"></span>
                  {monthTickets.length} due this month
                  {urgentCount > 0 && <span className="text-red-500 font-bold">· {urgentCount} urgent</span>}
                </span>
              )}
            </div>
          </div>

          {/* Navigation */}
          <div className="flex items-center gap-1.5">
            <button onClick={goPrev} className="yc-cal-nav w-9 h-9 flex items-center justify-center rounded-xl border border-slate-200 text-slate-500 hover:border-emerald-300 hover:text-emerald-600 hover:bg-emerald-50 transition-all">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className="w-4 h-4"><polyline points="15 18 9 12 15 6"/></svg>
            </button>
            <button onClick={goToday} className="brand-gradient px-4 py-2 rounded-xl text-sm font-semibold text-white shadow-sm">Today</button>
            <button onClick={goNext} className="yc-cal-nav w-9 h-9 flex items-center justify-center rounded-xl border border-slate-200 text-slate-500 hover:border-emerald-300 hover:text-emerald-600 hover:bg-emerald-50 transition-all">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className="w-4 h-4"><polyline points="9 18 15 12 9 6"/></svg>
            </button>
          </div>
        </div>

        {/* ── Calendar card ───────────────────────────────────────── */}
        <div className="card overflow-hidden">

          {/* Day-of-week header row */}
          <div className="grid grid-cols-7 border-b border-slate-100">
            {weekDays.map((d, i) => (
              <div key={d} className={`py-3 text-center text-[11px] font-bold tracking-widest select-none ${
                i === 0 || i === 6 ? 'text-slate-400 bg-slate-50/80' : 'text-slate-500 bg-white'
              }`}>{d}</div>
            ))}
          </div>

          {/* Thin brand divider */}
          <div style={{height:'2px', background:'linear-gradient(90deg,transparent 0%,#6366F1 25%,#8B5CF6 55%,#06B6D4 80%,transparent 100%)', opacity:0.40}}></div>

          {/* Day grid — no gap, divided by CSS borders */}
          <div className="grid grid-cols-7 divide-x divide-y divide-slate-100">
            {days.map((d, i) => {
              const inMonth  = d.getMonth() === cursor.getMonth();
              const isToday  = sameDay(d, today);
              const isWeekend = d.getDay() === 0 || d.getDay() === 6;
              const dayTickets = ticketsByDay[dayKey(d)] || [];
              return (
                <div key={i} className={`yc-cal-day relative min-h-[96px] p-2 transition-colors duration-150 ${
                  isToday   ? 'yc-cal-today'   :
                  !inMonth  ? 'yc-cal-offmonth' :
                  isWeekend ? 'yc-cal-weekend'  : ''
                }`}>
                  {/* Today indicator dot */}
                  {isToday && (
                    <span className="absolute top-2 right-2 w-1.5 h-1.5 rounded-full bg-emerald-400 ring-2 ring-emerald-100 ring-offset-1"></span>
                  )}

                  {/* Date number — filled circle on today */}
                  <div className={`w-7 h-7 flex items-center justify-center rounded-full text-sm font-bold mb-1 transition-colors ${
                    isToday
                      ? 'bg-emerald-500 text-white shadow shadow-emerald-300'
                      : inMonth
                      ? 'text-slate-700'
                      : 'text-slate-300'
                  }`}>
                    {d.getDate()}
                  </div>

                  {/* Ticket pills */}
                  <div className="space-y-0.5">
                    {dayTickets.slice(0, 3).map(t => {
                      const cfg = pillCfg[t.priority] || pillCfg.medium;
                      return (
                        <button
                          key={t.id}
                          onClick={() => onOpen(t.id)}
                          title={`${t.ticketNumber} — ${t.title}`}
                          style={{background: cfg.bg, border:`1px solid ${cfg.border}`, color: cfg.text}}
                          className="w-full flex items-center gap-1 px-1.5 py-0.5 rounded-md text-[10px] font-semibold font-mono truncate text-left hover:opacity-75 transition-opacity"
                        >
                          <span style={{background: cfg.dot, flexShrink:0}} className="w-1.5 h-1.5 rounded-full"></span>
                          {shortNumber(t.ticketNumber)}
                        </button>
                      );
                    })}
                    {dayTickets.length > 3 && (
                      <p className="text-[10px] text-slate-400 pl-1 font-medium">+{dayTickets.length - 3} more</p>
                    )}
                  </div>
                </div>
              );
            })}
          </div>
        </div>

        {/* ── Legend ──────────────────────────────────────────────── */}
        <div className="mt-4 flex flex-wrap items-center gap-2">
          <span className="text-[11px] font-bold text-slate-400 uppercase tracking-widest mr-1">Priority</span>
          {PRIORITIES.map(p => {
            const cfg = pillCfg[p.id];
            if (!cfg) return null;
            return (
              <span key={p.id} style={{background: cfg.bg, border:`1px solid ${cfg.border}`, color: cfg.text}}
                className="inline-flex items-center gap-1.5 px-2.5 py-1 rounded-full text-xs font-semibold">
                <span style={{background: cfg.dot}} className="w-2 h-2 rounded-full flex-shrink-0"></span>
                {p.label}
              </span>
            );
          })}
          <span style={{background:'rgba(99,102,241,0.12)', border:'1px solid rgba(99,102,241,0.28)', color:'#6366F1'}}
            className="inline-flex items-center gap-1.5 px-2.5 py-1 rounded-full text-xs font-semibold ml-1">
            <span style={{background:'#6366F1'}} className="w-2 h-2 rounded-full flex-shrink-0"></span>
            Today
          </span>
        </div>
      </div>
    </div>
  );
};

const inferActionType = (text = '') => {
  const lower = text.toLowerCase();
  if (lower.includes('created') || lower === 'created') return 'created';
  if (lower.includes('status changed')) return 'status_change';
  if (lower.includes('priority changed')) return 'priority_change';
  if (lower.includes('assigned')) return 'assigned';
  if (lower.includes('comment')) return 'comment';
  if (lower.includes('marked complete') || lower.includes('awaiting approval')) return 'completed';
  if (lower.includes('approved')) return 'approved';
  if (lower.includes('reopened')) return 'reopened';
  if (lower.includes('escalat')) return 'escalated';
  return 'status_change';
};

const getActionType = (id) => ACTION_TYPES.find(a => a.id === id) || ACTION_TYPES[1];

const buildLogEntries = (tickets) => {
  const entries = [];
  tickets.forEach(t => {
    (t.activity || []).forEach(a => {
      entries.push({
        id: a.id || `${t.id}_${a.at}`,
        at: a.at,
        userId: a.userId,
        ticketId: t.id,
        ticketNumber: t.ticketNumber,
        ticketTitle: t.title,
        priority: t.priority,
        actionType: a.type || inferActionType(a.text),
        text: a.text,
      });
    });
  });
  return entries.sort((a, b) => new Date(b.at) - new Date(a.at));
};

const ThemedDropdown = ({ value, onChange, options, placeholder = 'All', minWidth = 150 }) => {
  const [open, setOpen] = useState(false);
  const [dark, setDark] = useState(document.documentElement.classList.contains('dark'));
  const ref = useRef(null);

  useEffect(() => {
    const obs = new MutationObserver(() => setDark(document.documentElement.classList.contains('dark')));
    obs.observe(document.documentElement, { attributeFilter: ['class'] });
    return () => obs.disconnect();
  }, []);

  useEffect(() => {
    const h = (e) => { if (ref.current && !ref.current.contains(e.target)) setOpen(false); };
    document.addEventListener('mousedown', h);
    return () => document.removeEventListener('mousedown', h);
  }, []);

  const selected = options.find(o => o.id === value);

  /* Trigger styling */
  const triggerBg   = dark ? 'rgba(8,22,44,0.85)'  : '#FFFFFF';
  const triggerBrd  = dark ? 'rgba(0,166,255,0.18)' : '#D1D9E6';
  const triggerTxt  = selected?.dot
    ? (dark ? '#e2e8f0' : '#1e293b')
    : (dark ? '#94a3b8' : '#4b5563');
  const triggerHov  = dark ? 'rgba(0,166,255,0.08)' : '#f3f6fa';

  /* Menu styling */
  const menuBg   = dark ? '#08162C'                   : '#FFFFFF';
  const menuBrd  = dark ? 'rgba(0,166,255,0.18)'      : '#E2E8F0';
  const menuShdw = dark ? '0 12px 40px rgba(0,0,0,0.6),0 0 20px rgba(0,140,255,0.08)' : '0 8px 28px rgba(15,23,42,0.12)';

  /* Item: default, hover, active */
  const itemDefault  = dark ? '#94a3b8' : '#374151';
  const itemHoverBg  = dark ? 'rgba(0,166,255,0.08)' : '#f3f6fa';
  const itemActiveBg = dark ? 'rgba(0,166,255,0.18)' : '#EEF4FF';
  const itemActiveTx = dark ? '#60a5fa'               : '#1D4ED8';

  return (
    <div ref={ref} className="relative" style={{minWidth}}>
      <button type="button" onClick={() => setOpen(o => !o)}
        className="flex items-center gap-2 w-full px-3 py-2.5 rounded-xl text-sm font-medium border transition-all"

        {selected?.dot && (

      </button>

        (() => {
          const rect = ref.current?.getBoundingClientRect();
          if (!rect) return null;
          return (
            <div className="fade-in"
              style={{
                position:'fixed', top: rect.bottom + 4, left: rect.left,

const computeStaffMetrics = (user, tickets) => {
  const assigned = tickets.filter(t => t.assigneeId === user.id);
  const open     = assigned.filter(t => !['resolved','closed'].includes(t.status));
  const resolved = assigned.filter(t => ['resolved','closed'].includes(t.status));

  // Average resolution time — use resolvedAt if present, fall back to updatedAt (same as computeSLA)
  const avgHours = resolved.length === 0 ? 0 :
    resolved.reduce((sum, t) => {
      const end   = new Date(t.resolvedAt || t.updatedAt).getTime();
      const start = new Date(t.createdAt).getTime();
      return sum + Math.max(0, (end - start) / 3600000);
    }, 0) / resolved.length;

  // SLA compliance — only tickets that have a due date count against SLA.
  // Tickets without dueAt have no SLA deadline so they are treated as met.
  const withDue    = resolved.filter(t => t.dueAt);
  const slaMetCount = withDue.filter(t => {
    const resolvedTime = new Date(t.resolvedAt || t.updatedAt).getTime();
    const dueTime      = new Date(t.dueAt).getTime();
    return resolvedTime <= dueTime;
  }).length;
  // If no tickets have a due date, SLA is 100% (no breaches possible).
  // Otherwise calculate against those that do have a deadline.
  const slaPct = withDue.length === 0
    ? (resolved.length > 0 ? 100 : 100)
    : Math.round((slaMetCount / withDue.length) * 100);

  const urgentOpen = open.filter(t => t.priority === 'urgent').length;

  // Resolution rate as a percentage of all assigned tickets
  const resolutionRate = assigned.length ? Math.round((resolved.length / assigned.length) * 100) : 0;

  // Rating 0–5: weighted blend of resolution volume (60%) + SLA compliance (40%)
  // Volume score: scales from 0→3 as resolved count goes 0→10+
  const volumeScore = resolved.length === 0 ? 0 : Math.min(3, (resolved.length / 10) * 3);
  // SLA score: 0→2 proportional to slaPct
  const slaScore    = (slaPct / 100) * 2;
  const rating      = assigned.length === 0 ? 0 : Math.min(5, Math.round((volumeScore + slaScore) * 10) / 10);

  return { assigned: assigned.length, open: open.length, resolved: resolved.length, resolutionRate, slaPct, avgHours, urgentOpen, rating };
};

const StaffStatCard = ({ label, value, icon, bgClass, iconColor }) => (
  <div className={`card p-5 ${bgClass}`}>
    <div className="flex items-start justify-between">
      <div>
        <div className="text-sm text-slate-600 font-medium">{label}</div>
        <div className="text-4xl font-bold text-slate-800 mt-2">{value}</div>
      </div>
      <div className={`w-10 h-10 rounded-xl flex items-center justify-center bg-white ${iconColor}`}>
        <Icon name={icon} className="w-5 h-5" />
      </div>
    </div>
  </div>
);

const StaffPerformance = ({ tickets, users, currentUser, onOpen, onOpenStaff, onNavigate }) => {
  // Row-level security: Managers only see their own department's staff
  const isAdminUser = isAdmin(currentUser);
  const breadcrumbs = [
    { label: 'Dashboard', clickable: true, action: 'dashboard', icon: 'dashboard' },
    { label: 'Staff Performance', clickable: false },
  ];
  const scopedUsers = useMemo(() =>
    isAdminUser ? users : users.filter(u => u.department === currentUser.department),
    [users, currentUser, isAdminUser]
  );
  const scopedTickets = useMemo(() => {
    if (isAdminUser) return tickets;
    const memberIds = new Set(scopedUsers.map(u => u.id));
    return tickets.filter(t => memberIds.has(t.assigneeId) || memberIds.has(t.requesterId));
  }, [tickets, scopedUsers, isAdminUser]);
  // Override the upstream variables (cascades to all the metrics, top performers, etc.)
  users = scopedUsers;
  tickets = scopedTickets;


  const [view, setView] = useState('grid');
  const [search, setSearch] = useState('');
  const [sort, setSort] = useState('most_resolved');
  const [deptFilter, setDeptFilter] = useState('all');
  const [roleFilter, setRoleFilter] = useState('all');
  const [statusFilter, setStatusFilter] = useState('all');
  const [perfFilter, setPerfFilter] = useState('all');     // 'high' (>=80% SLA), 'medium' (40-79%), 'low' (<40%)
  const [page, setPage] = useState(1);
  const [pageSize, setPageSize] = useState(12);
  useEffect(() => { setPage(1); }, [search, deptFilter, roleFilter, statusFilter, perfFilter, sort, pageSize]);

  // Eligible staff = managers + super admins + anyone who has been assigned tickets
  const staff = users.filter(u => isManager(u) || tickets.some(t => t.assigneeId === u.id));

  const allMetrics = useMemo(() => users.map(u => ({ user: u, ...computeStaffMetrics(u, tickets) })), [users, tickets]);

  // Top-level KPIs
  const totalResolved = tickets.filter(t => ['resolved', 'closed'].includes(t.status)).length;
  const totalAssigned = tickets.filter(t => t.assigneeId).length;
  const closedAll = tickets.filter(t => ['resolved', 'closed'].includes(t.status));

  // Team SLA — only tickets with a dueAt matter; tickets without a deadline are excluded
  // (they can't breach an SLA that was never set).
  const closedWithDue = closedAll.filter(t => t.dueAt);
  const slaMet = closedWithDue.filter(t => {
    const resolvedTime = new Date(t.resolvedAt || t.updatedAt).getTime();
    const dueTime      = new Date(t.dueAt).getTime();
    return resolvedTime <= dueTime;
  }).length;
  const teamSLA = closedWithDue.length ? Math.round((slaMet / closedWithDue.length) * 100) : 100;

  // Average resolution hours — use resolvedAt || updatedAt fallback
  const avgHoursAll = closedAll.length === 0 ? 0 :
    closedAll.reduce((sum, t) => {
      const end   = new Date(t.resolvedAt || t.updatedAt).getTime();
      const start = new Date(t.createdAt).getTime();
      return sum + Math.max(0, (end - start) / 3600000);
    }, 0) / closedAll.length;

  // Top performers — all staff with at least 1 assigned ticket, ranked by resolved + SLA
  const topPerformers = [...allMetrics]
    .filter(m => m.assigned > 0)
    .sort((a, b) => b.resolved - a.resolved || b.slaPct - a.slaPct)
    .slice(0, 3);

  // Chart data
  const resolutionData = allMetrics
    .filter(m => m.assigned > 0)
    .map(m => ({ name: m.user.name.split(' ')[0], resolved: m.resolved, assigned: m.assigned }));

  const slaData = allMetrics
    .filter(m => m.assigned > 0)
    .map(m => ({ name: m.user.name.split(' ')[0], sla: m.slaPct, fill: m.slaPct >= 70 ? '#10b981' : '#ef4444' }));

  // Filtered + sorted staff cards
  const filteredStaff = useMemo(() => {
    let list = [...allMetrics];
    if (deptFilter !== 'all')   list = list.filter(m => m.user.department === deptFilter);
    if (roleFilter !== 'all') {
      list = list.filter(m => {
        if (roleFilter === 'super_admin') return m.user.isAdmin || m.user.role === 'super_admin';
        if (roleFilter === 'manager')     return !m.user.isAdmin && m.user.role === 'manager';
        if (roleFilter === 'user')        return m.user.role === 'user';
        return true;
      });
    }
    if (statusFilter === 'active')   list = list.filter(m => m.user.active !== false);
    if (statusFilter === 'inactive') list = list.filter(m => m.user.active === false);
    if (perfFilter !== 'all') {
      list = list.filter(m => {
        if (perfFilter === 'high')   return m.slaPct >= 80;
        if (perfFilter === 'medium') return m.slaPct >= 40 && m.slaPct < 80;
        if (perfFilter === 'low')    return m.slaPct < 40;
        return true;
      });
    }
    if (search.trim()) {
      const q = search.toLowerCase();
      list = list.filter(m =>
        m.user.name.toLowerCase().includes(q) ||
        m.user.email.toLowerCase().includes(q) ||
        m.user.department.toLowerCase().includes(q));
    }
    if (sort === 'most_resolved')      list.sort((a, b) => b.resolved - a.resolved);
    else if (sort === 'most_assigned') list.sort((a, b) => b.assigned - a.assigned);
    else if (sort === 'best_sla')      list.sort((a, b) => b.slaPct - a.slaPct);
    else if (sort === 'worst_sla')     list.sort((a, b) => a.slaPct - b.slaPct);
    else if (sort === 'fastest')       list.sort((a, b) => (a.avgHours || 1e9) - (b.avgHours || 1e9));
    else if (sort === 'most_urgent')   list.sort((a, b) => b.urgentOpen - a.urgentOpen);
    else if (sort === 'name')          list.sort((a, b) => a.user.name.localeCompare(b.user.name));
    return list;
  }, [allMetrics, search, sort, deptFilter, roleFilter, statusFilter, perfFilter]);

  // Pagination
  const totalCount = filteredStaff.length;
  const totalPages = Math.max(1, Math.ceil(totalCount / pageSize));
  const safePage = Math.min(page, totalPages);
  const startIdx = (safePage - 1) * pageSize;
  const pagedStaff = filteredStaff.slice(startIdx, startIdx + pageSize);

  // Department list for filter dropdown
  const allDepartments = useMemo(() => Array.from(new Set(users.map(u => u.department).filter(Boolean))).sort(), [users]);
  const activeFilterCount = [deptFilter, roleFilter, statusFilter, perfFilter].filter(v => v !== 'all').length + (search.trim() ? 1 : 0);
  const clearAll = () => { setSearch(''); setDeptFilter('all'); setRoleFilter('all'); setStatusFilter('all'); setPerfFilter('all'); };

  return (
    <>
      <Breadcrumb items={breadcrumbs} onNavigate={onNavigate} />
      <div className="p-6 flex-1 overflow-y-auto scrollbar-thin">
        {/* Header */}
        <div className="flex items-start justify-between mb-4">
        <div className="flex items-start gap-2">
          <Icon name="users" className="w-7 h-7 text-blue-600 mt-1" />
          <div>
            <h1 className="text-3xl font-bold text-slate-900">Staff Performance</h1>
            <p className="text-sm text-slate-500 mt-1">{isAdminUser ? 'Monitor team performance, track KPIs, and identify top performers' : `Performance metrics for the ${currentUser.department} team`}</p>
          </div>
        </div>
        <div className="flex items-center gap-2">
          <Button variant="secondary" size="md" onClick={() => exportToPDF({
            title: 'Staff Performance Report',
            subtitle: isAdminUser ? 'All departments' : `Department: ${currentUser.department}`,
            generatedBy: currentUser.name,
            stats: [
              { label: 'Total Staff', value: filteredStaff.length },
              { label: 'Avg SLA', value: filteredStaff.length ? Math.round(filteredStaff.reduce((s,m)=>s+m.slaPct,0)/filteredStaff.length)+'%' : '—' },
              { label: 'Total Resolved', value: filteredStaff.reduce((s,m)=>s+m.resolved,0) },
            ],
            columns: ['Name', 'Department', 'Assigned', 'Resolved', 'Open', 'Urgent', 'SLA %', 'Avg Hrs', 'Rating'],
            rows: filteredStaff.map(m => [
              m.user.name,
              m.user.department,
              m.assigned,
              m.resolved,
              m.open,
              m.urgentOpen,
              m.slaPct + '%',
              m.avgHours + 'h',
              m.rating.toFixed(1) + ' / 5',
            ]),
          })}>
            <Icon name="document" className="w-4 h-4" /> Export PDF
          </Button>
        </div>
      </div>

      {/* Row-level security banner for managers */}
      {!isAdminUser && (
        <div className="card p-3 mb-4 bg-blue-50 border-blue-200 flex items-center gap-2">
          <Icon name="branch" className="w-4 h-4 text-blue-600" />
          <span className="text-sm text-blue-800">Viewing metrics for your team only — <strong>{currentUser.department}</strong> · {users.length} member{users.length !== 1 ? 's' : ''}</span>
        </div>
      )}

      {/* KPI cards */}
      <div className="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-6">
        <StaffStatCard label="Total Resolved" value={totalResolved} icon="sent" bgClass="bg-gradient-to-br from-emerald-50 to-slate-50" iconColor="text-emerald-600" />
        <StaffStatCard label="Total Assigned" value={totalAssigned} icon="activity" bgClass="bg-gradient-to-br from-blue-50 to-slate-50" iconColor="text-blue-600" />
        <StaffStatCard label="Team SLA" value={teamSLA + '%'} icon="trend" bgClass="bg-gradient-to-br from-emerald-50 to-slate-50" iconColor="text-emerald-600" />
        <StaffStatCard label="Avg Resolution" value={Math.round(avgHoursAll) + 'h'} icon="clock" bgClass="bg-gradient-to-br from-sky-50 to-slate-50" iconColor="text-sky-600" />
      </div>

      {/* Top performers */}
      <div className="rounded-2xl p-6 mb-6 bg-gradient-to-br from-amber-50 via-orange-50 to-yellow-50 border border-amber-100">
        <div className="flex items-center gap-2 mb-5">
          <svg viewBox="0 0 24 24" fill="#f59e0b" stroke="#f59e0b" strokeWidth="2" className="w-5 h-5"><path d="M2 4l3 12h14l3-12-6 7-4-7-4 7-6-7zm3 16h14"/></svg>
          <h2 className="text-lg font-bold text-slate-800">Top Performers This Month</h2>
        </div>
        <div className="grid md:grid-cols-3 gap-4">
          {topPerformers.map((m, idx) => {
            const trophies = ['🥇', '🥈', '🥉'];
            return (
              <div key={m.user.id} className="bg-white/70 backdrop-blur rounded-xl p-4 border border-amber-200/60">
                <div className="flex items-center gap-3 mb-3">
                  <div className="relative">
                    <Avatar user={m.user} size="lg" />
                    <span className="absolute -top-1 -right-1 text-lg" title={`#${idx + 1}`}>{trophies[idx]}</span>
                  </div>
                  <div className="flex-1 min-w-0">
                    <div className="font-bold text-slate-800 truncate">{m.user.name}</div>
                    <div className="text-xs text-slate-500">{m.resolved} ticket{m.resolved !== 1 ? 's' : ''} resolved</div>
                  </div>
                </div>
                <StarRating rating={m.rating} />
              </div>
            );
          })}
        </div>
      </div>

      {/* Charts row */}
      <div className="grid lg:grid-cols-2 gap-4 mb-6">
        <div className="card p-6">
          <div className="flex items-center gap-2 mb-1">
            <Icon name="activity" className="w-5 h-5 text-blue-600" />
            <h2 className="font-semibold text-slate-800">Resolution Comparison</h2>
          </div>
          <p className="text-xs text-slate-500 mb-4">Tickets resolved vs assigned per staff</p>
          <ResponsiveContainer width="100%" height={260}>
            <BarChart data={resolutionData}>
              <CartesianGrid strokeDasharray="3 3" stroke="#e2e8f0" />
              <XAxis dataKey="name" tick={{ fontSize: 11, fill: '#64748b' }} />
              <YAxis tick={{ fontSize: 11, fill: '#64748b' }} />
              <Tooltip />
              <Legend wrapperStyle={{ fontSize: '11px' }} />
              <Bar dataKey="resolved" fill="#6366F1" name="Resolved" radius={[4, 4, 0, 0]} />
              <Bar dataKey="assigned" fill="#06B6D4" name="Assigned" radius={[4, 4, 0, 0]} />
            </BarChart>
          </ResponsiveContainer>
        </div>
        <div className="card p-6">
          <div className="flex items-center gap-2 mb-1">
            <Icon name="trend" className="w-5 h-5 text-emerald-600" />
            <h2 className="font-semibold text-slate-800">SLA Compliance by Staff</h2>
          </div>
          <p className="text-xs text-slate-500 mb-4">On-time delivery percentage</p>
          <ResponsiveContainer width="100%" height={260}>
            <BarChart data={slaData} layout="vertical" margin={{ left: 8, right: 16 }}>
              <CartesianGrid strokeDasharray="3 3" stroke="#e2e8f0" horizontal={false} />
              <XAxis type="number" domain={[0, 100]} tick={{ fontSize: 11, fill: '#64748b' }} ticks={[0, 25, 50, 75, 100]} />
              <YAxis dataKey="name" type="category" tick={{ fontSize: 11, fill: '#64748b' }} width={70} />
              <Tooltip formatter={(v) => `${v}%`} />
              <Bar dataKey="sla" radius={[0, 4, 4, 0]}>
                {slaData.map((e, i) => <Cell key={i} fill={e.fill} />)}
              </Bar>
            </BarChart>
          </ResponsiveContainer>
        </div>
      </div>

      {/* Filter + view toggle bar */}
      <div className="card p-4 mb-4">
        <div className="flex flex-wrap items-center gap-3 mb-3">
          <div className="relative flex-1 min-w-[240px]">
            <Icon name="search" className="w-4 h-4 absolute left-3 top-3 text-slate-400" />
            <input value={search} onChange={e => setSearch(e.target.value)} placeholder="Search by name, email, or department..." className="w-full pl-10 pr-4 py-2.5 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-emerald-500/30 text-sm bg-white" />
          </div>
          <select value={sort} onChange={e => setSort(e.target.value)} className="yc-sort-select px-3 py-2.5 border border-slate-200 rounded-lg text-sm">
            <option value="most_resolved">Sort: Most Resolved</option>
            <option value="most_assigned">Sort: Most Assigned</option>
            <option value="best_sla">Sort: Best SLA</option>
            <option value="worst_sla">Sort: Worst SLA (needs help)</option>
            <option value="fastest">Sort: Fastest Resolver</option>
            <option value="most_urgent">Sort: Most Urgent Open</option>
            <option value="name">Sort: Name (A–Z)</option>
          </select>
          {/* View toggle — moved here so it's right above the content it controls */}
          <div className="yc-view-toggle flex rounded-xl border border-slate-200 overflow-hidden ml-auto">
            <button type="button" onClick={() => setView('grid')}
              className={`flex items-center gap-1.5 px-3 py-2 text-sm font-medium transition-colors ${view === 'grid' ? 'bg-blue-500 text-white' : 'text-slate-600 hover:bg-slate-50'}`}
              title="Grid view">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="w-4 h-4"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
              Grid
            </button>
            <button type="button" onClick={() => setView('compact')}
              className={`flex items-center gap-1.5 px-3 py-2 text-sm font-medium transition-colors border-l border-slate-200 ${view === 'compact' ? 'bg-blue-500 text-white' : 'text-slate-600 hover:bg-slate-50'}`}
              title="List view">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="w-4 h-4"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
              List
            </button>
            <button type="button" onClick={() => setView('table')}
              className={`flex items-center gap-1.5 px-3 py-2 text-sm font-medium transition-colors border-l border-slate-200 ${view === 'table' ? 'bg-blue-500 text-white' : 'text-slate-600 hover:bg-slate-50'}`}
              title="Table view">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="w-4 h-4"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="3" y1="15" x2="21" y2="15"/><line x1="9" y1="9" x2="9" y2="21"/></svg>
              Table
            </button>
          </div>
        </div>
        <div className="flex flex-wrap items-center gap-2">
          <ThemedDropdown
            value={deptFilter}
            onChange={setDeptFilter}
            placeholder="All Departments"
            minWidth={160}
            options={allDepartments.map(d => ({ id: d, label: d, dot: '#6366f1' }))}
          />
          <ThemedDropdown
            value={roleFilter}
            onChange={setRoleFilter}
            placeholder="All Roles"
            minWidth={148}
            options={[
              { id: 'super_admin', label: 'Super Admin', dot: '#ef4444' },
              { id: 'manager',     label: 'Manager',     dot: '#f97316' },
              { id: 'user',        label: 'Dept User',   dot: '#06b6d4' },
            ]}
          />
          <ThemedDropdown
            value={statusFilter}
            onChange={setStatusFilter}
            placeholder="All Status"
            minWidth={140}
            options={[
              { id: 'active',   label: 'Active',   dot: '#10b981' },
              { id: 'inactive', label: 'Inactive', dot: '#94a3b8' },
            ]}
          />
          <ThemedDropdown
            value={perfFilter}
            onChange={setPerfFilter}
            placeholder="All Performers"
            minWidth={155}
            options={[
              { id: 'high',   label: 'High (≥80% SLA)',  dot: '#10b981' },
              { id: 'medium', label: 'Medium (40–79%)',   dot: '#eab308' },
              { id: 'low',    label: 'At Risk (<40%)',    dot: '#ef4444' },
            ]}
          />
          {activeFilterCount > 0 && (
            <button type="button" onClick={clearAll} className="flex items-center gap-1 px-3 py-2 text-xs font-medium text-red-600 hover:bg-red-50 rounded-lg border border-red-200">
              <Icon name="x" className="w-3 h-3" /> Clear {activeFilterCount}
            </button>
          )}
          <div className="ml-auto text-sm text-slate-600 font-medium">
            Showing <span className="text-slate-900 font-semibold">{totalCount === 0 ? 0 : startIdx + 1}–{Math.min(startIdx + pageSize, totalCount)}</span> of <span className="text-slate-900 font-semibold">{totalCount}</span>
            {totalCount !== users.length && <span className="text-slate-400"> ({users.length} total)</span>}
          </div>
        </div>
      </div>

      {/* Section label */}
      <div className="flex items-center gap-2 mb-3">
        <span className="text-xs font-semibold text-slate-500 uppercase tracking-wider">
          {view === 'grid' ? '⊞ Grid View' : view === 'compact' ? '≡ List View' : '⊟ Table View'}
        </span>
        <span className="text-xs text-slate-400">· {totalCount} staff member{totalCount !== 1 ? 's' : ''}</span>
      </div>

      {/* Staff cards / table */}
      {totalCount === 0 ? (
        <div className="card p-12 text-center text-slate-500">
          <Icon name="users" className="w-12 h-12 mx-auto mb-3 text-slate-300" />
          <p className="font-medium">No staff match the filters</p>
          <p className="text-sm mt-1">Try adjusting search or clearing filters</p>
        </div>
      ) : view === 'grid' ? (
        <div className="grid md:grid-cols-2 lg:grid-cols-3 gap-4">
          {pagedStaff.map(m => {
            const compColor = m.slaPct >= 80 ? 'bg-emerald-500' : m.slaPct >= 50 ? 'bg-amber-500' : 'bg-red-500';
            const compText  = m.slaPct >= 80 ? 'text-emerald-600' : m.slaPct >= 50 ? 'text-amber-600' : 'text-red-600';
            return (
              <div key={m.user.id} onClick={() => onOpenStaff(m.user.id)} className="card p-5 hover:shadow-md hover:border-blue-200 cursor-pointer transition">
                <div className="flex items-center justify-between mb-4">
                  <div className="flex items-center gap-3">
                    <Avatar user={m.user} size="lg" />
                    <div>
                      <div className="font-bold text-slate-800">{m.user.name}</div>
                      <div className="text-xs text-slate-500">{m.user.department}</div>
                    </div>
                  </div>
                  <StarRating rating={m.rating} />
                </div>
                <div className="grid grid-cols-2 gap-2 text-center py-3 border-y border-slate-100">
                  <div>
                    <div className="text-3xl font-bold text-slate-800">{m.resolved}</div>
                    <div className="text-xs text-slate-500 mt-1">Resolved</div>
                  </div>
                  <div>
                    <div className="text-3xl font-bold text-slate-800">{m.assigned}</div>
                    <div className="text-xs text-slate-500 mt-1">Assigned</div>
                  </div>
                </div>
                <div className="mt-4">
                  <div className="flex items-center justify-between text-xs mb-1.5">
                    <span className="text-slate-600 font-medium">SLA Compliance</span>
                    <span className={`font-semibold ${compText}`}>{m.slaPct}%</span>
                  </div>
                  <div className="w-full h-2 bg-slate-100 rounded-full overflow-hidden">
                    <div className={`h-full ${compColor} rounded-full`} style={{ width: m.slaPct + '%' }}></div>
                  </div>
                </div>
                <div className="flex items-center justify-between mt-4 text-xs">
                  <div className="flex items-center gap-1.5 text-slate-500">
                    <Icon name="clock" className="w-3.5 h-3.5" />
                    <span>{m.avgHours ? `${Math.round(m.avgHours)}h avg` : 'N/A'}</span>
                  </div>
                  <div className="flex items-center gap-1.5">
                    <Icon name="fire" className="w-3.5 h-3.5 text-orange-500" />
                    <span className={m.urgentOpen > 0 ? 'text-orange-600 font-semibold' : 'text-slate-500'}>{m.urgentOpen} urgent</span>
                  </div>
                </div>
              </div>
            );
          })}
        </div>
      ) : view === 'compact' ? (
        <div className="card divide-y divide-slate-100">
          {pagedStaff.map(m => {
            const slaText = m.slaPct >= 80 ? 'text-emerald-600' : m.slaPct >= 50 ? 'text-amber-600' : 'text-red-600';
            return (
              <button key={m.user.id} onClick={() => onOpenStaff(m.user.id)} className="w-full flex items-center gap-4 px-4 py-3 hover:bg-slate-50 transition text-left">
                <Avatar user={m.user} size="md" />
                <div className="flex-1 min-w-0">
                  <div className="flex items-center gap-2">
                    <span className="font-semibold text-slate-800 truncate">{m.user.name}</span>
                    {(m.user.isAdmin || m.user.role === 'super_admin') && <Badge className="bg-violet-50 text-violet-700 border border-violet-200">Super Admin</Badge>}
                    {!m.user.isAdmin && m.user.role === 'manager' && <Badge className="bg-amber-50 text-amber-700 border border-amber-200">Manager</Badge>}
                  </div>

              const pages = [];
              for (let i = start; i <= end; i++) pages.push(i);
              return pages.map(p => (
                <button key={p} onClick={() => setPage(p)} className={`w-9 h-9 rounded-md text-sm font-medium border ${p === safePage ? 'border-blue-500 bg-blue-500 text-white' : 'border-slate-200 text-slate-700 hover:bg-slate-50'}`}>
