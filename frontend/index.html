const { useState, useEffect, useMemo, useRef, useCallback, Fragment } = React;

// ── PDF / Print export helper ────────────────────────────────────────────────
// Renders an HTML string into the hidden #yc-print-root div then calls
// window.print(). The @media print CSS hides everything except that div.
const exportToPDF = ({ title, subtitle, columns, rows, stats = [], generatedBy = '' }) => {
  const now = new Date().toLocaleString('en-AU', { dateStyle: 'long', timeStyle: 'short' });
  const statsHtml = stats.length ? `
    <div style="display:flex;gap:12pt;flex-wrap:wrap;margin-bottom:16pt;">
      ${stats.map(s => `
        <div style="border:1pt solid #cbd5e1;border-radius:6pt;padding:8pt 14pt;min-width:100pt;">
          <div style="font-size:8pt;color:#64748b;font-weight:600;text-transform:uppercase;letter-spacing:0.05em;">${s.label}</div>
          <div style="font-size:18pt;font-weight:800;color:#1e3a5f;margin-top:2pt;">${s.value}</div>
        </div>`).join('')}
    </div>` : '';
  const thead = `<thead><tr>${columns.map(c => `<th>${c}</th>`).join('')}</tr></thead>`;
  const tbody = `<tbody>${rows.map((r, i) =>
    `<tr>${r.map(cell => `<td>${cell ?? '—'}</td>`).join('')}</tr>`
  ).join('')}</tbody>`;
  const html = `
    <div style="font-family:'Segoe UI',Arial,sans-serif;color:#0f172a;">
      <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:4pt;">
        <div>
          <div style="font-size:8pt;font-weight:700;color:#2563eb;text-transform:uppercase;letter-spacing:0.1em;margin-bottom:3pt;">YAHWEH CARE · TICKET MANAGEMENT</div>
          <h1 style="font-size:20pt;font-weight:800;color:#1e3a5f;margin:0 0 3pt;">${title}</h1>
          ${subtitle ? `<p style="font-size:9.5pt;color:#64748b;margin:0;">${subtitle}</p>` : ''}
        </div>
        <div style="text-align:right;font-size:8pt;color:#94a3b8;line-height:1.6;">
          <div>${now}</div>
          ${generatedBy ? `<div>Generated by ${generatedBy}</div>` : ''}
        </div>
      </div>
      <div style="height:3pt;background:linear-gradient(90deg,#2563eb,#7c3aed,#06b6d4);border-radius:2pt;margin-bottom:16pt;"></div>
      ${statsHtml}
      <table style="width:100%;border-collapse:collapse;font-size:9.5pt;">
        ${thead}${tbody}
      </table>
      <div style="margin-top:16pt;padding-top:8pt;border-top:1pt solid #e2e8f0;display:flex;justify-content:space-between;font-size:8pt;color:#94a3b8;">
        <span>Yahweh Care — Confidential</span>
        <span>Generated ${now}</span>
      </div>
    </div>`;
  const el = document.getElementById('yc-print-root');
  el.innerHTML = html;
  el.style.display = 'block';
  setTimeout(() => {
    window.print();
    setTimeout(() => { el.style.display = 'none'; el.innerHTML = ''; }, 1000);
  }, 120);
};

// ── Debounce hook: delays a value by `delay` ms after the last change ──
const useDebounce = (value, delay = 250) => {
  const [debounced, setDebounced] = useState(value);
  useEffect(() => {
    const t = setTimeout(() => setDebounced(value), delay);
    return () => clearTimeout(t);
  }, [value, delay]);
  return debounced;
};

// ── Loading-button hook: wraps any fn, shows spinner while it runs ──────
// Usage: const [busy, run] = useLoadingBtn(() => doSomething(), 500)
const useLoadingBtn = (fn, minDuration = 500) => {
  const [busy, setBusy] = useState(false);
  const run = useCallback(async (...args) => {
    if (busy) return;
    setBusy(true);
    const start = Date.now();
    try { await fn(...args); } finally {
      const elapsed = Date.now() - start;
      const wait = Math.max(0, minDuration - elapsed);
      setTimeout(() => setBusy(false), wait);
    }
  }, [fn, busy, minDuration]);
  return [busy, run];
};
const { BarChart, Bar, PieChart, Pie, Cell, RadialBarChart, RadialBar, RadarChart, Radar, PolarGrid, PolarAngleAxis, PolarRadiusAxis, LineChart, Line, XAxis, YAxis, CartesianGrid, Tooltip, Legend, ResponsiveContainer } = Recharts;

// ============================================================
// CONFIG & CONSTANTS
// ============================================================
const STORAGE_KEY = 'yahweh_care_app_v5';

// ============================================================
// HRMS BACKEND CONFIG
// ============================================================
// Override via <meta name="hrms-api" content="https://api.yourdomain.com" />
// in the document <head>, otherwise defaults to localhost:4002
const META_API = typeof document !== 'undefined' && document.querySelector('meta[name="hrms-api"]');
const API_BASE = (META_API && META_API.content) || 'http://localhost:4002';

const apiClient = {
  async me() {
    const res = await fetch(`${API_BASE}/auth/me`, { credentials: 'include' });
    if (res.status === 401) {
      // Try silent refresh
      const r = await fetch(`${API_BASE}/auth/refresh`, { method: 'POST', credentials: 'include' });
      if (r.ok) {
        const retry = await fetch(`${API_BASE}/auth/me`, { credentials: 'include' });
        if (retry.ok) return retry.json();
      }
      return null;
    }
    if (!res.ok) return null;
    return res.json();
  },
  async logout() {
    try {
      const res = await fetch(`${API_BASE}/auth/logout`, { method: 'POST', credentials: 'include' });
      if (res.ok) {
        const data = await res.json().catch(() => ({}));
        return data.microsoftLogoutUrl || null;
      }
    } catch (e) {}
    return null;
  },
  loginUrl(rememberMe) {
    return `${API_BASE}/auth/microsoft${rememberMe ? '?remember=1' : ''}`;
  },
  async getUsers(limit = 200) {
    const res = await fetch(`${API_BASE}/users?limit=${limit}`, { credentials: 'include' });
    if (!res.ok) return null;
    return res.json();
  },
  async getRoles() {
    const res = await fetch(`${API_BASE}/roles`, { credentials: 'include' });
    if (!res.ok) return null;
    return res.json();
  },
  async createUser(data) {
    const res = await fetch(`${API_BASE}/users`, {
      method: 'POST', credentials: 'include',
      headers: { 'Content-Type': 'application/json' },

const ALLOWED_EMAIL_DOMAINS = ['yahwehcare.com.au', 'yahwehpc.com.au'];
const EMAIL_REGEX = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

function validateOrgEmail(email) {
  if (!email || typeof email !== 'string') return { valid: false, reason: 'Email is required.' };
  const trimmed = email.trim().toLowerCase();
  if (!EMAIL_REGEX.test(trimmed)) return { valid: false, reason: 'Please enter a valid email address.' };
  const domain = trimmed.split('@')[1];
  if (!ALLOWED_EMAIL_DOMAINS.includes(domain)) {
    return {
      valid: false,
      reason: `Only organization email addresses are allowed (${ALLOWED_EMAIL_DOMAINS.map(d => '@' + d).join(' or ')}). Personal accounts like gmail, yahoo or outlook are not permitted.`,
    };
  }
  return { valid: true };
}

const fmtShortDate = (iso) => iso ? new Date(iso).toLocaleDateString('en-AU', { day: '2-digit', month: 'short', year: 'numeric' }) : '—';
const fmtRelative = (iso) => {
  if (!iso) return '—';
  const diffMin = Math.round((Date.now() - new Date(iso).getTime()) / 60000);
  if (diffMin < 1) return 'just now';
  if (diffMin < 60) return `${diffMin}m ago`;
  const diffH = Math.round(diffMin / 60);
  if (diffH < 24) return `${diffH}h ago`;
  const diffD = Math.round(diffH / 24);
  if (diffD < 30) return `${diffD} day${diffD === 1 ? '' : 's'} ago`;
  return fmtShortDate(iso);
};
const fmtActivityTime = (iso) => {
  if (!iso) return '—';
  const d = new Date(iso);
  const day = String(d.getDate()).padStart(2, '0');
  const mon = d.toLocaleString('en-AU', { month: 'short' });
  let h = d.getHours();
  const m = String(d.getMinutes()).padStart(2, '0');
  const ampm = h >= 12 ? 'pm' : 'am';
  h = h % 12 || 12;
  return `${day} ${mon} ${d.getFullYear()}, ${String(h).padStart(2,'0')}:${m} ${ampm}`;
};

const computeSLA = (ticket) => {
  if (!ticket) return { state: 'na' };
  if (['resolved', 'closed'].includes(ticket.status)) {
    const met = new Date(ticket.resolvedAt || ticket.updatedAt) <= new Date(ticket.dueAt);
    return { state: met ? 'met' : 'breached', met };
  }
  const due = new Date(ticket.dueAt).getTime();
  const created = new Date(ticket.createdAt).getTime();
  const totalMs = due - created;
  const remainingMs = due - Date.now();
  if (remainingMs <= 0) return { state: 'breached', remainingMs };
  if (remainingMs < totalMs * 0.25) return { state: 'warning', remainingMs };
  return { state: 'ok', remainingMs };
};

// ============================================================
// DUPLICATE DETECTION & MERGE
// ============================================================
const levenshteinDistance = (str1, str2) => {
  const matrix = Array(str2.length + 1).fill(null).map(() => Array(str1.length + 1).fill(0));
  for (let i = 0; i <= str1.length; i++) matrix[0][i] = i;
  for (let j = 0; j <= str2.length; j++) matrix[j][0] = j;

  for (let j = 1; j <= str2.length; j++) {
    for (let i = 1; i <= str1.length; i++) {
      const indicator = str1[i - 1] === str2[j - 1] ? 0 : 1;
      matrix[j][i] = Math.min(
        matrix[j][i - 1] + 1,
        matrix[j - 1][i] + 1,
        matrix[j - 1][i - 1] + indicator
      );
    }
  }
  return matrix[str2.length][str1.length];
};

const findDuplicates = (tickets, threshold = 0.7) => {
  const duplicateGroups = [];
  const processed = new Set();

  tickets.forEach((t1, idx1) => {
    if (processed.has(t1.id)) return;

    const group = [t1];
    processed.add(t1.id);

    tickets.slice(idx1 + 1).forEach(t2 => {
      if (processed.has(t2.id)) return;

      const titleSim = 1 - (levenshteinDistance(t1.title.toLowerCase(), t2.title.toLowerCase()) / Math.max(t1.title.length, t2.title.length));
      const sameRequester = t1.requesterId === t2.requesterId;
      const sameCategory = t1.category === t2.category;
      const dateProximity = Math.abs(new Date(t1.createdAt) - new Date(t2.createdAt)) < 7 * 24 * 60 * 60 * 1000;

      const descSim = t1.description && t2.description ?
        1 - (levenshteinDistance(t1.description.toLowerCase(), t2.description.toLowerCase()) / Math.max(t1.description.length, t2.description.length)) : 0;

      const score = (titleSim * 0.4) + (sameRequester ? 0.2 : 0) + (sameCategory ? 0.2 : 0) + (dateProximity ? 0.1 : 0) + (descSim * 0.1);

      if (score >= threshold) {
        group.push(t2);
        processed.add(t2.id);
      }
    });

    if (group.length > 1) {
      duplicateGroups.push(group);
    }
  });

  return duplicateGroups;
};

const mergeTickets = (primaryTicketId, mergeTicketIds, mergeReason, tickets, currentUserId) => {
  const primary = tickets.find(t => t.id === primaryTicketId);
  const toMerge = tickets.filter(t => mergeTicketIds.includes(t.id));

  if (!primary) throw new Error('Primary ticket not found');
  if (toMerge.length === 0) throw new Error('No tickets to merge');

  const mergedComments = [
    ...primary.comments,
    ...toMerge.flatMap(t => (t.comments || []).map(c => ({ ...c, sourceTicket: t.ticketNumber })))
  ];

  const mergedActivity = [
    ...primary.activity,
    ...toMerge.flatMap(t => (t.activity || []).map(a => ({ ...a, sourceTicket: t.ticketNumber }))),
    {
      id: uid(),
      at: now(),
      userId: currentUserId,
      type: 'merged',
      text: `Merged tickets: ${toMerge.map(t => t.ticketNumber).join(', ')} | Reason: ${mergeReason}`
    }
  ];

  const updatedPrimary = {
    ...primary,
    comments: mergedComments,
    activity: mergedActivity,
    updatedAt: now(),
    mergedWith: toMerge.map(t => t.id)
  };

  const archivedTickets = toMerge.map(t => ({
    ...t,
    status: 'closed',
    archivedAt: now(),
    mergedInto: primaryTicketId,
    updatedAt: now()
  }));

  return { updatedPrimary, archivedTickets };
};

const loadState = () => {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const parsed = JSON.parse(raw);
      if (parsed.tickets && parsed.users) {
        if (!parsed.schedules) parsed.schedules = buildSeedSchedules(DEMO_USERS.map(u => u.id));
        return parsed;
      }
    }
  } catch (e) {}
  const userIds = DEMO_USERS.map(u => u.id);
  return { users: DEMO_USERS, tickets: buildSeed(), schedules: buildSeedSchedules(userIds), currentUserId: null, notifications: [], roles: [] };
};

const useDeviceType = () => {
  const [size, setSize] = useState(() => typeof window !== 'undefined' ? window.innerWidth : 1280);
  useEffect(() => {
    const onResize = () => setSize(window.innerWidth);
    window.addEventListener('resize', onResize);
    return () => window.removeEventListener('resize', onResize);
  }, []);
  if (size < 768)  return { type: 'Mobile',  icon: 'phone',   width: size };
  if (size < 1024) return { type: 'Tablet',  icon: 'tablet',  width: size };
  return                  { type: 'Desktop', icon: 'monitor', width: size };
};

const TopBar = ({ currentUser, onClose, onOpenMobileMenu, notifications, onMarkAllRead, onOpenNotifications, theme, onToggleTheme, onToggleSidebar, sidebarCollapsed }) => {
  const unread = notifications.filter(n => !n.read && (n.recipientId === currentUser.id || !n.recipientId)).length;
  // Single mutual-exclusive panel state — only ONE dropdown can be open at a time
  const [activePanel, setActivePanel] = useState(null); // 'notif' | 'profile' | null
  const topbarRef = useRef(null);
  const userNotifs = notifications.filter(n => n.recipientId === currentUser.id || !n.recipientId).slice(0, 8);

  // Click outside entire topbar right-section → close all panels
  useEffect(() => {
    if (!activePanel) return;
    const handler = (e) => { if (topbarRef.current && !topbarRef.current.contains(e.target)) setActivePanel(null); };
    document.addEventListener('mousedown', handler);
    return () => document.removeEventListener('mousedown', handler);
  }, [activePanel]);

  // ESC closes all panels
  useEffect(() => {
    if (!activePanel) return;
    const handler = (e) => { if (e.key === 'Escape') setActivePanel(null); };
    document.addEventListener('keydown', handler);
    return () => document.removeEventListener('keydown', handler);
  }, [activePanel]);

  const [notifStyle, setNotifStyle] = useState({});
  const bellRef = useRef(null);
  const togglePanel = (name) => {
    if (name === 'notif' && bellRef.current) {
      const rect = bellRef.current.getBoundingClientRect();
      setNotifStyle({ top: rect.bottom + 6 + 'px', right: (window.innerWidth - rect.right - 16) + 'px' });
    }
    setActivePanel(p => p === name ? null : name);
  };

  return (
    <header className="yc-topbar h-14 bg-white border-b border-slate-200 flex items-center justify-between px-3 sm:px-6 flex-shrink-0">
      <div className="flex items-center gap-2">
        {/* Mobile menu button */}
        <button onClick={onOpenMobileMenu} className="lg:hidden p-2 -ml-1 rounded-lg hover:bg-slate-100 text-slate-600" title="Menu">
          <Icon name="menu" className="w-5 h-5" />
        </button>
        {/* Sidebar toggle */}
        <button onClick={onToggleSidebar} className="hidden lg:flex items-center justify-center w-8 h-8 rounded-lg hover:bg-slate-100 text-slate-500 transition-colors duration-200" title={sidebarCollapsed ? 'Expand sidebar' : 'Collapse sidebar'}>
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect x="1" y="1" width="5" height="16" rx="1.5" fill="currentColor" opacity="0.25"/>
            <rect x="1" y="1" width="16" height="16" rx="1.5" stroke="currentColor" strokeWidth="1.5" fill="none"/>
            <line x1="7" y1="5" x2="14" y2="5" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round"/>
            <line x1="7" y1="9" x2="14" y2="9" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round"/>
            <line x1="7" y1="13" x2="14" y2="13" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round"/>
          </svg>
        </button>
      </div>

      {/* Right-side controls — all panels anchored here */}
      <div className="flex items-center gap-1 relative" ref={topbarRef}>

        {/* Dark / Light mode toggle — beside notification bell */}
        <button onClick={onToggleTheme}
          className="p-2 rounded-lg transition text-slate-500 hover:bg-slate-100"
          title={theme === 'dark' ? 'Switch to Light Mode' : 'Switch to Dark Mode'}>
          <Icon name={theme === 'dark' ? 'sun' : 'moon'} className="w-5 h-5" />
        </button>

        {/* Bell — notifications */}
        <div className="relative">
          <button ref={bellRef} onClick={() => togglePanel('notif')}
            className={`p-2 rounded-lg transition text-slate-500 relative ${activePanel === 'notif' ? 'bg-slate-100' : 'hover:bg-slate-100'}`}
            title="Notifications">
            <Icon name="bell" className="w-5 h-5" />
            {unread > 0 && <span className="absolute top-1 right-1 w-4 h-4 bg-red-500 text-white text-[10px] font-bold rounded-full flex items-center justify-center">{unread}</span>}
          </button>

          {activePanel === 'notif' && (
            <div className="yc-notif-panel fixed w-96 bg-white border border-slate-200 rounded-xl shadow-2xl z-[9999] fade-in" style={notifStyle}>
              <div className="flex items-center justify-between px-4 py-3 border-b border-slate-100">
                <div className="font-semibold text-slate-800">Notifications</div>
                <button onClick={() => { onMarkAllRead(); setActivePanel(null); }} className="text-xs text-blue-600 hover:underline">Mark all read</button>
              </div>
              <div className="max-h-96 overflow-y-auto scrollbar-thin">
                {userNotifs.length === 0 ? (
                  <div className="p-8 text-center text-sm text-slate-500">
                    <Icon name="bell" className="w-8 h-8 mx-auto mb-2 text-slate-300" />
                    No notifications
                  </div>
                ) : userNotifs.map(n => (
                  <div key={n.id} className={`px-4 py-3 border-b border-slate-50 hover:bg-slate-50 transition ${!n.read ? 'bg-blue-50/30' : ''}`}>
                    <div className="flex items-start gap-3">
                      <div className={`w-8 h-8 rounded-lg flex items-center justify-center flex-shrink-0 ${n.channel === 'email' ? 'bg-blue-100 text-blue-700' : 'bg-purple-100 text-purple-700'}`}>
                        <Icon name={n.channel === 'email' ? 'mail' : 'push'} className="w-4 h-4" />
                      </div>
                      <div className="flex-1 min-w-0">
                        <div className="flex items-baseline gap-2">
                          <span className="text-[10px] font-semibold text-slate-500 uppercase">{n.channel}</span>
                          {!n.read && <span className="w-1.5 h-1.5 rounded-full bg-blue-500"></span>}
                          <span className="text-[10px] text-slate-400 ml-auto">{fmtRelative(n.at)}</span>
                        </div>
                        <div className="text-sm font-medium text-slate-800 mt-0.5">{n.subject}</div>
                        <div className="text-xs text-slate-600 mt-1 line-clamp-2">{n.body}</div>
                      </div>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          )}
        </div>

        {/* Profile dropdown — controlled by activePanel */}
        <UserProfileDropdown
          currentUser={currentUser}
          onClose={onClose}
          theme={theme}
          onToggleTheme={onToggleTheme}
          isOpen={activePanel === 'profile'}
          onToggle={() => togglePanel('profile')}
        />
      </div>
    </header>
  );
};

const Toast = ({ toast, onClose }) => {
  const [key, setKey] = useState(0); // remount progress bar on each new toast
  useEffect(() => {
    if (!toast) return;
    setKey(k => k + 1);
    const t = setTimeout(onClose, 4000);
    return () => clearTimeout(t);
  }, [toast]);
  if (!toast) return null;
  const configs = {
    success: { cls: 'bg-emerald-600 text-white', glow: 'rgba(16,185,129,0.4)', icon: 'check' },
    error:   { cls: 'bg-red-600 text-white',     glow: 'rgba(239,68,68,0.4)',  icon: 'alert' },
    info:    { cls: 'bg-blue-600 text-white',     glow: 'rgba(59,130,246,0.4)', icon: 'bell' },
  };
  const cfg = configs[toast.kind] || configs.info;
  return (
    <div
      className={`fixed top-4 right-4 z-[100] ${cfg.cls} px-4 py-3 rounded-xl slide-in-right max-w-sm flex items-start gap-3 overflow-hidden`}
      style={{
        minWidth: '280px',
        boxShadow: `0 8px 32px ${cfg.glow}, 0 2px 8px rgba(0,0,0,0.18)`,
      }}
    >
      <div className="flex-shrink-0 mt-0.5 w-8 h-8 rounded-lg bg-white/15 flex items-center justify-center">
        <Icon name={cfg.icon} className="w-4.5 h-4.5" />
      </div>
      <div className="flex-1 min-w-0">
        <div className="font-bold text-sm leading-snug">{toast.title}</div>
        {toast.body && <div className="text-xs opacity-88 mt-0.5 leading-relaxed">{toast.body}</div>}
      </div>
      <button onClick={onClose} className="text-white/60 hover:text-white flex-shrink-0 mt-0.5"><Icon name="x" className="w-4 h-4" /></button>
      <div key={key} className="toast-progress"></div>
    </div>
  );
};

// MERGE DIALOG
// ============================================================
const MergeDialog = ({ open, primaryTicket, mergeTickets: ticketsToMerge, users, onMerge, onCancel, currentUser }) => {
  const [reason, setReason] = useState('');
  const [merging, setMerging] = useState(false);

  if (!primaryTicket) return null;

  const handleMerge = () => {
    if (!reason.trim()) return;
    setMerging(true);
    try {
      onMerge(primaryTicket.id, ticketsToMerge.map(t => t.id), reason);
      setReason('');
      setMerging(false);
    } catch (error) {

  };

  return (

            className="w-full px-3 py-2 border border-slate-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500/30"
            rows="4"
          />
        </div>

        <div className="flex gap-3">
          <button
            onClick={onCancel}
            className="flex-1 px-4 py-2 border border-slate-200 text-slate-700 rounded-lg hover:bg-slate-50 text-sm font-medium"

            disabled={!reason.trim() || merging}
            className="flex-1 px-4 py-2 bg-emerald-600 text-white rounded-lg hover:bg-emerald-700 disabled:opacity-50 text-sm font-medium"
          >
            {merging ? 'Merging...' : 'Confirm Merge'}
          </button>
        </div>
      </div>
    </Modal>
  );
};

const NewTicket = ({ currentUser, users, onCreate, onCancel }) => {
  const [form, setForm] = useState({ titleType: 'Service Request', subtitle: '', category: 'client', subcategory: '', description: '', priority: 'medium', status: 'open', expectedCompletion: '', assigneeId: '', ndisRelated: false });
  const [attachments, setAttachments] = useState([]);
  const [submitting, setSubmitting] = useState(false);
  const inputCls = "w-full px-3.5 py-2.5 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-emerald-500/30 focus:border-emerald-500 text-sm bg-white";
  const submit = (e) => {
    e.preventDefault();
    if (!form.subtitle.trim() || submitting) return;
    setSubmitting(true);
    // Brief optimistic delay so the spinner is visible, then call onCreate
    setTimeout(() => onCreate({ ...form, title: form.subtitle, attachments }), 200);
  };

  const assignableUsers = users.filter(u => u.id !== currentUser.id && isManager(u));


  return (
    <div className="p-8 flex-1 overflow-y-auto scrollbar-thin">
      <div className="max-w-7xl mx-auto">
        <div className="flex items-center gap-3 mb-8">
          <button onClick={onCancel} className="p-1.5 rounded-lg hover:bg-slate-100 text-slate-500"><Icon name="arrowLeft" className="w-6 h-6" /></button>
          <div>
            <h1 className="text-3xl font-bold text-slate-900">Create New Ticket</h1>
            <p className="text-sm text-slate-500 mt-1">Submit a new support request</p>
          </div>
        </div>
        <form onSubmit={submit} className="grid lg:grid-cols-3 gap-6">
          <div className="lg:col-span-2 space-y-6">
            <div className="card p-6">
              <div className="flex items-center gap-2 mb-5"><Icon name="document" className="w-5 h-5 text-blue-600" /><h2 className="text-lg font-semibold">Ticket Details</h2></div>
              <div className="space-y-5">
                <div className="grid md:grid-cols-2 gap-5">
                  <div><label className="block text-sm font-medium text-slate-700 mb-1.5">Title Type <span className="text-red-500">*</span></label>
                    <select value={form.titleType} onChange={e => setForm({...form, titleType: e.target.value})} className={inputCls}>{TITLE_TYPES.map(t => <option key={t} value={t}>{t}</option>)}</select></div>
                  <div><label className="block text-sm font-medium text-slate-700 mb-1.5">Subtitle <span className="text-red-500">*</span></label>
                    <input value={form.subtitle} onChange={e => setForm({...form, subtitle: e.target.value})} placeholder="Brief description" className={inputCls} /></div>
                </div>
                <div className="grid md:grid-cols-2 gap-5">
                  <div><label className="block text-sm font-medium text-slate-700 mb-1.5">Category <span className="text-red-500">*</span></label>
                    <select value={form.category} onChange={e => setForm({...form, category: e.target.value})} className={inputCls}>{CATEGORIES.map(c => <option key={c.id} value={c.id}>{c.label}</option>)}</select></div>
                  <div><label className="block text-sm font-medium text-slate-700 mb-1.5">Subcategory</label>
                    <input value={form.subcategory} onChange={e => setForm({...form, subcategory: e.target.value})} placeholder="Optional subcategory" className={inputCls} /></div>
                </div>
                <div><label className="block text-sm font-medium text-slate-700 mb-1.5">Issue Details <span className="text-red-500">*</span></label>
                  <textarea rows={6} value={form.description} onChange={e => setForm({...form, description: e.target.value})} placeholder="Describe the issue in detail..." className={inputCls} /></div>
              </div>
            </div>
            <div className="card p-6">
              <div className="flex items-center justify-between mb-5">
                <div className="flex items-center gap-2"><Icon name="users" className="w-5 h-5 text-blue-600" /><h2 className="text-lg font-semibold">Reporter Information</h2></div>
                <div className="text-xs text-slate-500 flex items-center gap-1.5"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="w-3.5 h-3.5"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>Auto-filled</div>
              </div>
              <div className="grid md:grid-cols-2 gap-5">
                <div><label className="block text-sm font-medium text-slate-700 mb-1.5">Submitted By <span className="text-red-500">*</span></label>
                  <input value={currentUser.name} disabled className={inputCls + " bg-slate-50 text-slate-500"} /></div>
                <div><label className="block text-sm font-medium text-slate-700 mb-1.5">Email <span className="text-red-500">*</span></label>
                  <input value={currentUser.email} disabled className={inputCls + " bg-slate-50 text-slate-500"} /></div>
              </div>
              <div className="mt-5">
                <button type="button" onClick={() => setForm({...form, ndisRelated: !form.ndisRelated})} className="flex items-center gap-3">
                  <div className={`relative w-11 h-6 rounded-full transition ${form.ndisRelated ? 'bg-emerald-500' : 'bg-slate-200'}`}>

                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="w-7 h-7 mx-auto text-slate-400 mb-2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                <div className="text-sm"><span className="text-blue-600 font-medium">Click to upload</span> <span className="text-slate-500">or drag files</span></div>
                <div className="text-xs text-slate-400 mt-1">Images, PDFs, Word, Excel (max 10MB)</div>
              </label>
              {attachments.length > 0 && (
                <div className="mt-3 space-y-1.5">{attachments.map((a, i) => <div key={i} className="flex items-center justify-between p-2 bg-slate-50 rounded-lg text-sm"><span className="truncate">{a.name}</span><span className="text-xs text-slate-400">{Math.round(a.size/1024)} KB</span></div>)}</div>
              )}
            </div>
          </div>
          <div className="space-y-6">
            <div className="card p-6">
              <h2 className="text-lg font-semibold mb-5">Classification</h2>
              <div className="space-y-5">
                <div><label className="block text-sm font-medium text-slate-700 mb-1.5">Priority <span className="text-red-500">*</span></label>
                  <select value={form.priority} onChange={e => setForm({...form, priority: e.target.value})} className={inputCls}>{PRIORITIES.map(p => <option key={p.id} value={p.id}>{p.label}</option>)}</select></div>
                <div><label className="block text-sm font-medium text-slate-700 mb-1.5">Initial Status <span className="text-red-500">*</span></label>
                  <select value={form.status} onChange={e => setForm({...form, status: e.target.value})} className={inputCls}>{STATUSES.filter(s => !['resolved', 'closed', 'pending_approval'].includes(s.id)).map(s => <option key={s.id} value={s.id}>{s.label}</option>)}</select></div>
                <div><label className="block text-sm font-medium text-slate-700 mb-1.5">Expected Completion</label>
                  <input type="date" value={form.expectedCompletion} onChange={e => setForm({...form, expectedCompletion: e.target.value})} className={inputCls} /></div>
              </div>
            </div>
            <div className="card p-6">
              <h2 className="text-lg font-semibold mb-5">Assignment</h2>
              <label className="block text-sm font-medium text-slate-700 mb-1.5">Assign To <span className="text-xs text-slate-500 font-normal">(cannot assign to yourself)</span></label>
              <select value={form.assigneeId} onChange={e => setForm({...form, assigneeId: e.target.value})} className={inputCls}>
                <option value="">Unassigned</option>
                {assignableUsers.map(u => <option key={u.id} value={u.id}>{u.name} — {u.department}</option>)}
              </select>
            </div>
            <button type="submit" disabled={!form.subtitle.trim() || submitting}
              className="w-full flex items-center justify-center gap-2.5 px-5 py-3.5 rounded-xl bg-blue-600 hover:bg-blue-700 text-white font-semibold shadow-sm disabled:opacity-50 disabled:cursor-not-allowed transition-all"
              style={submitting ? {boxShadow:'0 0 20px rgba(59,130,246,0.45)'} : {}}>
              {submitting ? <span className="btn-spinner"></span> : <Icon name="send" className="w-5 h-5" />}
              {submitting ? 'Creating ticket…' : 'Create Ticket'}
            </button>
          </div>
        </form>
      </div>
      </div>
  );
};
